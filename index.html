// Parse a single CSV line respecting quoted fields (handles commas & escaped quotes inside quotes)
function parseCSVLine(line) {
  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ",") { out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map((c) => c.trim());
}

// Safely coerce a numeric input; returns fallback when empty / NaN / negative
function toNum(v, fallback = 0) {
  if (v === "" || v === null || v === undefined) return fallback;
  const n = Number(v);
  return Number.isFinite(n) && n >= 0 ? n : fallback;
}

// ---------- Storage helpers (localStorage-backed) ----------
const LS_PREFIX = "nachi_store_";
async function loadAll() {
  const keys = ["items", "requisitions", "purchaseOrders"];
  const out = {};
  for (const k of keys) {
    try {
      const raw = localStorage.getItem(LS_PREFIX + k);
      out[k] = raw ? JSON.parse(raw) : null;
    } catch {
      out[k] = null;
    }
  }
  return out;
}
async function save(key, value) {
  try {
    localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
  } catch (e) {
    console.error("storage save failed", key, e);
  }
}

function exportExcel({ items, requisitions, purchaseOrders, notify }) {
  try {
    if (typeof window.XLSX === "undefined") { notify?.("error", "โหลดตัวช่วย Excel ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต"); return; }
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();

    const invRows = items.map((i) => ({
      SKU: i.sku, ชื่อสินค้า: i.name, แผนก: itemDeptName(i.deptId), หมวดหมู่: i.category,
      คงเหลือ: i.stock, ขั้นต่ำ: i.minStock, หน่วย: i.unit, "ราคา/หน่วย": i.price,
      สถานะ: i.stock <= i.minStock ? "ใกล้หมด" : "ปกติ",
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(invRows), "คลังสินค้า");

    const reqRows = requisitions.map((r) => ({
      วันเวลา: fmtDateTime(r.createdAt), สินค้า: r.itemName, จำนวน: r.qty,
      แผนก: r.deptName, Line: r.line || "", เครื่องจักร: r.machine || "", หมายเหตุ: r.note || "",
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(reqRows.length ? reqRows : [{ ว่าง: "ไม่มีข้อมูล" }]), "ประวัติการเบิก");

    const poRows = purchaseOrders.map((p) => ({
      วันเวลา: fmtDateTime(p.createdAt), สินค้า: p.itemName, จำนวน: p.qty,
      มูลค่า: p.qty * p.unitPrice, แผนก: p.deptName || p.requestedBy, Line: p.line || "",
      เครื่องจักร: p.machine || "", สถานะ: (PO_STATUS[p.status] || {}).label || p.status,
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(poRows.length ? poRows : [{ ว่าง: "ไม่มีข้อมูล" }]), "สั่งซื้อ");

    const stamp = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `Nachi-Store-${stamp}.xlsx`);
    notify?.("success", "ส่งออก Excel แล้ว");
  } catch (e) {
    notify?.("error", "ส่งออก Excel ไม่สำเร็จ");
  }
}

async function exportPDF(elementId, notify) {
  try {
    if (typeof window.html2canvas === "undefined" || typeof window.jspdf === "undefined") {
      notify?.("error", "โหลดตัวช่วย PDF ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต");
      return;
    }
    const el = document.getElementById(elementId);
    if (!el) { notify?.("error", "ไม่พบเนื้อหาที่จะส่งออก"); return; }
    const canvas = await window.html2canvas(el, { scale: 2, backgroundColor: "#F7F9FC", useCORS: true });
    const img = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const w = pw - 16;
    const h = (canvas.height * w) / canvas.width;
    let y = 8, remaining = h;
    // paginate if the content is taller than one page
    if (h <= ph - 16) {
      pdf.addImage(img, "PNG", 8, y, w, h);
    } else {
      let sy = 0;
      const pageContentH = ph - 16;
      const ratio = canvas.width / w;
      while (remaining > 0) {
        const sliceH = Math.min(pageContentH, remaining);
        const sCanvas = document.createElement("canvas");
        sCanvas.width = canvas.width;
        sCanvas.height = sliceH * ratio;
        const ctx = sCanvas.getContext("2d");
        ctx.drawImage(canvas, 0, sy * ratio, canvas.width, sliceH * ratio, 0, 0, canvas.width, sliceH * ratio);
        pdf.addImage(sCanvas.toDataURL("image/png"), "PNG", 8, 8, w, sliceH);
        remaining -= sliceH;
        sy += sliceH;
        if (remaining > 0) pdf.addPage();
      }
    }
    const stamp = new Date().toISOString().slice(0, 10);
    pdf.save(`Nachi-Store-${stamp}.pdf`);
    notify?.("success", "ส่งออก PDF แล้ว");
  } catch (e) {
    notify?.("error", "ส่งออก PDF ไม่สำเร็จ");
  }
}

    reader.onload = (evt) => {
      try {
        const text = evt.target.result.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
        if (lines.length < 2) {
          notify("error", "ไฟล์ CSV ต้องมีหัวตารางและอย่างน้อย 1 แถว");
          return;
        }
        const header = parseCSVLine(lines[0]).map((h) => h.toLowerCase());
        const idx = (name) => header.indexOf(name);
        const newItems = lines.slice(1).map((line) => {
          const cols = parseCSVLine(line);
          return {
            id: uid(),
            sku: cols[idx("sku")] || `ST-${uid().slice(0, 4).toUpperCase()}`,
            name: cols[idx("name")] || cols[0] || "ไม่ระบุชื่อ",
            unit: cols[idx("unit")] || "ชิ้น",
            stock: toNum(cols[idx("stock")], 0),
            minStock: toNum(cols[idx("minstock")], 5),
            price: toNum(cols[idx("price")], 0),
            category: cols[idx("category")] || "ทั่วไป",
            deptId: (() => {
              const d = (cols[idx("dept")] || cols[idx("deptid")] || "").toLowerCase().trim();
              return ITEM_DEPT_OPTIONS.some((o) => o.id === d) ? d : "central";
            })(),
          };
        });
        setItems((prev) => [...prev, ...newItems]);
        notify("success", `นำเข้าสินค้า ${newItems.length} รายการสำเร็จ`);
      } catch (err) {
        notify("error", "อ่านไฟล์ CSV ไม่สำเร็จ ตรวจสอบรูปแบบไฟล์");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
        <div className="relative flex-1 max-w-sm">
          <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
          <input
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder="ค้นหาชื่อสินค้า หรือ SKU"
            className="w-full pl-9 pr-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"
          />
        </div>
        {canManage && (
          <div className="flex flex-wrap gap-2">
            <ExportBar items={items} requisitions={[]} purchaseOrders={[]} pdfTargetId="inventory-report" notify={notify} />
            <label className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 cursor-pointer transition-colors">
              <Upload size={15} /> นำเข้า CSV
              <input type="file" accept=".csv" onChange={handleCSV} className="hidden" />
            </label>
            <button
              onClick={() => setShowAdd(true)}
              className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors"
            >
              <Plus size={15} /> เพิ่มสินค้า
            </button>
          </div>
        )}
      </div>

      <div id="inventory-report" className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        {filtered.length === 0 ? (
          <EmptyState icon={Package} title="ไม่พบสินค้า" sub="ลองค้นหาด้วยคำอื่น หรือเพิ่มสินค้าใหม่" />
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                  <th className="px-5 py-3 font-medium">สินค้า</th>
                  <th className="px-5 py-3 font-medium">แผนก</th>
                  <th className="px-5 py-3 font-medium">หมวดหมู่</th>
                  <th className="px-5 py-3 font-medium">คงเหลือ</th>
                  <th className="px-5 py-3 font-medium">ราคา/หน่วย</th>
                  <th className="px-5 py-3 font-medium text-right">การทำงาน</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {filtered.map((i) => {
                  const low = i.stock <= i.minStock;
                  return (
                    <tr key={i.id} className="hover:bg-slate-50/60">
                      <td className="px-5 py-3.5">
                        <div className="font-medium text-slate-700">{i.name}</div>
                        <div className="text-xs text-slate-400">{i.sku}</div>
                      </td>
                      <td className="px-5 py-3.5">
                        <span className="px-2 py-0.5 rounded-full text-xs font-medium" style={{ color: itemDeptColor(i.deptId), background: `${itemDeptColor(i.deptId)}15` }}>
                          {itemDeptName(i.deptId)}
                        </span>
                      </td>
                      <td className="px-5 py-3.5 text-slate-500">{i.category}</td>
                      <td className="px-5 py-3.5">
                        <span className={low ? "text-amber-700 font-medium" : "text-slate-600"}>
                          {i.stock} {i.unit}
                        </span>
                        {low && <span className="ml-2 text-xs text-amber-600">● ใกล้หมด</span>}
                      </td>
                      <td className="px-5 py-3.5 text-slate-500">฿{fmtMoney(i.price)}</td>
                      <td className="px-5 py-3.5">
                        <div className="flex justify-end gap-2">
                          <button onClick={() => setEditing(i)} className="p-2 rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600" aria-label="แก้ไขสินค้า">
                            <Edit2 size={15} />
                          </button>
                          <button onClick={() => handleDelete(i)} className="p-2 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-500" aria-label="ลบสินค้า">
                            <Trash2 size={15} />
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {(showAdd || editing) && (
        <ItemForm
          initial={editing}
          notify={notify}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          onSave={(data) => {
            if (editing) {
              setItems((prev) => prev.map((i) => (i.id === editing.id ? { ...i, ...data } : i)));
              notify("success", "บันทึกการแก้ไขแล้ว");
            } else {
              setItems((prev) => [...prev, { id: uid(), ...data }]);
              notify("success", "เพิ่มสินค้าใหม่แล้ว");
            }
            setShowAdd(false);
            setEditing(null);
          }}
        />
      )}
    </div>
  );
}

function ItemForm({ initial, onSave, onClose, notify }) {
  const [form, setForm] = useState(
    initial
      ? { ...initial, deptId: initial.deptId || "central", stock: String(initial.stock), minStock: String(initial.minStock), price: String(initial.price) }
      : { sku: "", name: "", unit: "ชิ้น", stock: "0", minStock: "5", price: "0", category: "ทั่วไป", deptId: "central" }
  );

  const handleSave = () => {
    if (!form.name.trim()) {
      notify?.("error", "กรุณากรอกชื่อสินค้า");
      return;
    }
    const stock = toNum(form.stock, NaN);
    const minStock = toNum(form.minStock, NaN);
    const price = toNum(form.price, NaN);
    if ([stock, minStock, price].some((n) => Number.isNaN(n))) {
      notify?.("error", "จำนวนคงเหลือ / ขั้นต่ำ / ราคา ต้องเป็นตัวเลขไม่ติดลบ");
      return;
    }
    onSave({
      sku: form.sku.trim(),
      name: form.name.trim(),
      unit: form.unit.trim() || "ชิ้น",
      category: form.category.trim() || "ทั่วไป",
      deptId: form.deptId,
      stock,
      minStock,
      price,
    });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">{initial ? "แก้ไขสินค้า" : "เพิ่มสินค้าใหม่"}</h3>
        <div className="space-y-3">
          <Field label="ชื่อสินค้า" value={form.name} onChange={(v) => setForm({ ...form, name: v })} />
          <label className="block">
            <span className="text-xs text-slate-500 mb-1 block">แผนก (ผู้ใช้สินค้า)</span>
            <select
              value={form.deptId}
              onChange={(e) => setForm({ ...form, deptId: e.target.value })}
              className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
            >
              {ITEM_DEPT_OPTIONS.map((d) => (
                <option key={d.id} value={d.id}>{d.name}{d.id === "central" ? " (ทุกแผนกเห็น)" : ""}</option>
              ))}
            </select>
          </label>
          <div className="grid grid-cols-2 gap-3">
            <Field label="SKU" value={form.sku} onChange={(v) => setForm({ ...form, sku: v })} />
            <Field label="หมวดหมู่" value={form.category} onChange={(v) => setForm({ ...form, category: v })} />
          </div>
          <div className="grid grid-cols-3 gap-3">
            <Field label="หน่วย" value={form.unit} onChange={(v) => setForm({ ...form, unit: v })} />
            <Field label="คงเหลือ" type="number" value={form.stock} onChange={(v) => setForm({ ...form, stock: v })} />
            <Field label="ขั้นต่ำ" type="number" value={form.minStock} onChange={(v) => setForm({ ...form, minStock: v })} />
          </div>
          <Field label="ราคา/หน่วย (บาท)" type="number" value={form.price} onChange={(v) => setForm({ ...form, price: v })} />
        </div>
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">
            ยกเลิก
          </button>
          <button
            onClick={handleSave}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F]"
          >

  );
}

function Field({ label, value, onChange, type = "text" }) {

        type={type}

      />

}

// ---------- Requisitions (เบิกของ) — no approval; stock deducts immediately ----------
function Requisitions({ requisitions, setRequisitions, items, setItems, user, purchaseOrders, setPurchaseOrders, notify, confirm }) {
  const [search, setSearch] = useState("");
  const [pickedItem, setPickedItem] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [period, setPeriod] = useState("all"); // all | day | month | year
  const [deptFilter, setDeptFilter] = useState("all");
  const isAdmin = user.id === "admin";
  const myItems = visibleItems(items, user);

  const catalog = myItems.filter(
    (i) => i.name.toLowerCase().includes(search.toLowerCase()) || i.sku.toLowerCase().includes(search.toLowerCase())
  );

  const handleScan = (raw) => {
    const code = (raw || "").trim();
    setScanning(false);
    if (!code) return;
    const found = myItems.find(
      (i) => i.sku.toLowerCase() === code.toLowerCase() || i.name.toLowerCase() === code.toLowerCase()
    );
    if (found) {
      if (found.stock <= 0) { notify("error", `${found.name} หมดสต็อก`); return; }
      setPickedItem(found);
      notify("success", `พบสินค้า: ${found.name}`);
    } else {
      setSearch(code);
      notify("error", `ไม่พบสินค้ารหัส "${code}" — แสดงผลการค้นหาแทน`);
    }
  };

  // Withdraw immediately: deduct stock, record dept/line/machine + timestamp, mark fulfilled
  const submitWithdraw = ({ item, qty, deptId, deptName, line, machine, note }) => {
    const current = items.find((i) => i.id === item.id);
    if (!current || current.stock < qty) {
      notify("error", `สต็อกไม่พอ: คงเหลือ ${current ? current.stock : 0} ${item.unit}`);
      return;
    }
    setItems((prev) => prev.map((i) => (i.id === item.id ? { ...i, stock: Math.max(0, i.stock - qty) } : i)));
    setRequisitions((prev) => [
      { id: uid(), itemId: item.id, itemName: item.name, qty, note, status: "fulfilled", deptId, deptName, line, machine, createdAt: Date.now() },
      ...prev,
    ]);
    setPickedItem(null);
    notify("success", `เบิก ${item.name} × ${qty} — ตัดสต็อกแล้ว`);
  };

  const now = new Date();
  const inPeriod = (ts) => {
    if (period === "all") return true;
    const d = new Date(ts);
    if (period === "day") return d.toDateString() === now.toDateString();
    if (period === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === "year") return d.getFullYear() === now.getFullYear();
    return true;
  };
  const list = requisitions
    .filter((r) => (isAdmin ? true : r.deptId === user.id))
    .filter((r) => (isAdmin && deptFilter !== "all" ? r.deptId === deptFilter : true))
    .filter((r) => inPeriod(r.createdAt))
    .sort((a, b) => b.createdAt - a.createdAt);

  const periods = [
    { id: "all", label: "ทั้งหมด" },
    { id: "day", label: "วันนี้" },
    { id: "month", label: "เดือนนี้" },
    { id: "year", label: "ปีนี้" },
  ];

  return (
    <div className="space-y-5">
      {/* Item catalog with search — departments withdraw by clicking an item */}
      {!isAdmin && (
        <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
          <div className="px-4 sm:px-5 py-4 border-b border-slate-100">
            <h3 className="font-medium text-slate-800 text-sm mb-3">เลือกสินค้าเพื่อเบิก</h3>
            <div className="flex gap-2">
              <div className="relative flex-1">
                <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="ค้นหาชื่อสินค้า หรือ SKU"
                  className="w-full pl-9 pr-3 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"
                />
              </div>
              <button
                onClick={() => setScanning(true)}
                title="สแกนบาร์โค้ด / QR"
                aria-label="สแกนบาร์โค้ดหรือ QR โค้ด"
                className="flex items-center gap-2 px-4 py-3 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors shrink-0"
              >
                <ScanLine size={18} />
                <span className="hidden sm:inline">สแกน</span>
              </button>
            </div>
          </div>
          {catalog.length === 0 ? (
            <EmptyState icon={Package} title={search ? "ไม่พบสินค้า" : "ยังไม่มีสินค้าสำหรับแผนกนี้"} sub={search ? "ลองค้นหาด้วยคำอื่น" : "แอดมินสามารถเพิ่มสินค้าให้แผนกได้"} />
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 p-4">
              {catalog.map((i) => {
                const low = i.stock <= i.minStock;
                const out = i.stock <= 0;
                return (
                  <button
                    key={i.id}
                    onClick={() => setPickedItem(i)}
                    disabled={out}
                    className="text-left p-4 rounded-xl border border-slate-200 hover:border-[#1E3A5F] hover:shadow-sm transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:border-slate-200"
                  >
                    <div className="flex items-start justify-between gap-2">
                      <div className="min-w-0">
                        <div className="font-medium text-slate-800 text-sm truncate">{i.name}</div>
                        <div className="text-xs text-slate-400 mt-0.5">{i.sku} · {i.category}</div>
                      </div>
                      <span className="px-1.5 py-0.5 rounded text-[10px] shrink-0" style={{ color: itemDeptColor(i.deptId), background: `${itemDeptColor(i.deptId)}12` }}>
                        {itemDeptName(i.deptId)}
                      </span>
                    </div>
                    <div className="mt-3 flex items-center justify-between">
                      <span className={`text-sm font-semibold ${out ? "text-red-500" : low ? "text-amber-700" : "text-slate-700"}`}>
                        คงเหลือ {i.stock} {i.unit}
                      </span>
                      {out ? <span className="text-xs text-red-500">หมดสต็อก</span> : <span className="text-xs text-[#1E3A5F] font-medium">เบิก →</span>}
                    </div>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* History */}
      <div>
        <h3 className="font-medium text-slate-800 text-sm mb-3">{isAdmin ? "ประวัติการเบิก (ทุกแผนก)" : "ประวัติการเบิกของแผนก"}</h3>
        <div className="flex flex-wrap gap-2 mb-3">
          {periods.map((p) => (
            <button
              key={p.id}
              onClick={() => setPeriod(p.id)}
              className={`px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors ${
                period === p.id ? "bg-[#1E3A5F] text-white" : "bg-white text-slate-500 border border-slate-200 hover:bg-slate-50"
              }`}
            >
              {p.label}
            </button>
          ))}
          {isAdmin && (
            <select
              value={deptFilter}
              onChange={(e) => setDeptFilter(e.target.value)}
              className="px-3 py-1.5 rounded-full text-xs font-medium border border-slate-200 bg-white text-slate-600 focus:outline-none"
            >
              <option value="all">ทุกแผนก</option>
              {DEPARTMENTS.map((d) => <option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
          )}
        </div>

        <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
          {list.length === 0 ? (
            <EmptyState icon={ClipboardList} title="ไม่มีประวัติการเบิกในช่วงนี้" />
          ) : (
            <div className="divide-y divide-slate-50">
              {list.map((r) => (
                <div key={r.id} className="px-5 py-4 flex items-center justify-between gap-4">
                  <div className="min-w-0">
                    <div className="font-medium text-slate-700 text-sm truncate">
                      {r.itemName} <span className="text-slate-400 font-normal">× {r.qty}</span>
                    </div>
                    <div className="text-xs text-slate-400 mt-0.5">
                      {r.deptName}{r.line ? ` · Line ${r.line}` : ""}{r.machine ? ` · ${r.machine}` : ""}{" · "}{fmtDateTime(r.createdAt)}
                    </div>
                    {r.note && <div className="text-xs text-slate-500 mt-1 italic">"{r.note}"</div>}
                  </div>
                  <Badge status={r.status} />
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {pickedItem && (
        <RequisitionDetail item={pickedItem} user={user} notify={notify} onClose={() => setPickedItem(null)} onSubmit={submitWithdraw} />
      )}
      {scanning && (
        <ScannerModal onDetected={handleScan} onClose={() => setScanning(false)} notify={notify} />
      )}
    </div>
  );
}

// Camera barcode/QR scanner (uses html5-qrcode loaded via CDN). Works on HTTPS (e.g. GitHub Pages).
function ScannerModal({ onDetected, onClose, notify }) {
  const [status, setStatus] = useState("starting"); // starting | scanning | error
  const [manual, setManual] = useState("");
  const scannerRef = React.useRef(null);
  const startedRef = React.useRef(false);
  const handledRef = React.useRef(false);

  useEffect(() => {
    let cancelled = false;
    if (typeof window.Html5Qrcode === "undefined") {
      setStatus("error");
      notify?.("error", "โหลดตัวสแกนไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต");
      return;
    }
    const scanner = new window.Html5Qrcode("qr-reader", { verbose: false });
    scannerRef.current = scanner;
    const config = { fps: 10, qrbox: { width: 240, height: 150 }, aspectRatio: 1.3 };
    scanner
      .start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          if (cancelled || handledRef.current) return;
          handledRef.current = true;
          const s = scannerRef.current;
          const finish = () => onDetected(decodedText);
          if (s && startedRef.current) {
            s.stop().then(() => { try { s.clear(); } catch (e) {} finish(); }).catch(finish);
          } else finish();
        },
        () => {} // ignore per-frame decode misses
      )
      .then(() => { if (!cancelled) { startedRef.current = true; setStatus("scanning"); } })
      .catch(() => { if (!cancelled) { setStatus("error"); notify?.("error", "เปิดกล้องไม่สำเร็จ ตรวจสอบการอนุญาตใช้กล้อง"); } });

    return () => {
      cancelled = true;
      const s = scannerRef.current;
      if (s && startedRef.current) {
        s.stop().then(() => { try { s.clear(); } catch (e) {} }).catch(() => {});
      }
    };
    // eslint-disable-next-line
  }, []);

  const submitManual = () => {
    if (manual.trim()) onDetected(manual.trim());
  };

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-0 sm:p-4 z-[60]" onClick={onClose}>
      <div className="bg-white w-full h-full sm:h-auto sm:max-w-md sm:rounded-2xl overflow-hidden flex flex-col" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <h3 className="font-semibold text-slate-800 flex items-center gap-2"><ScanLine size={18} /> สแกนรหัสสินค้า</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-100" aria-label="ปิด">
            <X size={18} />
          </button>
        </div>

        <div className="flex-1 flex flex-col">
          {/* Camera viewport */}
          <div className="relative bg-black" style={{ minHeight: 260 }}>
            <div id="qr-reader" className="w-full" />
            {status === "starting" && (
              <div className="absolute inset-0 flex items-center justify-center text-white text-sm">กำลังเปิดกล้อง...</div>
            )}
            {status === "error" && (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-white text-sm px-6 text-center gap-1">
                <AlertTriangle size={22} className="text-amber-400" />
                <div>เปิดกล้องไม่สำเร็จ</div>
                <div className="text-slate-300 text-xs">ตรวจสอบสิทธิ์กล้อง หรือใช้บนลิงก์ https (เช่น GitHub Pages) — พิมพ์รหัสด้านล่างแทนได้</div>
              </div>
            )}
            {status === "scanning" && (
              <div className="absolute bottom-3 left-0 right-0 text-center text-white/90 text-xs">เล็งกล้องไปที่บาร์โค้ด / QR ของสินค้า</div>
            )}
          </div>

          {/* Manual fallback */}
          <div className="p-5 space-y-2">
            <span className="text-xs text-slate-500">หรือพิมพ์รหัสสินค้า (SKU) เอง</span>
            <div className="flex gap-2">
              <input
                value={manual}
                onChange={(e) => setManual(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && submitManual()}
                placeholder="เช่น ST-001"
                className="flex-1 px-3 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
              />
              <button
                onClick={submitManual}
                disabled={!manual.trim()}
                className="px-4 py-3 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40"
              >
                ค้นหา
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// Popup: item detail + qty + dept/line/machine + note; confirms an immediate withdrawal
function RequisitionDetail({ item, user, onSubmit, onClose, notify }) {
  const defaultDept = user.id === "admin" ? DEPARTMENTS[0].id : user.id;
  const [qty, setQty] = useState("1");
  const [deptId, setDeptId] = useState(defaultDept);
  const [line, setLine] = useState("");
  const [machine, setMachine] = useState("");
  const [note, setNote] = useState("");
  const qtyNum = toNum(qty, NaN);
  const overStock = Number.isFinite(qtyNum) && qtyNum > item.stock;
  const valid = Number.isFinite(qtyNum) && qtyNum > 0 && qtyNum <= item.stock && line && machine;
  const low = item.stock <= item.minStock;
  const deptName = (DEPARTMENTS.find((d) => d.id === deptId) || {}).name || deptId;

  const handleSubmit = () => {
    if (!Number.isFinite(qtyNum) || qtyNum <= 0) { notify?.("error", "กรุณากรอกจำนวนที่ต้องการเบิก"); return; }
    if (qtyNum > item.stock) { notify?.("error", `เบิกได้ไม่เกิน ${item.stock} ${item.unit} (คงเหลือในสต็อก)`); return; }
    if (!line || !machine) { notify?.("error", "กรุณาเลือก Line และเครื่องจักร"); return; }
    onSubmit({ item, qty: qtyNum, deptId, deptName, line, machine, note: note.trim() });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="p-5 border-b border-slate-100">
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <h3 className="font-semibold text-slate-800 text-lg leading-tight">{item.name}</h3>
              <div className="text-xs text-slate-400 mt-1">{item.sku} · {item.category}</div>
            </div>
            <span className="px-2 py-1 rounded-full text-xs font-medium shrink-0" style={{ color: itemDeptColor(item.deptId), background: `${itemDeptColor(item.deptId)}15` }}>
              {itemDeptName(item.deptId)}
            </span>
          </div>
          <div className="grid grid-cols-2 gap-3 mt-4">
            <div className="bg-slate-50 rounded-xl px-3 py-2.5">
              <div className="text-[11px] text-slate-400">คงเหลือในสต็อก</div>
              <div className={`text-lg font-semibold ${low ? "text-amber-700" : "text-slate-800"}`}>{item.stock} <span className="text-sm font-normal text-slate-400">{item.unit}</span></div>
            </div>
            <div className="bg-slate-50 rounded-xl px-3 py-2.5">
              <div className="text-[11px] text-slate-400">ราคา/หน่วย</div>
              <div className="text-lg font-semibold text-slate-800">฿{fmtMoney(item.price)}</div>
            </div>
          </div>
          {low && <div className="mt-2 text-xs text-amber-600">⚠ สินค้าใกล้หมด (ขั้นต่ำ {item.minStock})</div>}
        </div>

        <div className="p-5 space-y-3">
          <div>
            <Field label={`จำนวนที่ต้องการเบิก (${item.unit}) — สูงสุด ${item.stock}`} type="number" value={qty} onChange={setQty} />
            {overStock && <div className="text-xs text-red-500 mt-1">เกินจำนวนคงเหลือในสต็อก</div>}
          </div>
          <DeptLineMachineFields user={user} deptId={deptId} setDeptId={setDeptId} line={line} setLine={setLine} machine={machine} setMachine={setMachine} />
          <label className="block">
            <span className="text-xs text-slate-500 mb-1 block">หมายเหตุ (ไม่บังคับ)</span>
            <textarea
              value={note}
              onChange={(e) => setNote(e.target.value)}
              rows={2}
              className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
              placeholder="เช่น ใช้สำหรับงานวันที่..."
            />
          </label>
          <div className="flex gap-2 pt-1">
            <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">ยกเลิก</button>
            <button
              onClick={handleSubmit}
              disabled={!valid}
              className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40 disabled:cursor-not-allowed"
            >
              ตกลงเบิกของ
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- Purchase Orders (สั่งซื้อ) ----------
function PurchaseOrders({ purchaseOrders, setPurchaseOrders, items, setItems, user, notify, confirm }) {
  const [showNew, setShowNew] = useState(false);
  const [search, setSearch] = useState("");
  const isAdmin = user.id === "admin";

  const approve = (po) => {
    confirm({
      title: "อนุมัติรายการขอสั่งซื้อ?",
      message: `อนุมัติ "${po.itemName}" × ${po.qty} — จะเข้าสู่ขั้นตอนการสั่งซื้อ`,
      confirmLabel: "อนุมัติ",
      onConfirm: () => {
        setPurchaseOrders((prev) => prev.map((p) => (p.id === po.id && p.status === "pending_approval" ? { ...p, status: "awaiting_order", approvedAt: Date.now() } : p)));
        notify("success", "อนุมัติแล้ว");
      },
    });
  };

  const reject = (po) => {
    confirm({
      title: "ปฏิเสธรายการขอสั่งซื้อ?",
      message: `ปฏิเสธ "${po.itemName}" × ${po.qty}`,
      confirmLabel: "ปฏิเสธ",
      tone: "danger",
      onConfirm: () => {
        setPurchaseOrders((prev) => prev.map((p) => (p.id === po.id && p.status === "pending_approval" ? { ...p, status: "rejected", decidedAt: Date.now() } : p)));
        notify("success", "ปฏิเสธแล้ว");
      },
    });
  };

  const changeStatus = (po, status) => {
    setPurchaseOrders((prev) => prev.map((p) => (p.id === po.id ? { ...p, status } : p)));
  };

  const receive = (po) => {
    confirm({
      title: "ยืนยันรับของเข้าคลัง?",
      message: `รับ "${po.itemName}" จำนวน ${po.qty} เข้าสต็อกใช่หรือไม่`,
      confirmLabel: "รับของ",
      onConfirm: () => {
        let done = false;
        setPurchaseOrders((prev) =>
          prev.map((p) => {
            if (p.id === po.id && p.status !== "received" && p.status !== "rejected" && p.status !== "pending_approval") { done = true; return { ...p, status: "received", receivedAt: Date.now() }; }
            return p;
          })
        );
        setItems((prev) => {
          if (!done) return prev;
          return prev.map((i) => (i.id === po.itemId ? { ...i, stock: i.stock + po.qty } : i));
        });
        if (done) notify("success", "รับของเข้าคลังแล้ว");
      },
    });
  };

  const scoped = (isAdmin ? purchaseOrders : purchaseOrders.filter((p) => p.deptId === user.id))
    .filter((p) => !search || p.itemName.toLowerCase().includes(search.toLowerCase()) || (p.deptName || "").toLowerCase().includes(search.toLowerCase()));
  const sorted = [...scoped].sort((a, b) => b.createdAt - a.createdAt);
  const openStatuses = ["pending_approval", "awaiting_order", "awaiting_supplier", "awaiting_import"];
  const totalOpenValue = scoped.filter((p) => openStatuses.includes(p.status)).reduce((s, p) => s + p.qty * p.unitPrice, 0);

  return (
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div className="text-sm text-slate-500">
          มูลค่าค้างรับ{isAdmin ? " (ทุกแผนก)" : ""}: <span className="font-semibold text-slate-700">฿{fmtMoney(totalOpenValue)}</span>
        </div>
        <div className="flex gap-2">
          <div className="relative flex-1 sm:w-56">
            <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
            <input
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="ค้นหารายการ / แผนก"
              className="w-full pl-9 pr-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
            />
          </div>
          {!isAdmin && (
            <button
              onClick={() => setShowNew(true)}
              className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors shrink-0"
            >
              <Plus size={15} /> สั่งซื้อ
            </button>
          )}
        </div>
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        {sorted.length === 0 ? (
          <EmptyState icon={ShoppingCart} title={isAdmin ? "ยังไม่มีรายการขอสั่งซื้อ" : "ยังไม่มีรายการสั่งซื้อ"} sub={isAdmin ? "รอแผนกส่งคำขอสั่งซื้อเข้ามา" : "กดปุ่มสั่งซื้อเพื่อสร้างรายการใหม่"} />
        ) : (
          <div className="divide-y divide-slate-50">
            {sorted.map((po) => (
              <div key={po.id} className="px-5 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <div className="min-w-0">
                  <div className="font-medium text-slate-700 text-sm">
                    {po.itemName} <span className="text-slate-400 font-normal">× {po.qty}</span>
                  </div>
                  <div className="text-xs text-slate-400 mt-0.5">
                    ฿{fmtMoney(po.qty * po.unitPrice)} · {po.deptName || po.requestedBy}
                    {po.line ? ` · Line ${po.line}` : ""}{po.machine ? ` · ${po.machine}` : ""}
                    {" · "}{fmtDateTime(po.createdAt)}
                  </div>
                  {po.imageCount ? <div className="text-[11px] text-slate-400 mt-0.5">แนบรูป {po.imageCount} ภาพ</div> : null}
                  {po.note && <div className="text-xs text-slate-500 mt-1 italic">"{po.note}"</div>}
                </div>

                <div className="flex items-center gap-2 shrink-0">
                  {/* Admin controls */}
                  {isAdmin && po.status === "pending_approval" && (
                    <>
                      <button onClick={() => approve(po)} className="p-2.5 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-100" title="อนุมัติ" aria-label="อนุมัติ">
                        <Check size={16} />
                      </button>
                      <button onClick={() => reject(po)} className="p-2.5 rounded-lg bg-red-50 text-red-500 hover:bg-red-100" title="ปฏิเสธ" aria-label="ปฏิเสธ">
                        <X size={16} />
                      </button>
                    </>
                  )}
                  {isAdmin && PO_WORKFLOW.includes(po.status) && (
                    <>
                      <select
                        value={po.status}
                        onChange={(e) => changeStatus(po, e.target.value)}
                        className="text-xs px-2 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 focus:outline-none"
                      >
                        {PO_WORKFLOW.map((s) => <option key={s} value={s}>{PO_STATUS[s].label}</option>)}
                      </select>
                      <button onClick={() => receive(po)} className="text-xs px-3 py-2 rounded-lg bg-[#EFF4FA] text-[#1E3A5F] font-medium hover:bg-[#E1EAF3] whitespace-nowrap">
                        ได้รับของแล้ว
                      </button>
                    </>
                  )}
                  {(isAdmin && (po.status === "received" || po.status === "rejected")) && <Badge status={po.status} map={PO_STATUS} />}
                  {/* User: status only */}
                  {!isAdmin && <Badge status={po.status} map={PO_STATUS} />}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {showNew && (
        <NewPOForm
          items={visibleItems(items, user)}
          user={user}
          notify={notify}
          onClose={() => setShowNew(false)}
          onSave={(data) => {
            setPurchaseOrders((prev) => [
              { id: uid(), status: "pending_approval", createdAt: Date.now(), requestedBy: user.name, ...data },
              ...prev,
            ]);
            setShowNew(false);
            notify("success", "ส่งคำขอสั่งซื้อแล้ว รออนุมัติ");
          }}
        />
      )}
    </div>
  );
}

function NewPOForm({ items, user, onSave, onClose, notify }) {
  const defaultDept = user.id === "admin" ? DEPARTMENTS[0].id : user.id;
  const [search, setSearch] = useState("");
  const [itemId, setItemId] = useState(items[0]?.id || "");
  const [qty, setQty] = useState("10");
  const [deptId, setDeptId] = useState(defaultDept);
  const [line, setLine] = useState("");
  const [machine, setMachine] = useState("");
  const [note, setNote] = useState("");
  const [images, setImages] = useState([]); // {name, url} previews (not persisted yet)
  const item = items.find((i) => i.id === itemId);
  const qtyNum = toNum(qty, NaN);
  const deptName = (DEPARTMENTS.find((d) => d.id === deptId) || {}).name || deptId;
  const valid = item && Number.isFinite(qtyNum) && qtyNum > 0 && line && machine;

  const filtered = items.filter(
    (i) => i.name.toLowerCase().includes(search.toLowerCase()) || i.sku.toLowerCase().includes(search.toLowerCase())
  );

  const onPickImages = (e) => {
    const files = Array.from(e.target.files || []).slice(0, 3 - images.length);
    const next = files.map((f) => ({ name: f.name, url: URL.createObjectURL(f) }));
    setImages((prev) => [...prev, ...next].slice(0, 3));
    e.target.value = "";
  };
  const removeImage = (idx) => setImages((prev) => prev.filter((_, i) => i !== idx));

  const handleSave = () => {
    if (!item) { notify?.("error", "กรุณาเลือกสินค้า"); return; }
    if (!Number.isFinite(qtyNum) || qtyNum <= 0) { notify?.("error", "จำนวนที่สั่งต้องมากกว่า 0"); return; }
    if (!line || !machine) { notify?.("error", "กรุณาเลือก Line และเครื่องจักร"); return; }
    onSave({
      itemId: item.id, itemName: item.name, qty: qtyNum, unitPrice: item.price,
      deptId, deptName, line, machine, note: note.trim(), imageCount: images.length,
    });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">สั่งซื้อสินค้า</h3>
        {items.length === 0 ? (
          <p className="text-sm text-slate-500 mb-4">ยังไม่มีสินค้าสำหรับแผนกนี้ กรุณาให้แอดมินเพิ่มสินค้าก่อน</p>
        ) : (
          <div className="space-y-3">
            <div>
              <span className="text-xs text-slate-500 mb-1 block">ค้นหา / เลือกสินค้า</span>
              <div className="relative mb-2">
                <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="พิมพ์ชื่อสินค้า หรือ SKU"
                  className="w-full pl-9 pr-3 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
                />
              </div>
              <select
                value={itemId}
                onChange={(e) => setItemId(e.target.value)}
                size={Math.min(4, Math.max(2, filtered.length))}
                className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
              >
                {filtered.map((i) => <option key={i.id} value={i.id}>{i.name} ({i.sku}) — คงเหลือ {i.stock}</option>)}
              </select>
            </div>

            <Field label="จำนวนที่สั่ง" type="number" value={qty} onChange={setQty} />
            {item && Number.isFinite(qtyNum) && qtyNum > 0 && (
              <div className="text-xs text-slate-400">ราคา/หน่วย ฿{fmtMoney(item.price)} · รวม ฿{fmtMoney(item.price * qtyNum)}</div>
            )}

            <DeptLineMachineFields user={user} deptId={deptId} setDeptId={setDeptId} line={line} setLine={setLine} machine={machine} setMachine={setMachine} />

            {/* Image attach — up to 3 (preview only, will persist after Supabase) */}
            <div>
              <span className="text-xs text-slate-500 mb-1 block">แนบรูป (สูงสุด 3 ภาพ)</span>
              <div className="flex gap-2 flex-wrap">
                {images.map((img, idx) => (
                  <div key={idx} className="relative w-16 h-16 rounded-lg overflow-hidden border border-slate-200">
                    <img src={img.url} alt={img.name} className="w-full h-full object-cover" />
                    <button onClick={() => removeImage(idx)} className="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/60 text-white flex items-center justify-center" aria-label="ลบรูป">
                      <X size={11} />
                    </button>
                  </div>
                ))}
                {images.length < 3 && (
                  <label className="w-16 h-16 rounded-lg border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-400 cursor-pointer hover:border-[#1E3A5F] hover:text-[#1E3A5F]">
                    <Plus size={18} />
                    <input type="file" accept="image/*" multiple onChange={onPickImages} className="hidden" />
                  </label>
                )}
              </div>
              <div className="text-[11px] text-slate-400 mt-1">* ตอนนี้แนบเพื่อดูตัวอย่าง ยังไม่บันทึกถาวร (จะเก็บจริงเมื่อต่อ Supabase)</div>
            </div>

            <label className="block">
              <span className="text-xs text-slate-500 mb-1 block">หมายเหตุ (ไม่บังคับ)</span>
              <textarea
                value={note}
                onChange={(e) => setNote(e.target.value)}
                rows={2}
                className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
                placeholder="รายละเอียดเพิ่มเติม..."
              />
            </label>
          </div>
        )}
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">ยกเลิก</button>
          <button
            onClick={handleSave}
            disabled={!valid}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40 disabled:cursor-not-allowed"
          >
            ส่งคำขอสั่งซื้อ
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- App shell ----------
function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [items, setItems] = useState(SEED_ITEMS);
  const [requisitions, setRequisitions] = useState([]);
  const [purchaseOrders, setPurchaseOrders] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [confirmState, setConfirmState] = useState(null);

  // Toast helper
  const notify = useCallback((type, msg) => {
    const id = uid();
    setToasts((prev) => [...prev, { id, type, msg }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 3000);
  }, []);

  // Confirm helper: opens a single shared modal
  const confirm = useCallback((opts) => setConfirmState(opts), []);

  useEffect(() => {
    (async () => {
      const data = await loadAll();
      if (data.items) setItems(data.items);
      if (data.requisitions) setRequisitions(data.requisitions);
      if (data.purchaseOrders) setPurchaseOrders(data.purchaseOrders);
      setLoaded(true);
    })();
  }, []);

  // Consolidated, debounced persistence — one effect, one timer, saves only what changed
  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => {
      save("items", items);
      save("requisitions", requisitions);
      save("purchaseOrders", purchaseOrders);
    }, 400);
    return () => clearTimeout(t);
  }, [items, requisitions, purchaseOrders, loaded]);

  if (!user) return <Login onLogin={setUser} />;

  const isAdmin = user.id === "admin";
  // Admin manages the inventory; departments see ภาพรวม + เบิกของ + สั่งซื้อ
  const nav = isAdmin
    ? [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "inventory", label: "คลังสินค้า", icon: Package },
        { id: "requisitions", label: "คำขอเบิก", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ]
    : [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "requisitions", label: "เบิกของ", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ];

  // If current tab isn't available for this role (e.g. department on "inventory"), fall back to dashboard
  const activeTab = nav.some((n) => n.id === tab) ? tab : "dashboard";

  return (
    <div className="min-h-screen bg-[#F7F9FC] flex flex-col text-slate-800" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>
      {/* Top navigation bar */}
      <header className="bg-[#0F1E33] text-white sticky top-0 z-40">
        <div className="max-w-6xl mx-auto px-4 md:px-6">
          {/* Row 1: logo + department + logout */}
          <div className="flex items-center justify-between h-14">
            <button
              onClick={() => setUser(null)}
              title="กลับหน้าเลือกแผนก"
              className="flex items-center gap-2.5 hover:opacity-90 transition-opacity"
            >
              <div className="w-8 h-8 rounded-lg bg-[#1B3A5C] flex items-center justify-center shrink-0">
                <Factory size={16} className="text-[#7FD4A8]" />
              </div>
              <div className="text-left leading-none">
                <div className="text-[10px] text-slate-400 tracking-widest uppercase mb-1">Nachi Factory 4</div>
                <div className="font-semibold text-sm tracking-tight">Store Engineering</div>
              </div>
            </button>

            <div className="flex items-center gap-2 md:gap-3">
              <div className="flex items-center gap-2 px-2.5 py-1.5 rounded-xl bg-white/5">
                {(() => {
                  const Icon = DEPT_ICON[user.icon] || Package;
                  return (
                    <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{ background: user.color }}>
                      <Icon size={14} />
                    </div>
                  );
                })()}
                <div className="hidden sm:block leading-none">
                  <div className="text-xs font-medium">{user.name}</div>
                  <div className="text-[10px] text-slate-400 mt-0.5">{user.id === "admin" ? "ผู้ดูแลระบบ" : "แผนกผลิต"}</div>
                </div>
              </div>
              <button
                onClick={() => setUser(null)}
                title="ออกจากระบบ"
                className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs text-slate-300 hover:bg-white/5 hover:text-white transition-colors"
              >
                <LogOut size={14} /> <span className="hidden sm:inline">ออกจากระบบ</span>
              </button>
            </div>
          </div>

          {/* Row 2: nav tabs (horizontal, scrollable on mobile) */}
          <nav className="flex gap-1 overflow-x-auto -mb-px">
            {nav.map((n) => (
              <button
                key={n.id}
                onClick={() => setTab(n.id)}
                className={`flex items-center gap-2 px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${
                  activeTab === n.id
                    ? "border-[#7FD4A8] text-white"
                    : "border-transparent text-slate-400 hover:text-slate-200"
                }`}
              >
                <n.icon size={16} />
                {n.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      {/* Main */}
      <main className="flex-1 w-full max-w-6xl mx-auto p-5 md:p-8">
        <div className="mb-6">
          <h1 className="text-xl font-semibold text-slate-800">
            {nav.find((n) => n.id === activeTab)?.label}
          </h1>
          <p className="text-sm text-slate-400 mt-0.5">
            {activeTab === "dashboard" && "ภาพรวมคลังสินค้าและคำขอ"}
            {activeTab === "inventory" && "รายการสินค้าคงคลังทั้งหมด"}
            {activeTab === "requisitions" && (isAdmin ? "คำขอเบิกของและการอนุมัติ" : "เบิกของและติดตามสถานะ")}
            {activeTab === "po" && "สั่งซื้อและสถานะการจัดส่ง"}
          </p>
        </div>

        {activeTab === "dashboard" && (
          <Dashboard items={items} requisitions={requisitions} purchaseOrders={purchaseOrders} user={user} notify={notify} />
        )}
        {activeTab === "inventory" && (
          <Inventory items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} />
        )}
        {activeTab === "requisitions" && (
          <Requisitions
            requisitions={requisitions}
            setRequisitions={setRequisitions}
            items={items}
            setItems={setItems}
            user={user}
            purchaseOrders={purchaseOrders}
            setPurchaseOrders={setPurchaseOrders}
            notify={notify}
            confirm={confirm}
          />
        )}
        {activeTab === "po" && (
          <PurchaseOrders purchaseOrders={purchaseOrders} setPurchaseOrders={setPurchaseOrders} items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} />
        )}
      </main>

      <ConfirmModal
        open={!!confirmState}
        title={confirmState?.title}
        message={confirmState?.message}
        confirmLabel={confirmState?.confirmLabel}
        tone={confirmState?.tone}
        onConfirm={confirmState?.onConfirm || (() => {})}
        onClose={() => setConfirmState(null)}
      />
      <Toast toasts={toasts} />
    </div>
  );
}

    /* ================= END APP CODE ================= */

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
