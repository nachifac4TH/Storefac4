// Parse a single CSV line respecting quoted fields (handles commas & escaped quotes inside quotes)
function parseCSVLine(line) {
  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ",") { out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map((c) => c.trim());
}

// Safely coerce a numeric input; returns fallback when empty / NaN / negative
function toNum(v, fallback = 0) {
  if (v === "" || v === null || v === undefined) return fallback;
  const n = Number(v);
  return Number.isFinite(n) && n >= 0 ? n : fallback;
}

// ---------- Storage helpers (localStorage-backed) ----------
const LS_PREFIX = "nachi_store_";
async function loadAll() {
  const keys = ["items", "requisitions", "purchaseOrders"];
  const out = {};
  for (const k of keys) {
    try {
      const raw = localStorage.getItem(LS_PREFIX + k);
      out[k] = raw ? JSON.parse(raw) : null;
    } catch {
      out[k] = null;
    }
  }
  return out;
}
async function save(key, value) {
  try {
    localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
  } catch (e) {
    console.error("storage save failed", key, e);
  }
}

// Reusable confirmation dialog
function ConfirmModal({ open, title, message, confirmLabel = "ยืนยัน", tone = "primary", onConfirm, onClose }) {
  if (!open) return null;
  const toneCls =
    tone === "danger"
      ? "bg-red-600 hover:bg-red-700"
      : tone === "warning"
      ? "bg-amber-600 hover:bg-amber-700"
      : "bg-[#1E3A5F] hover:bg-[#16304F]";
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-[60]" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-sm" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-1">{title}</h3>

        <div className="flex gap-2">

            {confirmLabel}
          </button>
        </div>
      </div>
    </div>
  );
}

  const myReqs = requisitions.filter((r) => r.deptId === user.id);
  const pendingReqs = requisitions.filter((r) => r.status === "pending" && (isAdmin || r.deptId === user.id));
  const openPOs = purchaseOrders.filter((p) => p.status === "ordered" && (isAdmin || p.deptId === user.id));

  const cards = [
    { label: "สินค้าใกล้หมด", value: lowStock.length, icon: TrendingDown, color: "#B45309" },
    { label: isAdmin ? "รออนุมัติ (ทุกแผนก)" : "คำขอของแผนก", value: isAdmin ? pendingReqs.length : myReqs.length, icon: ClipboardList, color: "#1E3A5F" },
    { label: "สั่งซื้อค้างรับ", value: openPOs.length, icon: ShoppingCart, color: "#5B21B6" },
    { label: isAdmin ? "สินค้าทั้งหมด" : "สินค้าของแผนก", value: myItems.length, icon: Package, color: "#065F46" },
  ];

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {cards.map((c) => (
          <div key={c.label} className="bg-white rounded-2xl p-5 border border-slate-100">
            <div className="w-9 h-9 rounded-lg flex items-center justify-center mb-3" style={{ background: `${c.color}15` }}>
              <c.icon size={18} style={{ color: c.color }} />
            </div>
            <div className="text-2xl font-semibold text-slate-800">{c.value}</div>
            <div className="text-xs text-slate-400 mt-1">{c.label}</div>
          </div>
        ))}
      </div>

      {lowStock.length > 0 && (
        <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
            <AlertTriangle size={16} className="text-amber-600" />
            <h3 className="font-medium text-slate-800 text-sm">สินค้าใกล้หมดสต็อก</h3>
          </div>
          <div className="divide-y divide-slate-50">
            {lowStock.map((i) => (
              <div key={i.id} className="px-5 py-3 flex items-center justify-between">
                <div>
                  <div className="text-sm font-medium text-slate-700">{i.name}</div>
                  <div className="text-xs text-slate-400">{i.sku} · {i.category}</div>
                </div>
                <div className="text-right">
                  <div className="text-sm font-semibold text-amber-700">{i.stock} {i.unit}</div>
                  <div className="text-xs text-slate-400">ขั้นต่ำ {i.minStock}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {!isAdmin && (
        <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-100 flex items-center gap-2">
            <Package size={16} className="text-emerald-600" />
            <h3 className="font-medium text-slate-800 text-sm">คลังสินค้า (ภาพรวม)</h3>
          </div>
          {myItems.length === 0 ? (
            <EmptyState icon={Package} title="ยังไม่มีสินค้าสำหรับแผนกนี้" sub="แอดมินสามารถเพิ่มสินค้าให้แผนกได้" />
          ) : (
            <div className="divide-y divide-slate-50">
              {myItems.map((i) => {
                const low = i.stock <= i.minStock;
                return (
                  <div key={i.id} className="px-5 py-3 flex items-center justify-between">
                    <div>
                      <div className="text-sm font-medium text-slate-700">{i.name}</div>
                      <div className="text-xs text-slate-400">
                        {i.sku} · {i.category}
                        <span className="ml-1.5 px-1.5 py-0.5 rounded text-[10px]" style={{ color: itemDeptColor(i.deptId), background: `${itemDeptColor(i.deptId)}12` }}>
                          {itemDeptName(i.deptId)}
                        </span>
                      </div>
                    </div>
                    <div className="text-right">
                      <div className={`text-sm font-semibold ${low ? "text-amber-700" : "text-slate-600"}`}>{i.stock} {i.unit}</div>
                      {low && <div className="text-xs text-amber-600">ใกล้หมด</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        <div className="px-5 py-4 border-b border-slate-100">
          <h3 className="font-medium text-slate-800 text-sm">คำขอเบิกล่าสุด{isAdmin ? " (ทุกแผนก)" : ""}</h3>
        </div>
        {(() => {
          const scoped = isAdmin ? requisitions : requisitions.filter((r) => r.deptId === user.id);
          return scoped.length === 0 ? (
            <EmptyState icon={ClipboardList} title="ยังไม่มีคำขอเบิก" />
          ) : (
            <div className="divide-y divide-slate-50">
              {scoped.slice(0, 5).map((r) => (
                <div key={r.id} className="px-5 py-3 flex items-center justify-between">
                  <div>
                    <div className="text-sm font-medium text-slate-700">{r.itemName} × {r.qty}</div>
                    <div className="text-xs text-slate-400">{r.deptName} · {fmtDate(r.createdAt)}</div>
                  </div>
                  <Badge status={r.status} />
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// ---------- Inventory ----------
function Inventory({ items, setItems, user, notify, confirm }) {
  const [q, setQ] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [editing, setEditing] = useState(null);
  const canManage = user.id === "admin";

  const filtered = items.filter(
    (i) => i.name.toLowerCase().includes(q.toLowerCase()) || i.sku.toLowerCase().includes(q.toLowerCase())
  );

  const handleDelete = (item) =>
    confirm({
      title: "ยืนยันการลบสินค้า?",
      message: `ต้องการลบ "${item.name}" ออกจากคลังใช่หรือไม่ การลบไม่สามารถย้อนกลับได้`,
      confirmLabel: "ลบสินค้า",
      tone: "danger",
      onConfirm: () => {
        setItems((prev) => prev.filter((i) => i.id !== item.id));
        notify("success", "ลบสินค้าแล้ว");
      },
    });

  const handleCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const text = evt.target.result.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
        if (lines.length < 2) {
          notify("error", "ไฟล์ CSV ต้องมีหัวตารางและอย่างน้อย 1 แถว");
          return;
        }
        const header = parseCSVLine(lines[0]).map((h) => h.toLowerCase());
        const idx = (name) => header.indexOf(name);
        const newItems = lines.slice(1).map((line) => {
          const cols = parseCSVLine(line);
          return {
            id: uid(),
            sku: cols[idx("sku")] || `ST-${uid().slice(0, 4).toUpperCase()}`,
            name: cols[idx("name")] || cols[0] || "ไม่ระบุชื่อ",
            unit: cols[idx("unit")] || "ชิ้น",
            stock: toNum(cols[idx("stock")], 0),
            minStock: toNum(cols[idx("minstock")], 5),
            price: toNum(cols[idx("price")], 0),
            category: cols[idx("category")] || "ทั่วไป",
            deptId: (() => {
              const d = (cols[idx("dept")] || cols[idx("deptid")] || "").toLowerCase().trim();
              return ITEM_DEPT_OPTIONS.some((o) => o.id === d) ? d : "central";
            })(),
          };
        });
        setItems((prev) => [...prev, ...newItems]);
        notify("success", `นำเข้าสินค้า ${newItems.length} รายการสำเร็จ`);
      } catch (err) {
        notify("error", "อ่านไฟล์ CSV ไม่สำเร็จ ตรวจสอบรูปแบบไฟล์");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
        <div className="relative flex-1 max-w-sm">
          <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
          <input
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder="ค้นหาชื่อสินค้า หรือ SKU"
            className="w-full pl-9 pr-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"
          />
        </div>
        {canManage && (
          <div className="flex gap-2">
            <label className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 cursor-pointer transition-colors">
              <Upload size={15} /> นำเข้า CSV
              <input type="file" accept=".csv" onChange={handleCSV} className="hidden" />
            </label>
            <button
              onClick={() => setShowAdd(true)}
              className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors"
            >
              <Plus size={15} /> เพิ่มสินค้า
            </button>
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        {filtered.length === 0 ? (
          <EmptyState icon={Package} title="ไม่พบสินค้า" sub="ลองค้นหาด้วยคำอื่น หรือเพิ่มสินค้าใหม่" />
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                  <th className="px-5 py-3 font-medium">สินค้า</th>
                  <th className="px-5 py-3 font-medium">แผนก</th>
                  <th className="px-5 py-3 font-medium">หมวดหมู่</th>
                  <th className="px-5 py-3 font-medium">คงเหลือ</th>
                  <th className="px-5 py-3 font-medium">ราคา/หน่วย</th>
                  <th className="px-5 py-3 font-medium text-right">การทำงาน</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {filtered.map((i) => {
                  const low = i.stock <= i.minStock;
                  return (
                    <tr key={i.id} className="hover:bg-slate-50/60">
                      <td className="px-5 py-3.5">
                        <div className="font-medium text-slate-700">{i.name}</div>
                        <div className="text-xs text-slate-400">{i.sku}</div>
                      </td>
                      <td className="px-5 py-3.5">
                        <span className="px-2 py-0.5 rounded-full text-xs font-medium" style={{ color: itemDeptColor(i.deptId), background: `${itemDeptColor(i.deptId)}15` }}>
                          {itemDeptName(i.deptId)}
                        </span>
                      </td>
                      <td className="px-5 py-3.5 text-slate-500">{i.category}</td>
                      <td className="px-5 py-3.5">
                        <span className={low ? "text-amber-700 font-medium" : "text-slate-600"}>
                          {i.stock} {i.unit}
                        </span>
                        {low && <span className="ml-2 text-xs text-amber-600">● ใกล้หมด</span>}
                      </td>
                      <td className="px-5 py-3.5 text-slate-500">฿{fmtMoney(i.price)}</td>
                      <td className="px-5 py-3.5">
                        <div className="flex justify-end gap-2">
                          <button onClick={() => setEditing(i)} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600">
                            <Edit2 size={14} />
                          </button>
                          <button onClick={() => handleDelete(i)} className="p-1.5 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-500">
                            <Trash2 size={14} />
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {(showAdd || editing) && (
        <ItemForm
          initial={editing}
          notify={notify}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          onSave={(data) => {
            if (editing) {
              setItems((prev) => prev.map((i) => (i.id === editing.id ? { ...i, ...data } : i)));
              notify("success", "บันทึกการแก้ไขแล้ว");
            } else {
              setItems((prev) => [...prev, { id: uid(), ...data }]);
              notify("success", "เพิ่มสินค้าใหม่แล้ว");
            }
            setShowAdd(false);
            setEditing(null);
          }}
        />
      )}
    </div>
  );
}

function ItemForm({ initial, onSave, onClose, notify }) {
  const [form, setForm] = useState(
    initial
      ? { ...initial, deptId: initial.deptId || "central", stock: String(initial.stock), minStock: String(initial.minStock), price: String(initial.price) }
      : { sku: "", name: "", unit: "ชิ้น", stock: "0", minStock: "5", price: "0", category: "ทั่วไป", deptId: "central" }
  );

  const handleSave = () => {
    if (!form.name.trim()) {
      notify?.("error", "กรุณากรอกชื่อสินค้า");
      return;
    }
    const stock = toNum(form.stock, NaN);
    const minStock = toNum(form.minStock, NaN);
    const price = toNum(form.price, NaN);
    if ([stock, minStock, price].some((n) => Number.isNaN(n))) {
      notify?.("error", "จำนวนคงเหลือ / ขั้นต่ำ / ราคา ต้องเป็นตัวเลขไม่ติดลบ");
      return;
    }
    onSave({
      sku: form.sku.trim(),
      name: form.name.trim(),
      unit: form.unit.trim() || "ชิ้น",
      category: form.category.trim() || "ทั่วไป",
      deptId: form.deptId,
      stock,
      minStock,
      price,
    });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">{initial ? "แก้ไขสินค้า" : "เพิ่มสินค้าใหม่"}</h3>
        <div className="space-y-3">
          <Field label="ชื่อสินค้า" value={form.name} onChange={(v) => setForm({ ...form, name: v })} />
          <label className="block">
            <span className="text-xs text-slate-500 mb-1 block">แผนก (ผู้ใช้สินค้า)</span>
            <select
              value={form.deptId}
              onChange={(e) => setForm({ ...form, deptId: e.target.value })}
              className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
            >
              {ITEM_DEPT_OPTIONS.map((d) => (
                <option key={d.id} value={d.id}>{d.name}{d.id === "central" ? " (ทุกแผนกเห็น)" : ""}</option>
              ))}
            </select>
          </label>
          <div className="grid grid-cols-2 gap-3">
            <Field label="SKU" value={form.sku} onChange={(v) => setForm({ ...form, sku: v })} />
            <Field label="หมวดหมู่" value={form.category} onChange={(v) => setForm({ ...form, category: v })} />
          </div>
          <div className="grid grid-cols-3 gap-3">
            <Field label="หน่วย" value={form.unit} onChange={(v) => setForm({ ...form, unit: v })} />
            <Field label="คงเหลือ" type="number" value={form.stock} onChange={(v) => setForm({ ...form, stock: v })} />
            <Field label="ขั้นต่ำ" type="number" value={form.minStock} onChange={(v) => setForm({ ...form, minStock: v })} />
          </div>
          <Field label="ราคา/หน่วย (บาท)" type="number" value={form.price} onChange={(v) => setForm({ ...form, price: v })} />
        </div>
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">
            ยกเลิก
          </button>
          <button
            onClick={handleSave}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F]"
          >
            บันทึก
          </button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type = "text" }) {
  return (
    <label className="block">
      <span className="text-xs text-slate-500 mb-1 block">{label}</span>
      <input
        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"
      />
    </label>
  );
}

// ---------- Requisitions ----------
function Requisitions({ requisitions, setRequisitions, items, setItems, user, purchaseOrders, setPurchaseOrders, notify, confirm }) {
  const [filter, setFilter] = useState("all");
  const [showNew, setShowNew] = useState(false);
  const isAdmin = user.id === "admin";
  const canApprove = isAdmin;
  const myItems = visibleItems(items, user);

  const submitNew = ({ item, qty, note }) => {
    setRequisitions((prev) => [
      {
        id: uid(),
        itemId: item.id,
        itemName: item.name,
        qty,
        note,
        status: "pending",
        deptId: user.id,
        deptName: user.name,
        createdAt: Date.now(),
      },
      ...prev,
    ]);
    setShowNew(false);
    notify("success", "ส่งคำขอเบิกแล้ว รออนุมัติ");
  };

  const list = requisitions
    .filter((r) => (isAdmin ? true : r.deptId === user.id))
    .filter((r) => filter === "all" || r.status === filter)
    .sort((a, b) => b.createdAt - a.createdAt);

  // Approve: verify stock, guard against double-processing, deduct atomically
  const approve = (req) => {
    const item = items.find((i) => i.id === req.itemId);
    if (!item) {
      notify("error", "ไม่พบสินค้านี้ในคลังแล้ว");
      return;
    }
    if (item.stock < req.qty) {
      notify("error", `สต็อกไม่พอ: คงเหลือ ${item.stock} ${item.unit} แต่ขอเบิก ${req.qty}`);
      return;
    }
    confirm({
      title: "ยืนยันการอนุมัติคำขอ?",
      message: `อนุมัติเบิก "${req.itemName}" จำนวน ${req.qty} ${item.unit} — จะตัดสต็อกทันที`,
      confirmLabel: "อนุมัติ",
      onConfirm: () => {
        let done = false;
        setRequisitions((prev) =>
          prev.map((r) => {
            if (r.id === req.id && r.status === "pending") { done = true; return { ...r, status: "approved", decidedAt: Date.now() }; }
            return r;
          })
        );
        // only deduct if the request was actually still pending (guards double-click)
        setItems((prev) => {
          if (!done) return prev;
          return prev.map((i) => (i.id === req.itemId ? { ...i, stock: Math.max(0, i.stock - req.qty) } : i));
        });
        if (done) notify("success", "อนุมัติและตัดสต็อกแล้ว");
      },
    });
  };

  const reject = (req) => {
    confirm({
      title: "ยืนยันการปฏิเสธคำขอ?",
      message: `ปฏิเสธคำขอเบิก "${req.itemName}" จำนวน ${req.qty}`,
      confirmLabel: "ปฏิเสธ",
      tone: "danger",
      onConfirm: () => {
        setRequisitions((prev) =>
          prev.map((r) => (r.id === req.id && r.status === "pending" ? { ...r, status: "rejected", decidedAt: Date.now() } : r))
        );
        notify("success", "ปฏิเสธคำขอแล้ว");
      },
    });
  };

  const raiseAsPO = (req) => {
    const item = items.find((i) => i.id === req.itemId);
    if (!item) { notify("error", "ไม่พบสินค้านี้ในคลัง"); return; }
    setPurchaseOrders((prev) => [
      {
        id: uid(),
        itemId: item.id,
        itemName: item.name,
        qty: Math.max(item.minStock * 2 - item.stock, req.qty),
        unitPrice: item.price,
        status: "ordered",
        createdAt: Date.now(),
        requestedBy: req.deptName,
        deptId: req.deptId,
        deptName: req.deptName,
        fromRequisition: req.id,
      },
      ...prev,
    ]);
    setRequisitions((prev) => prev.map((x) => (x.id === req.id ? { ...x, raisedPO: true } : x)));
    notify("success", "สร้างใบสั่งซื้อเพิ่มแล้ว");
  };

  const filters = ["all", "pending", "approved", "rejected", "fulfilled"];

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between gap-3">
        <div className="flex gap-2 overflow-x-auto pb-1">
          {filters.map((f) => (
            <button
              key={f}
              onClick={() => setFilter(f)}
              className={`px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors ${
                filter === f ? "bg-[#1E3A5F] text-white" : "bg-white text-slate-500 border border-slate-200 hover:bg-slate-50"
              }`}
            >
              {f === "all" ? "ทั้งหมด" : STATUS_META[f]?.label}
            </button>
          ))}
        </div>
        {!isAdmin && (
          <button
            onClick={() => setShowNew(true)}
            className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors shrink-0"
          >
            <Plus size={15} /> เบิกของ
          </button>
        )}
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        {list.length === 0 ? (
          <EmptyState icon={ClipboardList} title="ไม่มีคำขอเบิกในหมวดนี้" />
        ) : (
          <div className="divide-y divide-slate-50">
            {list.map((r) => (
              <div key={r.id} className="px-5 py-4 flex items-center justify-between gap-4">
                <div className="min-w-0">
                  <div className="font-medium text-slate-700 text-sm truncate">
                    {r.itemName} <span className="text-slate-400 font-normal">× {r.qty}</span>
                  </div>
                  <div className="text-xs text-slate-400 mt-0.5">
                    {r.deptName} · {fmtDate(r.createdAt)}
                  </div>
                  {r.note && <div className="text-xs text-slate-500 mt-1 italic">"{r.note}"</div>}
                </div>
                <div className="flex items-center gap-2 shrink-0">
                  {canApprove && r.status === "pending" ? (
                    <>
                      <button
                        onClick={() => approve(r)}
                        className="p-2 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-100"
                        title="อนุมัติ"
                      >
                        <Check size={15} />
                      </button>
                      <button
                        onClick={() => reject(r)}
                        className="p-2 rounded-lg bg-red-50 text-red-500 hover:bg-red-100"
                        title="ปฏิเสธ"
                      >
                        <X size={15} />
                      </button>
                    </>
                  ) : (
                    <Badge status={r.status} />
                  )}
                  {canApprove && r.status === "approved" && !r.raisedPO && (
                    <button
                      onClick={() => raiseAsPO(r)}
                      className="text-xs text-violet-600 hover:underline whitespace-nowrap"
                    >
                      สั่งซื้อเพิ่ม
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {showNew && (
        <RequisitionForm items={myItems} notify={notify} onClose={() => setShowNew(false)} onSubmit={submitNew} />
      )}
    </div>
  );
}

// Modal: create a new requisition by picking an item (scoped) + qty (capped at stock) + note
function RequisitionForm({ items, onSubmit, onClose, notify }) {
  const [itemId, setItemId] = useState(items[0]?.id || "");
  const [qty, setQty] = useState("1");
  const [note, setNote] = useState("");
  const item = items.find((i) => i.id === itemId);
  const qtyNum = toNum(qty, NaN);
  const overStock = item && Number.isFinite(qtyNum) && qtyNum > item.stock;
  const valid = item && Number.isFinite(qtyNum) && qtyNum > 0 && qtyNum <= item.stock;

  const handleSubmit = () => {
    if (!item) { notify?.("error", "กรุณาเลือกสินค้า"); return; }
    if (!Number.isFinite(qtyNum) || qtyNum <= 0) { notify?.("error", "กรุณากรอกจำนวนที่ต้องการเบิก"); return; }
    if (qtyNum > item.stock) { notify?.("error", `เบิกได้ไม่เกิน ${item.stock} ${item.unit} (คงเหลือในสต็อก)`); return; }
    onSubmit({ item, qty: qtyNum, note: note.trim() });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">เบิกของ</h3>
        {items.length === 0 ? (
          <p className="text-sm text-slate-500 mb-4">ยังไม่มีสินค้าสำหรับแผนกนี้ กรุณาให้แอดมินเพิ่มสินค้าก่อน</p>
        ) : (
          <div className="space-y-3">
            <label className="block">
              <span className="text-xs text-slate-500 mb-1 block">สินค้า</span>
              <select
                value={itemId}
                onChange={(e) => setItemId(e.target.value)}
                className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
              >
                {items.map((i) => <option key={i.id} value={i.id}>{i.name} ({i.sku}) — คงเหลือ {i.stock}</option>)}
              </select>
            </label>
            <div>
              <Field label={item ? `จำนวน (${item.unit}) — สูงสุด ${item.stock}` : "จำนวน"} type="number" value={qty} onChange={setQty} />
              {overStock && <div className="text-xs text-red-500 mt-1">เกินจำนวนคงเหลือในสต็อก</div>}
            </div>
            <label className="block">
              <span className="text-xs text-slate-500 mb-1 block">หมายเหตุ (ไม่บังคับ)</span>
              <textarea
                value={note}
                onChange={(e) => setNote(e.target.value)}
                rows={2}
                className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
                placeholder="เช่น ใช้สำหรับงานวันที่..."
              />
            </label>
          </div>
        )}
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">ยกเลิก</button>
          <button
            onClick={handleSubmit}
            disabled={!valid}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40 disabled:cursor-not-allowed"
          >
            ส่งคำขอเบิก
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- Purchase Orders ----------
function PurchaseOrders({ purchaseOrders, setPurchaseOrders, items, setItems, user, notify, confirm }) {
  const [showNew, setShowNew] = useState(false);
  const isAdmin = user.id === "admin";
  const canReceive = isAdmin;

  const receive = (po) => {
    confirm({
      title: "ยืนยันรับของเข้าคลัง?",
      message: `รับ "${po.itemName}" จำนวน ${po.qty} เข้าสต็อกใช่หรือไม่`,
      confirmLabel: "รับของ",
      onConfirm: () => {
        let done = false;
        setPurchaseOrders((prev) =>
          prev.map((p) => {
            if (p.id === po.id && p.status === "ordered") { done = true; return { ...p, status: "received", receivedAt: Date.now() }; }
            return p;
          })
        );
        setItems((prev) => {
          if (!done) return prev;
          return prev.map((i) => (i.id === po.itemId ? { ...i, stock: i.stock + po.qty } : i));
        });
        if (done) notify("success", "รับของเข้าคลังแล้ว");
      },
    });
  };

  const scoped = isAdmin ? purchaseOrders : purchaseOrders.filter((p) => p.deptId === user.id);
  const sorted = [...scoped].sort((a, b) => b.createdAt - a.createdAt);
  const totalOpenValue = scoped.filter(p => p.status === "ordered").reduce((s, p) => s + p.qty * p.unitPrice, 0);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <div className="text-sm text-slate-500">
          มูลค่าสั่งซื้อค้างรับ{isAdmin ? " (ทุกแผนก)" : ""}: <span className="font-semibold text-slate-700">฿{fmtMoney(totalOpenValue)}</span>
        </div>
        <button
          onClick={() => setShowNew(true)}
          className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors"
        >
          <Plus size={15} /> สั่งซื้อ
        </button>
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        {sorted.length === 0 ? (
          <EmptyState icon={ShoppingCart} title="ยังไม่มีรายการสั่งซื้อ" sub="กดปุ่มสั่งซื้อเพื่อสร้างรายการใหม่ หรืออนุมัติคำขอเบิกแล้วสั่งซื้อเพิ่ม" />
        ) : (
          <div className="divide-y divide-slate-50">
            {sorted.map((po) => (
              <div key={po.id} className="px-5 py-4 flex items-center justify-between gap-4">
                <div className="min-w-0">
                  <div className="font-medium text-slate-700 text-sm">
                    {po.itemName} <span className="text-slate-400 font-normal">× {po.qty}</span>
                  </div>
                  <div className="text-xs text-slate-400 mt-0.5">
                    ฿{fmtMoney(po.qty * po.unitPrice)} · {po.deptName || po.requestedBy} · {fmtDate(po.createdAt)}
                  </div>
                </div>
                <div className="flex items-center gap-2 shrink-0">
                  <Badge status={po.status} />
                  {canReceive && po.status === "ordered" && (
                    <button
                      onClick={() => receive(po)}
                      className="text-xs px-3 py-1.5 rounded-lg bg-[#EFF4FA] text-[#1E3A5F] font-medium hover:bg-[#E1EAF3]"
                    >
                      รับของแล้ว
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {showNew && (
        <NewPOForm
          items={visibleItems(items, user)}
          notify={notify}
          onClose={() => setShowNew(false)}
          onSave={(data) => {
            setPurchaseOrders((prev) => [
              { id: uid(), status: "ordered", createdAt: Date.now(), requestedBy: user.name, deptId: user.id, deptName: user.name, ...data },
              ...prev,
            ]);
            setShowNew(false);
            notify("success", "สร้างรายการสั่งซื้อแล้ว");
          }}
        />
      )}
    </div>
  );
}

function NewPOForm({ items, onSave, onClose, notify }) {
  const [itemId, setItemId] = useState(items[0]?.id || "");
  const [qty, setQty] = useState("10");
  const item = items.find((i) => i.id === itemId);
  const qtyNum = toNum(qty, NaN);
  const valid = item && Number.isFinite(qtyNum) && qtyNum > 0;

  const handleSave = () => {
    if (!item) { notify?.("error", "กรุณาเลือกสินค้า"); return; }
    if (!Number.isFinite(qtyNum) || qtyNum <= 0) { notify?.("error", "จำนวนที่สั่งต้องมากกว่า 0"); return; }
    onSave({ itemId: item.id, itemName: item.name, qty: qtyNum, unitPrice: item.price });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">สั่งซื้อสินค้า</h3>
        {items.length === 0 ? (
          <p className="text-sm text-slate-500 mb-4">ยังไม่มีสินค้าสำหรับแผนกนี้ กรุณาให้แอดมินเพิ่มสินค้าก่อน</p>
        ) : (
          <div className="space-y-3">
            <label className="block">
              <span className="text-xs text-slate-500 mb-1 block">สินค้า</span>
              <select
                value={itemId}
                onChange={(e) => setItemId(e.target.value)}
                className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
              >
                {items.map((i) => <option key={i.id} value={i.id}>{i.name} ({i.sku})</option>)}
              </select>
            </label>
            <Field label="จำนวนที่สั่ง" type="number" value={qty} onChange={setQty} />
            {item && valid && <div className="text-xs text-slate-400">ราคา/หน่วย ฿{fmtMoney(item.price)} · รวม ฿{fmtMoney(item.price * qtyNum)}</div>}
          </div>
        )}
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">ยกเลิก</button>
          <button
            onClick={handleSave}
            disabled={!valid}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40 disabled:cursor-not-allowed"
          >
            สั่งซื้อ
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- App shell ----------
function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [items, setItems] = useState(SEED_ITEMS);
  const [requisitions, setRequisitions] = useState([]);
  const [purchaseOrders, setPurchaseOrders] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [confirmState, setConfirmState] = useState(null);

  // Toast helper
  const notify = useCallback((type, msg) => {
    const id = uid();
    setToasts((prev) => [...prev, { id, type, msg }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 3000);
  }, []);

  // Confirm helper: opens a single shared modal
  const confirm = useCallback((opts) => setConfirmState(opts), []);

  useEffect(() => {
    (async () => {
      const data = await loadAll();
      if (data.items) setItems(data.items);
      if (data.requisitions) setRequisitions(data.requisitions);
      if (data.purchaseOrders) setPurchaseOrders(data.purchaseOrders);
      setLoaded(true);
    })();
  }, []);

  // Consolidated, debounced persistence — one effect, one timer, saves only what changed
  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => {
      save("items", items);
      save("requisitions", requisitions);
      save("purchaseOrders", purchaseOrders);
    }, 400);
    return () => clearTimeout(t);
  }, [items, requisitions, purchaseOrders, loaded]);

  if (!user) return <Login onLogin={setUser} />;

  const isAdmin = user.id === "admin";
  // Admin manages the inventory; departments see ภาพรวม + เบิกของ + สั่งซื้อ
  const nav = isAdmin
    ? [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "inventory", label: "คลังสินค้า", icon: Package },
        { id: "requisitions", label: "คำขอเบิก", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ]
    : [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "requisitions", label: "เบิกของ", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ];

  // If current tab isn't available for this role (e.g. department on "inventory"), fall back to dashboard
  const activeTab = nav.some((n) => n.id === tab) ? tab : "dashboard";

  return (
    <div className="min-h-screen bg-[#F7F9FC] flex text-slate-800" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>
      {/* Sidebar */}
      <aside className="w-64 bg-[#0F1E33] text-white flex flex-col shrink-0 hidden md:flex">
        <button
          onClick={() => setUser(null)}
          title="กลับหน้าเลือกแผนก"
          className="px-5 py-5 flex items-center gap-2.5 border-b border-white/10 hover:bg-white/5 transition-colors text-left"
        >
          <div className="w-8 h-8 rounded-lg bg-[#1B3A5C] flex items-center justify-center shrink-0">
            <Factory size={16} className="text-[#7FD4A8]" />
          </div>
          <div className="min-w-0">
            <div className="text-[10px] text-slate-400 tracking-widest uppercase leading-none mb-1">Nachi Factory 4</div>
            <div className="font-semibold text-sm tracking-tight leading-none">Store Engineering</div>
          </div>
        </button>
        <nav className="flex-1 px-3 py-4 space-y-1">
          {nav.map((n) => (
            <button
              key={n.id}
              onClick={() => setTab(n.id)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${
                activeTab === n.id ? "bg-white/10 text-white" : "text-slate-400 hover:bg-white/5 hover:text-slate-200"
              }`}
            >
              <n.icon size={17} />
              {n.label}
            </button>
          ))}
        </nav>
        <div className="p-3 border-t border-white/10">
          <div className="flex items-center gap-2.5 px-2 py-2">
            {(() => {
              const Icon = DEPT_ICON[user.icon] || Package;
              return (
                <div
                  className="w-8 h-8 rounded-lg flex items-center justify-center text-white shrink-0"
                  style={{ background: user.color }}
                >
                  <Icon size={15} />
                </div>
              );
            })()}
            <div className="min-w-0">
              <div className="text-xs font-medium truncate">{user.name}</div>
              <div className="text-xs text-slate-400">{user.id === "admin" ? "ผู้ดูแลระบบ" : "แผนกผลิต"}</div>
            </div>
          </div>
          <button
            onClick={() => setUser(null)}
            className="w-full flex items-center gap-2 px-3 py-2 mt-1 rounded-lg text-xs text-slate-400 hover:bg-white/5 hover:text-slate-200"
          >
            <LogOut size={13} /> ออกจากระบบ
          </button>
        </div>
      </aside>

      {/* Mobile top bar */}
      <div className="md:hidden fixed bottom-0 left-0 right-0 bg-[#0F1E33] flex justify-around py-2 z-40">
        {nav.map((n) => (
          <button
            key={n.id}
            onClick={() => setTab(n.id)}
            className={`flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg text-[10px] ${
              activeTab === n.id ? "text-white" : "text-slate-500"
            }`}
          >
            <n.icon size={18} />
            {n.label}
          </button>
        ))}
      </div>

      {/* Main */}
      <main className="flex-1 p-5 md:p-8 pb-20 md:pb-8 max-w-6xl">
        <div className="flex items-center justify-between mb-6">
          <div className="flex items-center gap-3">
            <button
              onClick={() => setUser(null)}
              title="กลับหน้าเลือกแผนก"
              className="w-9 h-9 rounded-xl border border-slate-200 bg-white flex items-center justify-center text-slate-500 hover:bg-slate-50 hover:text-[#1E3A5F] transition-colors shrink-0"
            >
              <Home size={16} />
            </button>
            <div>
              <h1 className="text-xl font-semibold text-slate-800">
                {nav.find((n) => n.id === activeTab)?.label}
              </h1>
              <p className="text-sm text-slate-400 mt-0.5">
                {activeTab === "dashboard" && "ภาพรวมคลังสินค้าและคำขอ"}
                {activeTab === "inventory" && "รายการสินค้าคงคลังทั้งหมด"}
                {activeTab === "requisitions" && (isAdmin ? "คำขอเบิกของและการอนุมัติ" : "เบิกของและติดตามสถานะ")}
                {activeTab === "po" && "สั่งซื้อและสถานะการจัดส่ง"}
              </p>
            </div>
          </div>
          {(() => {
            const Icon = DEPT_ICON[user.icon] || Package;
            return (
              <div
                className="md:hidden w-9 h-9 rounded-lg flex items-center justify-center text-white shrink-0"
                style={{ background: user.color }}
              >
                <Icon size={16} />
              </div>
            );
          })()}
        </div>

        {activeTab === "dashboard" && (
          <Dashboard items={items} requisitions={requisitions} purchaseOrders={purchaseOrders} user={user} />
        )}
        {activeTab === "inventory" && (
          <Inventory items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} />
        )}
        {activeTab === "requisitions" && (
          <Requisitions
            requisitions={requisitions}
            setRequisitions={setRequisitions}
            items={items}
            setItems={setItems}
            user={user}
            purchaseOrders={purchaseOrders}
            setPurchaseOrders={setPurchaseOrders}
            notify={notify}
            confirm={confirm}
          />
        )}
        {activeTab === "po" && (
          <PurchaseOrders purchaseOrders={purchaseOrders} setPurchaseOrders={setPurchaseOrders} items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} />
        )}
      </main>

      <ConfirmModal
        open={!!confirmState}
        title={confirmState?.title}
        message={confirmState?.message}
        confirmLabel={confirmState?.confirmLabel}
        tone={confirmState?.tone}
        onConfirm={confirmState?.onConfirm || (() => {})}
        onClose={() => setConfirmState(null)}
      />
      <Toast toasts={toasts} />
    </div>
  );
}

    /* ================= END APP CODE ================= */

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
