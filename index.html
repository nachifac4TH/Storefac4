      confirmLabel: "รับของ",
      onConfirm: () => {
        if (db.cloud) {
          db.receivePO(po.id)
            .then(async () => {
              // Attachments were only reference photos — remove them once goods arrived
              if (po.imageUrls && po.imageUrls.length) {
                await db.deleteImages(po.imageUrls);
                await db.clearPOImages(po.id);
              }
              notify("success", "รับของเข้าคลังแล้ว");
            })
            .catch(() => notify("error", "รับของไม่สำเร็จ"));
          return;
        }
        let done = false;
        setPurchaseOrders((prev) =>
          prev.map((p) => {
            if (p.id === po.id && p.status !== "received" && p.status !== "rejected" && p.status !== "pending_approval") { done = true; return { ...p, status: "received", receivedAt: Date.now() }; }
            return p;
          })
        );
        setItems((prev) => {
          if (!done) return prev;
          return prev.map((i) => (i.id === po.itemId ? { ...i, stock: i.stock + po.qty } : i));
        });
        if (done) notify("success", "รับของเข้าคลังแล้ว");
      },
    });
  };

  const scoped = (isAdmin ? purchaseOrders : purchaseOrders.filter((p) => p.deptId === user.id))
    .filter((p) => !search || p.itemName.toLowerCase().includes(search.toLowerCase()) || (p.deptName || "").toLowerCase().includes(search.toLowerCase()));
  const sorted = [...scoped].sort((a, b) => b.createdAt - a.createdAt);
  const openStatuses = ["pending_approval", "awaiting_order", "awaiting_supplier", "awaiting_import"];
  const totalOpenValue = scoped.filter((p) => openStatuses.includes(p.status)).reduce((s, p) => s + p.qty * p.unitPrice, 0);

  // Admin: delete a PO. If it was already received, subtract the received qty back out of stock.
  const undoReceived = (po) => {
    if (po.status !== "received") return;
    const cur = items.find((i) => i.id === po.itemId);
    const newStock = Math.max(0, (cur ? cur.stock : 0) - po.qty);
    if (db.cloud && cur) db.updateItem(po.itemId, { ...cur, stock: newStock }).catch(() => {});
    setItems((prev) => prev.map((i) => (i.id === po.itemId ? { ...i, stock: Math.max(0, i.stock - po.qty) } : i)));
  };
  const deletePO = (po) => {
    const willAdjust = po.status === "received";
    confirm({
      title: "ลบรายการสั่งซื้อนี้?",
      message: willAdjust
        ? `ลบ "${po.itemName}" × ${po.qty} — เนื่องจากรับของแล้ว จะหักสต็อก ${po.qty} ออกด้วย`
        : `ลบ "${po.itemName}" × ${po.qty} ออกจากรายการ`,
      confirmLabel: "ลบ",
      tone: "danger",
      onConfirm: () => {
        undoReceived(po);
        if (db.cloud) {
          if (po.imageUrls && po.imageUrls.length) db.deleteImages(po.imageUrls);
          db.deletePO(po.id).catch((e) => notify("error", "ลบไม่สำเร็จ: " + (e && e.message ? e.message : "")));
        }
        setPurchaseOrders((prev) => prev.filter((x) => x.id !== po.id));
        notify("success", "ลบรายการสั่งซื้อแล้ว");
      },
    });
  };
  const clearPOs = () => {
    if (sorted.length === 0) return;
    confirm({
      title: "ล้างรายการสั่งซื้อทั้งหมด?",
      message: `จะลบ ${sorted.length} รายการที่แสดงอยู่ (รายการที่รับของแล้วจะหักสต็อกคืนด้วย)`,
      confirmLabel: "ล้างทั้งหมด",
      tone: "danger",
      onConfirm: () => {
        sorted.forEach(undoReceived);
        const ids = sorted.map((p) => p.id);
        if (db.cloud) db.clearPOs(ids).catch((e) => notify("error", "ล้างไม่สำเร็จ: " + (e && e.message ? e.message : "")));
        setPurchaseOrders((prev) => prev.filter((x) => !ids.includes(x.id)));
        notify("success", "ล้างรายการสั่งซื้อแล้ว");
      },
    });
  };

  return (
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div className={`text-sm ${dark ? "text-slate-400" : "text-slate-500"}`}>
          มูลค่าค้างรับ{isAdmin ? " (ทุกแผนก)" : ""}: <span className={`font-semibold ${dark ? "text-white" : "text-slate-700"}`}>฿{fmtMoney(totalOpenValue)}</span>
        </div>
        <div className="flex gap-2">
          <div className="relative flex-1 sm:w-56">
            <Search size={15} className={`absolute left-3 top-1/2 -translate-y-1/2 ${dark ? "text-slate-500" : "text-slate-400"}`} />
            <input
              value={search}
              onChange={(e) => setSearch(e.target.value)}
              placeholder="ค้นหารายการ / แผนก"
              className={`w-full pl-9 pr-3 py-2.5 rounded-xl border text-sm focus:outline-none focus:ring-2 ${dark ? "bg-white/5 border-white/10 text-white placeholder-slate-500 focus:ring-[#7FD4A8]/30" : "border-slate-200 focus:ring-[#1E3A5F]/20"}`}
            />
          </div>
          {!isAdmin && (
            <button
              onClick={() => setShowNew(true)}
              className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors shrink-0"
            >
              <Plus size={15} /> สั่งซื้อ
            </button>
          )}
          {isAdmin && sorted.length > 0 && (
            <button
              onClick={clearPOs}
              className="flex items-center gap-1.5 px-3 py-2.5 rounded-xl text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 transition-colors shrink-0"
            >
              <Trash2 size={14} /> ล้างทั้งหมด
            </button>
          )}
        </div>
      </div>

      <div className={`rounded-2xl border overflow-hidden ${card}`}>
        {sorted.length === 0 ? (
          <EmptyState icon={ShoppingCart} title={isAdmin ? "ยังไม่มีรายการขอสั่งซื้อ" : "ยังไม่มีรายการสั่งซื้อ"} sub={isAdmin ? "รอแผนกส่งคำขอสั่งซื้อเข้ามา" : "กดปุ่มสั่งซื้อเพื่อสร้างรายการใหม่"} />
        ) : (
          <div className={`divide-y ${rowDivide}`}>
            {sorted.map((po) => (
              <div key={po.id} className="px-5 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <div className="min-w-0">
                  <div className={`font-medium text-sm flex items-center gap-2 ${dark ? "text-slate-100" : "text-slate-700"}`}>
                    <span>{po.itemName} <span className={dark ? "text-slate-500 font-normal" : "text-slate-400 font-normal"}>× {po.qty}</span></span>
                    {po.urgent && (
                      <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold bg-red-500 text-white">
                        <AlertTriangle size={10} /> ด่วน
                      </span>
                    )}
                    {!po.itemId && (
                      <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold ${dark ? "bg-amber-500/20 text-amber-300" : "bg-amber-100 text-amber-700"}`}>
                        นอกรายการ
                      </span>
                    )}
                  </div>
                  <div className={`text-xs mt-0.5 ${dark ? "text-slate-500" : "text-slate-400"}`}>
                    ฿{fmtMoney(po.qty * po.unitPrice)} · {po.deptName || po.requestedBy}
                    {po.line ? ` · Line ${po.line}` : ""}{po.machine ? ` · ${po.machine}` : ""}
                    {" · "}{fmtDateTime(po.createdAt)}
                  </div>
                  {po.imageUrls && po.imageUrls.length > 0 ? (
                    <div className="flex items-center gap-2 mt-2">
                      {po.imageUrls.map((url, idx) => (
                        <button
                          key={idx}
                          onClick={(e) => { e.stopPropagation(); setPreviewImg({ urls: po.imageUrls, index: idx, title: po.itemName }); }}
                          className={`w-14 h-14 rounded-lg overflow-hidden border shrink-0 hover:ring-2 hover:ring-[#7FD4A8] transition-all ${dark ? "border-white/15 bg-white/5" : "border-slate-200 bg-slate-50"}`}
                          title="กดเพื่อดูภาพใหญ่"
                        >
                          <img src={url} alt={`แนบรูป ${idx + 1}`} className="w-full h-full object-cover" loading="lazy" />
                        </button>
                      ))}
                    </div>
                  ) : po.imageCount ? (
                    <div className={`text-[11px] mt-0.5 ${dark ? "text-slate-500" : "text-slate-400"}`}>แนบรูป {po.imageCount} ภาพ</div>
                  ) : null}
                  {po.note && <div className={`text-xs mt-1 italic ${dark ? "text-slate-400" : "text-slate-500"}`}>"{po.note}"</div>}
                </div>

                <div className="flex items-center gap-2 shrink-0">
                  {/* Admin controls */}
                  {isAdmin && po.status === "pending_approval" && (
                    <>
                      <button onClick={() => approve(po)} className="p-2.5 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-100" title="อนุมัติ" aria-label="อนุมัติ">
                        <Check size={16} />
                      </button>
                      <button onClick={() => reject(po)} className="p-2.5 rounded-lg bg-red-50 text-red-500 hover:bg-red-100" title="ปฏิเสธ" aria-label="ปฏิเสธ">
                        <X size={16} />
                      </button>
                    </>
                  )}
                  {isAdmin && PO_WORKFLOW.includes(po.status) && (
                    <>
                      <select
                        value={po.status}
                        onChange={(e) => changeStatus(po, e.target.value)}
                        className="text-xs px-2 py-2 rounded-lg border border-slate-200 bg-white text-slate-600 focus:outline-none"
                      >
                        {PO_WORKFLOW.map((s) => <option key={s} value={s}>{PO_STATUS[s].label}</option>)}
                      </select>
                      <button
                        onClick={() => receive(po)}
                        title="ยืนยันว่าของเข้าคลังแล้ว (สต็อกจะเพิ่มอัตโนมัติ)"
                        className="flex items-center gap-1.5 text-xs px-3.5 py-2 rounded-lg bg-emerald-600 text-white font-semibold shadow-sm hover:bg-emerald-500 active:bg-emerald-700 whitespace-nowrap transition-colors"
                      >
                        <Check size={14} strokeWidth={3} /> ได้รับของแล้ว
                      </button>
                    </>
                  )}
                  {(isAdmin && (po.status === "received" || po.status === "rejected")) && <Badge status={po.status} map={PO_STATUS} />}
                  {/* User: status only */}
                  {!isAdmin && <Badge status={po.status} map={PO_STATUS} />}
                  {isAdmin && (
                    <button onClick={() => deletePO(po)} className="p-2 rounded-lg text-red-500 hover:bg-red-50" title="ลบรายการ" aria-label="ลบรายการสั่งซื้อ">
                      <Trash2 size={15} />
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {showNew && (
        <NewPOForm
          items={visibleItems(items, user)}
          user={user}
          notify={notify}
          onClose={() => setShowNew(false)}
          onSave={async (data) => {
            const { files, imageCount, ...rest } = data;
            if (db.cloud) {
              setShowNew(false);
              try {
                const imageUrls = await db.uploadImages(files || []);
                await db.createPO({ ...rest, requestedBy: user.name, imageUrls });
                if ((files || []).length > imageUrls.length) {
                  notify("error", `ส่งคำขอแล้ว แต่อัปโหลดรูปได้ ${imageUrls.length}/${files.length} ภาพ`);
                } else {
                  notify("success", "ส่งคำขอสั่งซื้อแล้ว รออนุมัติ");
                }
              } catch (e) { notify("error", "ส่งคำขอไม่สำเร็จ: " + (e && e.message ? e.message : "")); }
              return;
            }
            setPurchaseOrders((prev) => [
              { id: uid(), status: "pending_approval", createdAt: Date.now(), requestedBy: user.name, imageCount, ...rest },
              ...prev,
            ]);
            setShowNew(false);
            notify("success", "ส่งคำขอสั่งซื้อแล้ว รออนุมัติ");
          }}
        />
      )}

      {/* Attached image viewer */}
      {previewImg && (
        <div className="fixed inset-0 bg-black/85 z-[80] flex flex-col" onClick={() => setPreviewImg(null)}>
          <div className="flex items-center justify-between px-4 py-3 text-white shrink-0">
            <div className="text-sm font-medium truncate pr-3">
              {previewImg.title}
              <span className="text-white/60 ml-2">{previewImg.index + 1}/{previewImg.urls.length}</span>
            </div>
            <button onClick={() => setPreviewImg(null)} className="p-2 rounded-lg hover:bg-white/10" aria-label="ปิด">
              <X size={22} />
            </button>
          </div>
          <div className="flex-1 flex items-center justify-center p-4 min-h-0" onClick={(e) => e.stopPropagation()}>
            <img src={previewImg.urls[previewImg.index]} alt="รูปแนบ" className="max-w-full max-h-full object-contain rounded-lg" />
          </div>
          {previewImg.urls.length > 1 && (
            <div className="flex justify-center gap-2 p-4 shrink-0" onClick={(e) => e.stopPropagation()}>
              {previewImg.urls.map((u, i) => (
                <button
                  key={i}
                  onClick={() => setPreviewImg({ ...previewImg, index: i })}
                  className={`w-12 h-12 rounded-lg overflow-hidden border-2 transition-all ${i === previewImg.index ? "border-[#7FD4A8]" : "border-white/20 opacity-60"}`}
                >
                  <img src={u} alt="" className="w-full h-full object-cover" />
                </button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function NewPOForm({ items, user, onSave, onClose, notify }) {
  const defaultDept = user.id === "admin" ? DEPARTMENTS[0].id : user.id;
  // De-duplicate items by id (guards against any duplicate rows from sync)
  const uniqueItems = React.useMemo(() => {
    const seen = new Set();
    return items.filter((i) => (seen.has(i.id) ? false : (seen.add(i.id), true)));
  }, [items]);
  const [search, setSearch] = useState("");
  const [pickerOpen, setPickerOpen] = useState(false);
  const pickerRef = React.useRef(null);
  const [itemId, setItemId] = useState(uniqueItems[0]?.id || "");
  const [qty, setQty] = useState("10");
  const [deptId, setDeptId] = useState(defaultDept);
  const [line, setLine] = useState("");
  const [machine, setMachine] = useState("");
  const [note, setNote] = useState("");
  const [urgent, setUrgent] = useState(false);
  const [images, setImages] = useState([]); // {name, url, file} previews
  // Off-catalog order: part seen on the machine but not in the item list yet
  const [customMode, setCustomMode] = useState(false);
  const [customName, setCustomName] = useState("");
  const [customPrice, setCustomPrice] = useState("");
  const item = uniqueItems.find((i) => i.id === itemId);
  const qtyNum = toNum(qty, NaN);
  const deptName = (DEPARTMENTS.find((d) => d.id === deptId) || {}).name || deptId;
  const priceNum = customMode ? toNum(customPrice, 0) : (item ? item.price : 0);
  const valid = customMode
    ? customName.trim().length > 0 && Number.isFinite(qtyNum) && qtyNum > 0 && line && machine && images.length > 0
    : item && Number.isFinite(qtyNum) && qtyNum > 0 && line && machine;

  // Close the item dropdown when clicking outside
  useEffect(() => {
    const onDoc = (e) => { if (pickerRef.current && !pickerRef.current.contains(e.target)) setPickerOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);

  // When dropdown is open, filter by typed text; when closed, show the selected item name
  const filtered = uniqueItems.filter(
    (i) => i.name.toLowerCase().includes(search.toLowerCase()) || i.sku.toLowerCase().includes(search.toLowerCase())
  );
  const selectItem = (i) => {
    setItemId(i.id);
    setSearch("");
    setPickerOpen(false);
  };

  const onPickImages = (e) => {
    const files = Array.from(e.target.files || []).slice(0, 3 - images.length);
    const next = files.map((f) => ({ name: f.name, url: URL.createObjectURL(f), file: f }));
    setImages((prev) => [...prev, ...next].slice(0, 3));
    e.target.value = "";
  };
  const removeImage = (idx) => setImages((prev) => prev.filter((_, i) => i !== idx));

  const handleSave = () => {
    if (customMode) {
      if (!customName.trim()) { notify?.("error", "กรุณากรอกชื่อ/รายละเอียดสินค้า"); return; }
      if (images.length === 0) { notify?.("error", "สินค้านอกรายการต้องแนบรูปอย่างน้อย 1 ภาพ"); return; }
    } else if (!item) {
      notify?.("error", "กรุณาเลือกสินค้า"); return;
    }
    if (!Number.isFinite(qtyNum) || qtyNum <= 0) { notify?.("error", "จำนวนที่สั่งต้องมากกว่า 0"); return; }
    if (!line || !machine) { notify?.("error", "กรุณาเลือก Line และเครื่องจักร"); return; }
    onSave({
      itemId: customMode ? null : item.id,
      itemName: customMode ? customName.trim() : item.name,
      qty: qtyNum,
      unitPrice: priceNum,
      deptId, deptName, line, machine, note: note.trim(), urgent,
      imageCount: images.length,
      files: images.map((im) => im.file).filter(Boolean),
    });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">สั่งซื้อสินค้า</h3>

        {/* Mode switch: pick from catalog vs order a part not in the system */}
        <div className="flex gap-2 mb-4 p-1 rounded-xl bg-slate-100">
          <button
            type="button"
            onClick={() => setCustomMode(false)}
            className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${!customMode ? "bg-white text-[#1E3A5F] shadow-sm" : "text-slate-500 hover:text-slate-700"}`}
          >
            เลือกจากคลัง
          </button>
          <button
            type="button"
            onClick={() => setCustomMode(true)}
            className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${customMode ? "bg-white text-[#1E3A5F] shadow-sm" : "text-slate-500 hover:text-slate-700"}`}
          >
            ของนอกรายการ
          </button>
        </div>

        {customMode ? (
          <div className="space-y-3">
            <div className="flex items-start gap-2 p-3 rounded-xl bg-amber-50 border border-amber-200">
              <AlertTriangle size={16} className="text-amber-500 shrink-0 mt-0.5" />
              <p className="text-xs text-amber-800 leading-relaxed">
                สำหรับอะไหล่ที่ยังไม่มีในคลัง — กรอกชื่อ/รายละเอียดเท่าที่ทราบ แล้ว<b>ถ่ายรูปของจริงที่เครื่องจักรแนบมาด้วย</b> เพื่อให้แอดมินสั่งซื้อได้ถูกต้อง
              </p>
            </div>
            <Field label="ชื่อ / รายละเอียดสินค้า" value={customName} onChange={setCustomName} />
            <Field label="ราคาต่อหน่วยโดยประมาณ (ถ้าทราบ)" type="number" value={customPrice} onChange={setCustomPrice} />
          </div>
        ) : items.length === 0 ? (
          <p className="text-sm text-slate-500 mb-4">ยังไม่มีสินค้าสำหรับแผนกนี้ — ใช้แท็บ "ของนอกรายการ" เพื่อสั่งพร้อมแนบรูปได้</p>
        ) : (
          <div className="space-y-3">
            <div ref={pickerRef}>
              <span className="text-xs text-slate-500 mb-1 block">ค้นหา / เลือกสินค้า</span>
              <div className="relative">
                <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                <input
                  value={pickerOpen ? search : (item ? `${item.name} (${item.sku})` : "")}
                  onChange={(e) => { setSearch(e.target.value); if (!pickerOpen) setPickerOpen(true); }}
                  onFocus={() => { setPickerOpen(true); setSearch(""); }}
                  placeholder="พิมพ์ชื่อสินค้า หรือ SKU"
                  className="w-full pl-9 pr-3 py-2.5 rounded-lg border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
                />
                {pickerOpen && (
                  <div className="absolute z-30 mt-1 w-full max-h-44 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg divide-y divide-slate-100">
                    {filtered.length === 0 ? (
                      <div className="px-3 py-3 text-sm text-slate-400">ไม่พบสินค้า</div>
                    ) : (
                      filtered.map((i) => (
                        <button
                          key={i.id}
                          type="button"
                          onClick={() => selectItem(i)}
                          className={`w-full text-left px-3 py-2.5 text-sm flex items-center justify-between gap-2 transition-colors ${
                            i.id === itemId ? "bg-[#1E3A5F] text-white" : "text-slate-700 hover:bg-slate-50"
                          }`}
                        >
                          <span className="min-w-0 truncate">{i.name} <span className={i.id === itemId ? "text-white/70" : "text-slate-400"}>({i.sku})</span></span>
                          <span className={`shrink-0 text-xs ${i.id === itemId ? "text-white/80" : "text-slate-400"}`}>คงเหลือ {i.stock}</span>
                        </button>
                      ))
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {(customMode || items.length > 0) && (
          <div className="space-y-3 mt-3">
            <Field label="จำนวนที่สั่ง" type="number" value={qty} onChange={setQty} />
            {Number.isFinite(qtyNum) && qtyNum > 0 && priceNum > 0 && (
              <div className="text-xs text-slate-400">ราคา/หน่วย ฿{fmtMoney(priceNum)} · รวม ฿{fmtMoney(priceNum * qtyNum)}</div>
            )}

            <DeptLineMachineFields user={user} deptId={deptId} setDeptId={setDeptId} line={line} setLine={setLine} machine={machine} setMachine={setMachine} />

            {/* Urgent order toggle */}
            <button
              type="button"
              onClick={() => setUrgent((v) => !v)}
              className={`w-full flex items-center justify-between gap-2 px-3.5 py-3 rounded-xl border transition-colors ${
                urgent ? "bg-red-50 border-red-300" : "bg-white border-slate-200 hover:bg-slate-50"
              }`}
            >
              <span className="flex items-center gap-2">
                <AlertTriangle size={16} className={urgent ? "text-red-500" : "text-slate-400"} />
                <span className={`text-sm font-medium ${urgent ? "text-red-600" : "text-slate-600"}`}>สั่งซื้อด่วน (Urgent)</span>
              </span>
              <span className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${urgent ? "bg-red-500" : "bg-slate-300"}`}>
                <span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform ${urgent ? "translate-x-5" : "translate-x-0.5"}`} />
              </span>
            </button>

            {/* Image attach — up to 3 (preview only, will persist after Supabase) */}
            <div>
              <span className="text-xs text-slate-500 mb-1 block">แนบรูป (สูงสุด 3 ภาพ)</span>
              <div className="flex gap-2 flex-wrap">
                {images.map((img, idx) => (
                  <div key={idx} className="relative w-16 h-16 rounded-lg overflow-hidden border border-slate-200">
                    <img src={img.url} alt={img.name} className="w-full h-full object-cover" />
                    <button onClick={() => removeImage(idx)} className="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/60 text-white flex items-center justify-center" aria-label="ลบรูป">
                      <X size={11} />
                    </button>
                  </div>
                ))}
                {images.length < 3 && (
                  <label className="w-16 h-16 rounded-lg border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-400 cursor-pointer hover:border-[#1E3A5F] hover:text-[#1E3A5F]">
                    <Plus size={18} />
                    <input type="file" accept="image/*" multiple onChange={onPickImages} className="hidden" />
                  </label>
                )}
              </div>
              <div className="text-[11px] text-slate-400 mt-1">* รูปจะถูกอัปโหลดเก็บถาวร แอดมินเปิดดูได้ในรายการสั่งซื้อ</div>
            </div>

            <label className="block">
              <span className="text-xs text-slate-500 mb-1 block">หมายเหตุ (ไม่บังคับ)</span>
              <textarea
                value={note}
                onChange={(e) => setNote(e.target.value)}
                rows={2}
                className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
                placeholder="รายละเอียดเพิ่มเติม..."
              />
            </label>
          </div>
        )}
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">ยกเลิก</button>
          <button
            onClick={handleSave}
            disabled={!valid}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40 disabled:cursor-not-allowed"
          >
            ส่งคำขอสั่งซื้อ
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- App shell ----------
function App() {
  const [user, setUser] = useState(null);
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(!CLOUD); // localStorage mode = ready immediately
  const [tab, setTab] = useState("dashboard");
  const [items, setItems] = useState(SEED_ITEMS);
  const [requisitions, setRequisitions] = useState([]);
  const [purchaseOrders, setPurchaseOrders] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [confirmState, setConfirmState] = useState(null);

  // Toast helper
  const notify = useCallback((type, msg) => {
    const id = uid();
    setToasts((prev) => [...prev, { id, type, msg }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 3000);
  }, []);

  // Confirm helper: opens a single shared modal
  const confirm = useCallback((opts) => setConfirmState(opts), []);

  // Track Supabase session (cloud mode)
  useEffect(() => {
    if (!CLOUD) return;
    let sub;
    db.getSession()
      .then((s) => { setSession(s); })
      .catch((e) => { console.warn("getSession failed:", e); })
      .finally(() => setAuthReady(true));
    try {
      const r = sb.auth.onAuthStateChange((_e, s) => setSession(s));
      sub = r && r.data ? r.data.subscription : null;
    } catch (e) {}
    return () => { try { sub && sub.unsubscribe(); } catch (e) {} };
  }, []);

  const reload = useCallback(async () => {
    try {
      const data = await db.loadAll();
      setItems(data.items);
      setRequisitions(data.requisitions);
      setPurchaseOrders(data.purchaseOrders);
    } catch (e) {
      console.warn("loadAll failed:", e);
    } finally {
      setLoaded(true);
    }
  }, []);

  useEffect(() => {
    reload();
    let t;
    const unsub = db.subscribe(() => { clearTimeout(t); t = setTimeout(() => reload(), 250); });
    return () => { clearTimeout(t); unsub(); };
  }, [reload, session]);

  // Keep data fresh: poll periodically + refresh when returning to the app.
  // (Backup for realtime, which can drop after sleep / network changes.)
  useEffect(() => {
    if (!db.cloud) return;
    const REFRESH_MS = 20000;
    const tick = setInterval(() => {
      if (typeof document === "undefined" || document.visibilityState !== "hidden") reload();
    }, REFRESH_MS);
    const onVisible = () => { if (document.visibilityState === "visible") reload(); };
    const onOnline = () => reload();
    try {
      document.addEventListener("visibilitychange", onVisible);
      window.addEventListener("focus", onVisible);
      window.addEventListener("online", onOnline);
    } catch (e) {}
    return () => {
      clearInterval(tick);
      try {
        document.removeEventListener("visibilitychange", onVisible);
        window.removeEventListener("focus", onVisible);
        window.removeEventListener("online", onOnline);
      } catch (e) {}
    };
  }, [reload]);

  // Debounced local persistence (only when Supabase is NOT configured)
  useEffect(() => {
    if (!loaded || db.cloud) return;
    const t = setTimeout(() => {
      save("items", items);
      save("requisitions", requisitions);
      save("purchaseOrders", purchaseOrders);
    }, 400);
    return () => clearTimeout(t);
  }, [items, requisitions, purchaseOrders, loaded]);

  const logout = useCallback(() => {
    setUser(null);
    if (CLOUD) db.signOut().then(() => setSession(null));
  }, []);

  // Never block the first paint on the network: departments can use the app
  // without a session, and the admin login modal handles the session itself.
  if (!user) return <Login onLogin={setUser} session={session} onSignedIn={setSession} notify={notify} />;

  const isAdmin = user.id === "admin";
  // Admin manages the inventory; departments see ภาพรวม + เบิกของ + สั่งซื้อ
  const nav = isAdmin
    ? [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "inventory", label: "คลังสินค้า", icon: Package },
        { id: "requisitions", label: "คำขอเบิก", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ]
    : [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "requisitions", label: "เบิกของ", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ];

  // If current tab isn't available for this role (e.g. department on "inventory"), fall back to dashboard
  const activeTab = nav.some((n) => n.id === tab) ? tab : "dashboard";
  const dark = !isAdmin; // department users get the dark theme; admin stays light

  return (
    <div
      className="min-h-screen flex flex-col"
      style={{
        fontFamily: "'Inter', system-ui, sans-serif",
        background: dark ? "linear-gradient(180deg,#0a1628 0%,#0d1f38 100%)" : "#F7F9FC",
        color: dark ? "#e2e8f0" : "#1e293b",
      }}
    >
      {/* Top navigation bar */}
      <header className="bg-[#0F1E33] text-white sticky top-0 z-40">
        <div className="max-w-6xl mx-auto px-4 md:px-6">
          {/* Row 1: logo + department + logout */}
          <div className="flex items-center justify-between h-16">
            <button
              onClick={() => setUser(null)}
              title="กลับหน้าเลือกแผนก"
              className="flex items-center gap-2.5 hover:opacity-90 transition-opacity"
            >
              <div className="h-9 flex items-center gap-2.5 px-2.5 rounded-xl bg-white shrink-0 shadow-sm">
                <img src={NACHI_LOGO} alt="NACHI" className="h-4 w-auto" />
                <span className="h-4 w-px bg-slate-200 shrink-0" />
                <span className="text-[#0F1E33] text-[9px] sm:text-[10px] font-extrabold tracking-[0.2em] uppercase leading-none">
                  Factory 4
                </span>
              </div>
              <div className="text-left leading-none hidden md:block">
                <div className="font-bold text-[15px] tracking-tight text-white">Store Engineering</div>
              </div>
            </button>

            <div className="flex items-center gap-2 md:gap-3 min-w-0">
              <div className="flex items-center gap-2 px-2.5 py-1.5 rounded-xl bg-white/10 border border-white/10 min-w-0">
                {(() => {
                  const Icon = DEPT_ICON[user.icon] || Package;
                  return (
                    <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{ background: user.color }}>
                      <Icon size={14} />
                    </div>
                  );
                })()}
                <div className="leading-none min-w-0">
                  <div className="text-[13px] font-semibold text-white truncate max-w-[120px] sm:max-w-none">{user.name}</div>
                  <div className="text-[10px] text-slate-300 mt-0.5 hidden sm:block">{user.id === "admin" ? "ผู้ดูแลระบบ" : "แผนกผลิต"}</div>
                </div>
              </div>
              <button
                onClick={logout}
                title="ออกจากระบบ"
                aria-label="ออกจากระบบ"
                className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-medium text-slate-200 border border-white/10 hover:bg-white/10 hover:text-white transition-colors shrink-0"
              >
                <LogOut size={15} /> <span className="hidden sm:inline">ออกจากระบบ</span>
              </button>
            </div>
          </div>

          {/* Row 2: nav tabs — pill style, larger touch targets, scrollable on mobile */}
          <nav className="flex gap-2 overflow-x-auto no-scrollbar pb-3 pt-1">
            {nav.map((n) => {
              const active = activeTab === n.id;
              return (
                <button
                  key={n.id}
                  onClick={() => setTab(n.id)}
                  aria-current={active ? "page" : undefined}
                  className={`flex items-center gap-2 px-4 sm:px-5 py-2.5 rounded-full text-[15px] whitespace-nowrap shrink-0 transition-all duration-150 ${
                    active
                      ? "bg-[#7FD4A8] text-[#0F1E33] font-bold shadow-lg shadow-[#7FD4A8]/20"
                      : "bg-white/[0.07] text-slate-200 font-medium hover:bg-white/[0.14] hover:text-white active:scale-95"
                  }`}
                >
                  <n.icon size={19} strokeWidth={active ? 2.5 : 2} />
                  {n.label}
                </button>
              );
            })}
          </nav>
        </div>
      </header>

      {/* Main */}
      <main className="flex-1 w-full max-w-6xl mx-auto p-5 md:p-8">
        <div className="mb-6">
          <h1 className={`text-xl font-semibold ${dark ? "text-white" : "text-slate-800"}`}>
            {nav.find((n) => n.id === activeTab)?.label}
          </h1>
          <p className={`text-sm mt-0.5 ${dark ? "text-slate-400" : "text-slate-400"}`}>
            {activeTab === "dashboard" && "ภาพรวมคลังสินค้าและคำขอ"}
            {activeTab === "inventory" && "รายการสินค้าคงคลังทั้งหมด"}
            {activeTab === "requisitions" && (isAdmin ? "คำขอเบิกของและการอนุมัติ" : "เบิกของและติดตามสถานะ")}
            {activeTab === "po" && "สั่งซื้อและสถานะการจัดส่ง"}
          </p>
        </div>

        {activeTab === "dashboard" && (
          <Dashboard items={items} requisitions={requisitions} purchaseOrders={purchaseOrders} user={user} notify={notify} dark={dark} />
        )}
        {activeTab === "inventory" && (
          <Inventory items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} />
        )}
        {activeTab === "requisitions" && (
          <Requisitions
            requisitions={requisitions}
            setRequisitions={setRequisitions}
            items={items}
            setItems={setItems}
            user={user}
            purchaseOrders={purchaseOrders}
            setPurchaseOrders={setPurchaseOrders}
            notify={notify}
            confirm={confirm}
            dark={dark}
          />
        )}
        {activeTab === "po" && (
          <PurchaseOrders purchaseOrders={purchaseOrders} setPurchaseOrders={setPurchaseOrders} items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} dark={dark} />
        )}
      </main>

      <ConfirmModal
        open={!!confirmState}
        title={confirmState?.title}
        message={confirmState?.message}
        confirmLabel={confirmState?.confirmLabel}
        tone={confirmState?.tone}
        onConfirm={confirmState?.onConfirm || (() => {})}
        onClose={() => setConfirmState(null)}
      />
      <Toast toasts={toasts} />
    </div>
  );
}

    /* ================= END APP CODE ================= */

    try {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    } catch (err) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">' +
        '<b>เกิดข้อผิดพลาดในการโหลดแอป</b><br/><br/>' +
        String(err && err.message ? err.message : err) + '</div>';
      console.error(err);
    }
  </script>
</body>
</html>
