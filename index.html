// Parse a single CSV line respecting quoted fields (handles commas & escaped quotes inside quotes)
function parseCSVLine(line) {
  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ",") { out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map((c) => c.trim());
}

// Safely coerce a numeric input; returns fallback when empty / NaN / negative
function toNum(v, fallback = 0) {
  if (v === "" || v === null || v === undefined) return fallback;
  const n = Number(v);
  return Number.isFinite(n) && n >= 0 ? n : fallback;
}

// ---------- localStorage helpers (used when Supabase not configured) ----------
const LS_PREFIX = "nachi_store_";
async function localLoadAll() {
  const keys = ["items", "requisitions", "purchaseOrders"];
  const out = {};
  for (const k of keys) {
    try {
      const raw = localStorage.getItem(LS_PREFIX + k);
      out[k] = raw ? JSON.parse(raw) : null;
    } catch { out[k] = null; }
  }
  return out;
}
async function save(key, value) {
  if (CLOUD) return; // cloud is the source of truth; no local save needed
  try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); }
  catch (e) { console.error("storage save failed", key, e); }
}

// ---------- Unified data access (cloud or local) ----------
const db = {
  cloud: !!CLOUD,

  async loadAll() {
    if (!CLOUD) {
      const { items, requisitions, purchaseOrders } = await localLoadAll();
      return {
        items: items || SEED_ITEMS,
        requisitions: requisitions || [],
        purchaseOrders: purchaseOrders || [],
      };
    }
    const [i, r, p] = await Promise.all([
      sb.from("items").select("*").order("created_at", { ascending: true }),
      sb.from("requisitions").select("*").order("created_at", { ascending: false }),
      sb.from("purchase_orders").select("*").order("created_at", { ascending: false }),
    ]);
    return {
      items: (i.data || []).map(itemFromRow),
      requisitions: (r.data || []).map(reqFromRow),
      purchaseOrders: (p.data || []).map(poFromRow),
    };
  },

  subscribe(onChange) {
    if (!CLOUD) return () => {};
    // Realtime uses WebSocket, which some sandboxes / corporate networks block.
    // If it fails we degrade gracefully — the polling refresh keeps data current.
    try {
      const ch = sb
        .channel("store-changes")
        .on("postgres_changes", { event: "*", schema: "public", table: "items" }, onChange)
        .on("postgres_changes", { event: "*", schema: "public", table: "requisitions" }, onChange)
        .on("postgres_changes", { event: "*", schema: "public", table: "purchase_orders" }, onChange)
        .subscribe();
      return () => { try { sb.removeChannel(ch); } catch (e) {} };
    } catch (e) {
      console.warn("Realtime unavailable, falling back to periodic refresh:", e);
      return () => {};
    }
  },

  // Items
  async addItem(item) {
    if (!CLOUD) return null;
    const { data, error } = await sb.from("items").insert(itemToRow(item)).select().single();
    if (error) throw error;
    return itemFromRow(data);
  },
  async addItems(items) {
    if (!CLOUD) return null;
    // insert in chunks so very large CSV imports don't hit payload limits
    const rows = items.map(itemToRow);
    const CHUNK = 200;
    for (let i = 0; i < rows.length; i += CHUNK) {
      const { error } = await sb.from("items").insert(rows.slice(i, i + CHUNK));
      if (error) throw error;
    }
  },
  async updateItem(id, item) {
    if (!CLOUD) return null;
    const { error } = await sb.from("items").update(itemToRow(item)).eq("id", id);
    if (error) throw error;
  },
  async deleteItem(id) {
    if (!CLOUD) return null;
    const { error } = await sb.from("items").delete().eq("id", id);
    if (error) throw error;
  },

  // Requisition (atomic withdraw via RPC — concurrency-safe)
  async withdraw({ itemId, qty, deptId, deptName, line, machine, note }) {
    if (!CLOUD) return null;
    const { data, error } = await sb.rpc("withdraw_item", {
      p_item_id: itemId, p_qty: qty, p_dept_id: deptId, p_dept_name: deptName,
      p_line: line, p_machine: machine, p_note: note || "",
    });
    if (error) throw error;
    return data ? reqFromRow(Array.isArray(data) ? data[0] : data) : null;
  },

  // Purchase orders
  async uploadImages(files) {
    if (!CLOUD || !files || files.length === 0) return [];
    const urls = [];
    for (const f of files.slice(0, 3)) {
      const path = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${f.name}`.replace(/[^\w.\-]/g, "_");
      const { error } = await sb.storage.from("po-images").upload(path, f, { upsert: false });
      if (!error) {
        const { data } = sb.storage.from("po-images").getPublicUrl(path);
        if (data && data.publicUrl) urls.push(data.publicUrl);
      }
    }
    return urls;
  },
  async deleteImages(urls) {
    if (!CLOUD || !urls || urls.length === 0) return;
    // Public URL looks like .../storage/v1/object/public/po-images/<path>
    const paths = urls
      .map((u) => {
        const marker = "/po-images/";
        const i = String(u).indexOf(marker);
        return i === -1 ? null : decodeURIComponent(String(u).slice(i + marker.length));
      })
      .filter(Boolean);
    if (paths.length === 0) return;
    try { await sb.storage.from("po-images").remove(paths); } catch (e) { console.warn("delete images failed:", e); }
  },
  async clearPOImages(id) {
    if (!CLOUD) return;
    try { await sb.from("purchase_orders").update({ image_urls: [] }).eq("id", id); }
    catch (e) { console.warn("clear image_urls failed:", e); }
  },
  async createPO(po) {
    if (!CLOUD) return null;
    const row = {
      item_id: po.itemId, item_name: po.itemName, qty: po.qty, unit_price: po.unitPrice,
      note: po.note || "", status: "pending_approval", dept_id: po.deptId, dept_name: po.deptName,
      requested_by: po.requestedBy, line: po.line || "", machine: po.machine || "",
      image_urls: po.imageUrls || [], urgent: !!po.urgent,
    };
    const { data, error } = await sb.from("purchase_orders").insert(row).select().single();
    if (error) throw error;
    return poFromRow(data);
  },
  async updatePOStatus(id, status, extra = {}) {
    if (!CLOUD) return null;
    const patch = { status, ...extra };
    const { error } = await sb.from("purchase_orders").update(patch).eq("id", id);

  // Deletes return the removed rows so we can detect RLS blocking (0 rows = not permitted)
  async deleteRequisition(id) {

    if (error) throw error;
    if (!data || data.length === 0) throw new Error("ไม่มีสิทธิ์ลบ (RLS)");

  async deletePO(id) {

    if (error) throw error;
    if (!data || data.length === 0) throw new Error("ไม่มีสิทธิ์ลบ (RLS)");

    if (error) throw error;
    if (!data || data.length === 0) throw new Error("ไม่มีสิทธิ์ลบ (RLS)");

    const { data, error } = await sb.from("purchase_orders").delete().in("id", ids).select("id");
    if (error) throw error;
    if (!data || data.length === 0) throw new Error("ไม่มีสิทธิ์ลบ (RLS)");
  },

  // ---------- Auth (cloud only) ----------
  async getSession() {
    if (!CLOUD) return null;
    const { data } = await sb.auth.getSession();
    return data ? data.session : null;
  },
  async signIn(email, password) {
    if (!CLOUD) return { error: null };

    const gear = (cx, cy, r, fill, teeth = 9) => {
      const pts = [];
      for (let i = 0; i < teeth; i++) {
        const a = (i / teeth) * Math.PI * 2;
        const a2 = a + Math.PI / teeth;
        pts.push(`${cx + Math.cos(a) * (r + 5)},${cy + Math.sin(a) * (r + 5)}`);
        pts.push(`${cx + Math.cos(a2) * r},${cy + Math.sin(a2) * r}`);
      }
      return (
        <g>
          <polygon points={pts.join(" ")} fill={fill} />
          <circle cx={cx} cy={cy} r={r * 0.45} fill="#7c3a06" />
        </g>
      );
    };
    return (
      <svg {...common}>
        <defs>
          <linearGradient id="gr1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#fbbf77" /><stop offset="1" stopColor="#c2711d" /></linearGradient>
          <linearGradient id="gr2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#f0a95a" /><stop offset="1" stopColor="#a85e12" /></linearGradient>
        </defs>
        <ellipse cx="52" cy="82" rx="30" ry="8" fill="#7c3a06" opacity="0.3" />
        {gear(38, 44, 20, "url(#gr1)", 10)}
        {gear(66, 60, 15, "url(#gr2)", 9)}
      </svg>
    );
  }
  if (kind === "assembly") {
    // Robot arm
    return (
      <svg {...common}>
        <defs>
          <linearGradient id="as1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stopColor="#c4b5fd" /><stop offset="1" stopColor="#7c4fd6" /></linearGradient>

// Device biometric unlock via WebAuthn (Face ID / fingerprint) — like banking apps.
// The device's secure enclave handles the face/fingerprint; we never see or store any face data.
const WEBAUTHN_KEY = "nachi_admin_cred"; // stores the registered credential id (base64) on this device

function b64urlToBuf(s) {
  s = s.replace(/-/g, "+").replace(/_/g, "/");
  const pad = s.length % 4 ? "=".repeat(4 - (s.length % 4)) : "";
  const bin = atob(s + pad);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}
function bufToB64url(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

function FaceScan({ onVerified, onBack }) {
  const [supported, setSupported] = useState(true);
  const [registered, setRegistered] = useState(false);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  useEffect(() => {
    const ok = typeof window !== "undefined" && window.PublicKeyCredential && navigator.credentials;
    setSupported(!!ok);
    try { setRegistered(!!localStorage.getItem(WEBAUTHN_KEY)); } catch (e) {}
  }, []);

  const randomBytes = (n) => {
    const a = new Uint8Array(n);
    (window.crypto || window.msCrypto).getRandomValues(a);
    return a;
  };

  // First-time setup on this device: create a passkey bound to Face ID / fingerprint
  const register = async () => {
    setBusy(true); setMsg("");
    try {
      const cred = await navigator.credentials.create({
        publicKey: {
          challenge: randomBytes(32),
          rp: { name: "NACHI Store Engineering" },
          user: { id: randomBytes(16), name: "admin@nachi", displayName: "Admin" },
          pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
          authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
          timeout: 60000,
        },
      });
      const id = bufToB64url(cred.rawId);
      localStorage.setItem(WEBAUTHN_KEY, id);
      setRegistered(true);
      setMsg("ตั้งค่าสำเร็จ — แตะปุ่มด้านล่างเพื่อเข้าสู่ระบบ");
    } catch (e) {
      setMsg("ตั้งค่าไม่สำเร็จ หรือถูกยกเลิก");
    } finally { setBusy(false); }
  };

  // Unlock: prompt the device biometric (Face ID / fingerprint)
  const unlock = async () => {
    setBusy(true); setMsg("");
    try {
      const id = localStorage.getItem(WEBAUTHN_KEY);
      await navigator.credentials.get({
        publicKey: {
          challenge: randomBytes(32),
          allowCredentials: id ? [{ type: "public-key", id: b64urlToBuf(id) }] : [],
          userVerification: "required",
          timeout: 60000,
        },
      });
      onVerified();
    } catch (e) {
      setMsg("ยืนยันตัวตนไม่สำเร็จ หรือถูกยกเลิก");
    } finally { setBusy(false); }
  };

  return (
    <div className="p-5 space-y-4">
      <div className="flex flex-col items-center text-center gap-3 py-2">
        <div className="w-20 h-20 rounded-3xl flex items-center justify-center" style={{ background: "linear-gradient(145deg, rgba(16,185,129,0.25), rgba(255,255,255,0.05))", boxShadow: "inset 0 1px 1px rgba(255,255,255,0.25)" }}>
          <ScanLine size={40} className="text-emerald-400" />
        </div>
        {!supported ? (
          <p className="text-slate-300 text-sm">อุปกรณ์/เบราว์เซอร์นี้ไม่รองรับ Face ID บนเว็บ<br /><span className="text-slate-400 text-xs">กรุณาใช้รหัสผ่านแทน</span></p>
        ) : registered ? (
          <p className="text-slate-300 text-sm">แตะเพื่อปลดล็อกด้วย Face ID / ลายนิ้วมือของเครื่อง</p>
        ) : (
          <p className="text-slate-300 text-sm">ตั้งค่าครั้งแรกบนอุปกรณ์นี้<br /><span className="text-slate-400 text-xs">ระบบจะใช้ Face ID / ลายนิ้วมือของเครื่อง (ไม่เก็บรูปใบหน้า)</span></p>
        )}
        {msg && <div className="text-xs text-amber-400">{msg}</div>}
      </div>

      <div className="space-y-2">
        {supported && !registered && (
          <button onClick={register} disabled={busy} className="w-full py-3 rounded-xl bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 disabled:opacity-50">
            {busy ? "กำลังตั้งค่า..." : "ตั้งค่า Face ID / ลายนิ้วมือ"}
          </button>
        )}
        {supported && registered && (
          <button onClick={unlock} disabled={busy} className="w-full py-3 rounded-xl bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 disabled:opacity-50 flex items-center justify-center gap-2">
            <ScanLine size={18} /> {busy ? "กำลังยืนยัน..." : "ปลดล็อกด้วย Face ID"}

function exportExcel({ items, requisitions, purchaseOrders, notify }) {
  try {
    if (typeof window.XLSX === "undefined") { notify?.("error", "โหลดตัวช่วย Excel ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต"); return; }
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();

    const invRows = items.map((i) => ({
      SKU: i.sku, ชื่อสินค้า: i.name, แผนก: itemDeptName(i.deptId), หมวดหมู่: i.category,
      คงเหลือ: i.stock, ขั้นต่ำ: i.minStock, หน่วย: i.unit, "ราคา/หน่วย": i.price,
      สถานะ: i.stock <= i.minStock ? "ใกล้หมด" : "ปกติ",
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(invRows), "คลังสินค้า");

    const reqRows = requisitions.map((r) => ({
      วันเวลา: fmtDateTime(r.createdAt), สินค้า: r.itemName, จำนวน: r.qty,
      แผนก: r.deptName, Line: r.line || "", เครื่องจักร: r.machine || "", หมายเหตุ: r.note || "",
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(reqRows.length ? reqRows : [{ ว่าง: "ไม่มีข้อมูล" }]), "ประวัติการเบิก");

    const poRows = purchaseOrders.map((p) => ({
      วันเวลา: fmtDateTime(p.createdAt), สินค้า: p.itemName, จำนวน: p.qty,
      มูลค่า: p.qty * p.unitPrice, แผนก: p.deptName || p.requestedBy, Line: p.line || "",
      เครื่องจักร: p.machine || "", สถานะ: (PO_STATUS[p.status] || {}).label || p.status,
    }));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(poRows.length ? poRows : [{ ว่าง: "ไม่มีข้อมูล" }]), "สั่งซื้อ");

    const stamp = new Date().toISOString().slice(0, 10);
    XLSX.writeFile(wb, `Nachi-Store-${stamp}.xlsx`);
    notify?.("success", "ส่งออก Excel แล้ว");
  } catch (e) {
    notify?.("error", "ส่งออก Excel ไม่สำเร็จ");
  }
}

async function exportPDF(elementId, notify) {
  try {
    if (typeof window.html2canvas === "undefined" || typeof window.jspdf === "undefined") {
      notify?.("error", "โหลดตัวช่วย PDF ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต");
      return;
    }
    const el = document.getElementById(elementId);
    if (!el) { notify?.("error", "ไม่พบเนื้อหาที่จะส่งออก"); return; }
    const canvas = await window.html2canvas(el, { scale: 2, backgroundColor: "#F7F9FC", useCORS: true });
    const img = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const w = pw - 16;
    const h = (canvas.height * w) / canvas.width;
    let y = 8, remaining = h;
    // paginate if the content is taller than one page
    if (h <= ph - 16) {
      pdf.addImage(img, "PNG", 8, y, w, h);
    } else {
      let sy = 0;
      const pageContentH = ph - 16;
      const ratio = canvas.width / w;
      while (remaining > 0) {
        const sliceH = Math.min(pageContentH, remaining);
        const sCanvas = document.createElement("canvas");
        sCanvas.width = canvas.width;
        sCanvas.height = sliceH * ratio;
        const ctx = sCanvas.getContext("2d");
        ctx.drawImage(canvas, 0, sy * ratio, canvas.width, sliceH * ratio, 0, 0, canvas.width, sliceH * ratio);
        pdf.addImage(sCanvas.toDataURL("image/png"), "PNG", 8, 8, w, sliceH);
        remaining -= sliceH;
        sy += sliceH;
        if (remaining > 0) pdf.addPage();
      }
    }
    const stamp = new Date().toISOString().slice(0, 10);
    pdf.save(`Nachi-Store-${stamp}.pdf`);
    notify?.("success", "ส่งออก PDF แล้ว");
  } catch (e) {
    notify?.("error", "ส่งออก PDF ไม่สำเร็จ");
  }
}

      confirmLabel: "ลบสินค้า",
      tone: "danger",
      onConfirm: () => {
        if (db.cloud) { db.deleteItem(item.id).then(() => notify("success", "ลบสินค้าแล้ว")).catch(() => notify("error", "ลบไม่สำเร็จ")); return; }
        setItems((prev) => prev.filter((i) => i.id !== item.id));
        notify("success", "ลบสินค้าแล้ว");
      },
    });

  const handleCSV = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const text = evt.target.result.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
        if (lines.length < 2) {
          notify("error", "ไฟล์ CSV ต้องมีหัวตารางและอย่างน้อย 1 แถว");
          return;
        }
        const header = parseCSVLine(lines[0]).map((h) => h.toLowerCase());
        const idx = (name) => header.indexOf(name);
        const newItems = lines.slice(1).map((line) => {
          const cols = parseCSVLine(line);
          return {
            id: uid(),
            sku: cols[idx("sku")] || `ST-${uid().slice(0, 4).toUpperCase()}`,
            name: cols[idx("name")] || cols[0] || "ไม่ระบุชื่อ",
            unit: cols[idx("unit")] || "ชิ้น",
            stock: toNum(cols[idx("stock")], 0),
            minStock: toNum(cols[idx("minstock")], 5),
            price: toNum(cols[idx("price")], 0),
            category: cols[idx("category")] || "ทั่วไป",
            supplier: cols[idx("supplier")] || "",
            deptId: (() => {
              const d = (cols[idx("dept")] || cols[idx("deptid")] || "").toLowerCase().trim();
              return ITEM_DEPT_OPTIONS.some((o) => o.id === d) ? d : "central";
            })(),
          };
        });
        if (db.cloud) {
          db.addItems(newItems).then(() => notify("success", `นำเข้าสินค้า ${newItems.length} รายการสำเร็จ`)).catch(() => notify("error", "นำเข้าไม่สำเร็จ"));
        } else {
          setItems((prev) => [...prev, ...newItems]);
          notify("success", `นำเข้าสินค้า ${newItems.length} รายการสำเร็จ`);
        }
      } catch (err) {
        notify("error", "อ่านไฟล์ CSV ไม่สำเร็จ ตรวจสอบรูปแบบไฟล์");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  return (
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row gap-3 sm:items-center sm:justify-between">
        <div className="relative flex-1 max-w-sm">
          <Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
          <input
            value={q}
            onChange={(e) => setQ(e.target.value)}
            placeholder="ค้นหาชื่อสินค้า หรือ SKU"
            className="w-full pl-9 pr-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"
          />
        </div>
        {canManage && (
          <div className="flex flex-wrap gap-2">
            <ExportBar items={items} requisitions={[]} purchaseOrders={[]} pdfTargetId="inventory-report" notify={notify} />
            <label className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 cursor-pointer transition-colors">
              <Upload size={15} /> นำเข้า CSV
              <input type="file" accept=".csv" onChange={handleCSV} className="hidden" />
            </label>
            <button
              onClick={() => setShowAdd(true)}
              className="flex items-center gap-1.5 px-4 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors"
            >
              <Plus size={15} /> เพิ่มสินค้า
            </button>
          </div>
        )}
      </div>

      <div id="inventory-report" className="bg-white rounded-2xl border border-slate-100 overflow-hidden">
        {filtered.length === 0 ? (
          <EmptyState icon={Package} title="ไม่พบสินค้า" sub="ลองค้นหาด้วยคำอื่น หรือเพิ่มสินค้าใหม่" />
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-left text-xs text-slate-400 border-b border-slate-100">
                  <th className="px-5 py-3 font-medium">สินค้า</th>
                  <th className="px-5 py-3 font-medium">แผนก</th>
                  <th className="px-5 py-3 font-medium">หมวดหมู่</th>
                  <th className="px-5 py-3 font-medium">คงเหลือ</th>
                  <th className="px-5 py-3 font-medium">ราคา/หน่วย</th>
                  <th className="px-5 py-3 font-medium text-right">การทำงาน</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {filtered.map((i) => {
                  const low = i.stock <= i.minStock;
                  return (
                    <tr key={i.id} className="hover:bg-slate-50/60">
                      <td className="px-5 py-3.5">
                        <div className="font-medium text-slate-700">{i.name}</div>
                        <div className="text-xs text-slate-400">{i.sku}</div>
                      </td>
                      <td className="px-5 py-3.5">
                        <span className="px-2 py-0.5 rounded-full text-xs font-medium" style={{ color: itemDeptColor(i.deptId), background: `${itemDeptColor(i.deptId)}15` }}>
                          {itemDeptName(i.deptId)}
                        </span>
                      </td>
                      <td className="px-5 py-3.5 text-slate-500">{i.category}</td>
                      <td className="px-5 py-3.5">
                        <span className={low ? "text-amber-700 font-medium" : "text-slate-600"}>
                          {i.stock} {i.unit}
                        </span>
                        {low && <span className="ml-2 text-xs text-amber-600">● ใกล้หมด</span>}
                      </td>
                      <td className="px-5 py-3.5 text-slate-500">฿{fmtMoney(i.price)}</td>
                      <td className="px-5 py-3.5">
                        <div className="flex justify-end gap-2">
                          <button onClick={() => setEditing(i)} className="p-2 rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600" aria-label="แก้ไขสินค้า">
                            <Edit2 size={15} />
                          </button>
                          <button onClick={() => handleDelete(i)} className="p-2 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-500" aria-label="ลบสินค้า">
                            <Trash2 size={15} />
                          </button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {(showAdd || editing) && (
        <ItemForm
          initial={editing}
          notify={notify}
          onClose={() => { setShowAdd(false); setEditing(null); }}
          onSave={(data) => {
            if (db.cloud) {
              const op = editing ? db.updateItem(editing.id, data) : db.addItem(data);
              op.then(() => notify("success", editing ? "บันทึกการแก้ไขแล้ว" : "เพิ่มสินค้าใหม่แล้ว")).catch(() => notify("error", "บันทึกไม่สำเร็จ"));
              setShowAdd(false);
              setEditing(null);
              return;
            }
            if (editing) {
              setItems((prev) => prev.map((i) => (i.id === editing.id ? { ...i, ...data } : i)));
              notify("success", "บันทึกการแก้ไขแล้ว");
            } else {
              setItems((prev) => [...prev, { id: uid(), ...data }]);
              notify("success", "เพิ่มสินค้าใหม่แล้ว");
            }
            setShowAdd(false);
            setEditing(null);
          }}
        />
      )}
    </div>
  );
}

function ItemForm({ initial, onSave, onClose, notify }) {
  const [form, setForm] = useState(
    initial
      ? { ...initial, deptId: initial.deptId || "central", supplier: initial.supplier || "", stock: String(initial.stock), minStock: String(initial.minStock), price: String(initial.price) }
      : { sku: "", name: "", unit: "ชิ้น", stock: "0", minStock: "5", price: "0", category: "ทั่วไป", deptId: "central", supplier: "" }
  );

  const handleSave = () => {
    if (!form.name.trim()) {
      notify?.("error", "กรุณากรอกชื่อสินค้า");
      return;
    }
    const stock = toNum(form.stock, NaN);
    const minStock = toNum(form.minStock, NaN);
    const price = toNum(form.price, NaN);
    if ([stock, minStock, price].some((n) => Number.isNaN(n))) {
      notify?.("error", "จำนวนคงเหลือ / ขั้นต่ำ / ราคา ต้องเป็นตัวเลขไม่ติดลบ");
      return;
    }
    onSave({
      sku: form.sku.trim(),
      name: form.name.trim(),
      unit: form.unit.trim() || "ชิ้น",
      category: form.category.trim() || "ทั่วไป",
      supplier: (form.supplier || "").trim(),
      deptId: form.deptId,
      stock,
      minStock,
      price,
    });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">{initial ? "แก้ไขสินค้า" : "เพิ่มสินค้าใหม่"}</h3>
        <div className="space-y-3">
          <Field label="ชื่อสินค้า" value={form.name} onChange={(v) => setForm({ ...form, name: v })} />
          <label className="block">
            <span className="text-xs text-slate-500 mb-1 block">แผนก (ผู้ใช้สินค้า)</span>
            <select
              value={form.deptId}
              onChange={(e) => setForm({ ...form, deptId: e.target.value })}
              className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
            >
              {ITEM_DEPT_OPTIONS.map((d) => (
                <option key={d.id} value={d.id}>{d.name}{d.id === "central" ? " (ทุกแผนกเห็น)" : ""}</option>
              ))}
            </select>
          </label>
          <div className="grid grid-cols-2 gap-3">
            <Field label="SKU" value={form.sku} onChange={(v) => setForm({ ...form, sku: v })} />
            <Field label="หมวดหมู่" value={form.category} onChange={(v) => setForm({ ...form, category: v })} />
          </div>
          <Field label="ผู้ขาย / Supplier" value={form.supplier || ""} onChange={(v) => setForm({ ...form, supplier: v })} />
          <div className="grid grid-cols-3 gap-3">
            <Field label="หน่วย" value={form.unit} onChange={(v) => setForm({ ...form, unit: v })} />
            <Field label="คงเหลือ" type="number" value={form.stock} onChange={(v) => setForm({ ...form, stock: v })} />
            <Field label="ขั้นต่ำ" type="number" value={form.minStock} onChange={(v) => setForm({ ...form, minStock: v })} />
          </div>
          <Field label="ราคา/หน่วย (บาท)" type="number" value={form.price} onChange={(v) => setForm({ ...form, price: v })} />
        </div>
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">
            ยกเลิก
          </button>
          <button
            onClick={handleSave}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F]"
          >
            บันทึก
          </button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, value, onChange, type = "text" }) {
  return (
    <label className="block">
      <span className="text-xs text-slate-500 mb-1 block">{label}</span>
      <input
        type={type}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"
      />
    </label>
  );
}

// ---------- Requisitions (เบิกของ) — no approval; stock deducts immediately ----------
function Requisitions({ requisitions, setRequisitions, items, setItems, user, purchaseOrders, setPurchaseOrders, notify, confirm, dark }) {
  const [search, setSearch] = useState("");
  const [pickedItem, setPickedItem] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [period, setPeriod] = useState("all"); // all | day | month | year
  const [deptFilter, setDeptFilter] = useState("all");
  const [category, setCategory] = useState("all");
  const isAdmin = user.id === "admin";
  const myItems = visibleItems(items, user);

  // Categories present in this department's catalog, most-used first
  const categories = React.useMemo(() => {
    const count = {};
    myItems.forEach((i) => { const c = (i.category || "ทั่วไป").trim(); count[c] = (count[c] || 0) + 1; });
    return Object.entries(count).sort((a, b) => b[1] - a[1]).map(([name, n]) => ({ name, n }));
  }, [myItems]);

  // "Frequently ordered" — most withdrawn items by this department
  const frequentItems = React.useMemo(() => {
    const mine = requisitions.filter((r) => isAdmin || r.deptId === user.id);
    const count = {};
    mine.forEach((r) => { if (r.itemId) count[r.itemId] = (count[r.itemId] || 0) + r.qty; });
    return Object.entries(count)
      .sort((a, b) => b[1] - a[1])
      .map(([id]) => myItems.find((i) => i.id === id))
      .filter((i) => i && i.stock > 0)
      .slice(0, 6);
  }, [requisitions, myItems, user, isAdmin]);

  const catalog = myItems.filter((i) => {
    const q = search.toLowerCase();
    const matchText = i.name.toLowerCase().includes(q) || i.sku.toLowerCase().includes(q);
    const matchCat = category === "all" || (i.category || "ทั่วไป").trim() === category;
    return matchText && matchCat;
  });

  const handleScan = (raw) => {
    const code = (raw || "").trim();
    setScanning(false);
    if (!code) return;
    const found = myItems.find(
      (i) => i.sku.toLowerCase() === code.toLowerCase() || i.name.toLowerCase() === code.toLowerCase()
    );
    if (found) {
      if (found.stock <= 0) { notify("error", `${found.name} หมดสต็อก`); return; }
      setPickedItem(found);
      notify("success", `พบสินค้า: ${found.name}`);
    } else {
      setSearch(code);
      notify("error", `ไม่พบสินค้ารหัส "${code}" — แสดงผลการค้นหาแทน`);
    }
  };

  // Withdraw immediately: deduct stock, record dept/line/machine + timestamp, mark fulfilled
  const submitWithdraw = ({ item, qty, deptId, deptName, line, machine, note }) => {
    const current = items.find((i) => i.id === item.id);
    if (!current || current.stock < qty) {
      notify("error", `สต็อกไม่พอ: คงเหลือ ${current ? current.stock : 0} ${item.unit}`);
      return;
    }
    if (db.cloud) {
      // Atomic server-side decrement (handles concurrent withdrawals during shift change)
      db.withdraw({ itemId: item.id, qty, deptId, deptName, line, machine, note })
        .then(() => notify("success", `เบิก ${item.name} × ${qty} — ตัดสต็อกแล้ว`))
        .catch((e) => {
          const msg = String(e && e.message || "");
          if (msg.includes("INSUFFICIENT_STOCK")) notify("error", "สต็อกไม่พอ (มีคนเบิกตัดไปพร้อมกัน) กรุณาลองใหม่");
          else notify("error", "บันทึกการเบิกไม่สำเร็จ");
        });
      setPickedItem(null);
      return;
    }
    // Local mode
    setItems((prev) => prev.map((i) => (i.id === item.id ? { ...i, stock: Math.max(0, i.stock - qty) } : i)));
    setRequisitions((prev) => [
      { id: uid(), itemId: item.id, itemName: item.name, qty, note, status: "fulfilled", deptId, deptName, line, machine, createdAt: Date.now() },
      ...prev,
    ]);
    setPickedItem(null);
    notify("success", `เบิก ${item.name} × ${qty} — ตัดสต็อกแล้ว`);
  };

  const now = new Date();
  const inPeriod = (ts) => {
    if (period === "all") return true;
    const d = new Date(ts);
    if (period === "day") return d.toDateString() === now.toDateString();
    if (period === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === "year") return d.getFullYear() === now.getFullYear();
    return true;
  };
  const list = requisitions
    .filter((r) => (isAdmin ? true : r.deptId === user.id))
    .filter((r) => (isAdmin && deptFilter !== "all" ? r.deptId === deptFilter : true))
    .filter((r) => inPeriod(r.createdAt))
    .sort((a, b) => b.createdAt - a.createdAt);

  // Admin: delete a requisition and return its qty to stock
  const returnStock = (r) => {
    if (r.status !== "fulfilled") return;
    const cur = items.find((i) => i.id === r.itemId);
    if (db.cloud && cur) { db.updateItem(r.itemId, { ...cur, stock: cur.stock + r.qty }).catch(() => {}); }
    setItems((prev) => prev.map((i) => (i.id === r.itemId ? { ...i, stock: i.stock + r.qty } : i)));
  };
  const deleteReq = (r) => {
    confirm({
      title: "ลบรายการเบิกนี้?",
      message: `ลบ "${r.itemName}" × ${r.qty} — ของ ${r.qty} จะถูกคืนเข้าคลัง`,
      confirmLabel: "ลบและคืนสต็อก",
      tone: "danger",
      onConfirm: () => {
        returnStock(r);
        if (db.cloud) db.deleteRequisition(r.id).catch((e) => notify("error", "ลบไม่สำเร็จ: " + (e && e.message ? e.message : "")));
        setRequisitions((prev) => prev.filter((x) => x.id !== r.id));
        notify("success", "ลบรายการและคืนสต็อกแล้ว");
      },
    });
  };
  const clearReqs = () => {
    if (list.length === 0) return;
    confirm({
      title: "ล้างประวัติการเบิกทั้งหมด?",
      message: `จะลบ ${list.length} รายการที่แสดงอยู่ และคืนสต็อกทั้งหมดกลับเข้าคลัง`,
      confirmLabel: "ล้างทั้งหมด",
      tone: "danger",
      onConfirm: () => {
        list.forEach(returnStock);
        const ids = list.map((r) => r.id);
        if (db.cloud) db.clearRequisitions(ids).catch((e) => notify("error", "ล้างไม่สำเร็จ: " + (e && e.message ? e.message : "")));
        setRequisitions((prev) => prev.filter((x) => !ids.includes(x.id)));
        notify("success", "ล้างประวัติและคืนสต็อกแล้ว");
      },
    });
  };

  const periods = [
    { id: "all", label: "ทั้งหมด" },
    { id: "day", label: "วันนี้" },
    { id: "month", label: "เดือนนี้" },
    { id: "year", label: "ปีนี้" },
  ];

  return (
    <div className="space-y-5">
      {/* Item catalog with search — departments withdraw by clicking an item */}
      {!isAdmin && (
        <div className={`rounded-2xl border overflow-hidden ${dark ? "bg-white/[0.03] border-white/10" : "bg-white border-slate-100"}`}>
          <div className={`px-4 sm:px-5 py-4 border-b ${dark ? "border-white/10" : "border-slate-100"}`}>
            <h3 className={`font-medium text-sm mb-3 ${dark ? "text-slate-100" : "text-slate-800"}`}>เลือกสินค้าเพื่อเบิก</h3>
            <div className="flex gap-2">
              <div className="relative flex-1">
                <Search size={16} className={`absolute left-3 top-1/2 -translate-y-1/2 ${dark ? "text-slate-500" : "text-slate-400"}`} />
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="ค้นหาชื่อสินค้า หรือ SKU"
                  className={`w-full pl-9 pr-3 py-3 rounded-xl border text-sm focus:outline-none focus:ring-2 ${dark ? "bg-white/5 border-white/10 text-white placeholder-slate-500 focus:ring-[#7FD4A8]/30" : "border-slate-200 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"}`}
                />
              </div>
              <button
                onClick={() => setScanning(true)}
                title="สแกนบาร์โค้ด / QR"
                aria-label="สแกนบาร์โค้ดหรือ QR โค้ด"
                className="flex items-center gap-2 px-4 py-3 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors shrink-0"
              >
                <ScanLine size={18} />
                <span className="hidden sm:inline">สแกน</span>
              </button>
            </div>

            {/* Frequently ordered — quick repeat for the production line */}
            {frequentItems.length > 0 && !search && category === "all" && (
              <div className="mt-3.5">
                <div className={`text-xs font-medium mb-2 flex items-center gap-1.5 ${dark ? "text-slate-300" : "text-slate-600"}`}>
                  <Clock size={13} /> สั่งบ่อย
                </div>
                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                  {frequentItems.map((i) => (
                    <button
                      key={i.id}
                      onClick={() => setPickedItem(i)}
                      className={`flex items-center gap-2 px-3 py-2 rounded-xl text-xs whitespace-nowrap shrink-0 border transition-colors ${
                        dark
                          ? "bg-white/[0.06] border-white/10 text-slate-100 hover:bg-white/[0.12]"
                          : "bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100"
                      }`}
                    >
                      <span className="font-medium max-w-[140px] truncate">{i.name}</span>
                      <span className={dark ? "text-slate-400" : "text-slate-400"}>·</span>
                      <span className="text-emerald-500 font-semibold">{i.stock}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Category filter */}
            {categories.length > 1 && (
              <div className="mt-3 flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button
                  onClick={() => setCategory("all")}
                  className={`px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap shrink-0 transition-colors ${
                    category === "all"
                      ? "bg-[#1E3A5F] text-white"
                      : dark
                        ? "bg-white/[0.06] text-slate-300 hover:bg-white/[0.12]"
                        : "bg-slate-100 text-slate-600 hover:bg-slate-200"
                  }`}
                >
                  ทั้งหมด ({myItems.length})
                </button>
                {categories.map((c) => (
                  <button
                    key={c.name}
                    onClick={() => setCategory(c.name)}
                    className={`px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap shrink-0 transition-colors ${
                      category === c.name
                        ? "bg-[#1E3A5F] text-white"
                        : dark
                          ? "bg-white/[0.06] text-slate-300 hover:bg-white/[0.12]"
                          : "bg-slate-100 text-slate-600 hover:bg-slate-200"
                    }`}
                  >
                    {c.name} ({c.n})
                  </button>
                ))}
              </div>
            )}
          </div>
          {catalog.length === 0 ? (
            <EmptyState icon={Package} title={search ? "ไม่พบสินค้า" : "ยังไม่มีสินค้าสำหรับแผนกนี้"} sub={search ? "ลองค้นหาด้วยคำอื่น" : "แอดมินสามารถเพิ่มสินค้าให้แผนกได้"} />
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 p-4">
              {catalog.map((i) => {
                const low = i.stock <= i.minStock;

                                    ? dark ? "bg-amber-500/15 text-amber-300" : "bg-amber-50 text-amber-700"

      {/* History */}

  );

// Camera barcode/QR scanner (uses html5-qrcode loaded via CDN). Works on HTTPS (e.g. GitHub Pages).
function ScannerModal({ onDetected, onClose, notify }) {
  const [status, setStatus] = useState("starting"); // starting | scanning | error
  const [manual, setManual] = useState("");
  const scannerRef = React.useRef(null);
  const startedRef = React.useRef(false);
  const handledRef = React.useRef(false);

  useEffect(() => {
    let cancelled = false;
    if (typeof window.Html5Qrcode === "undefined") {
      setStatus("error");
      notify?.("error", "โหลดตัวสแกนไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต");
      return;
    }
    const scanner = new window.Html5Qrcode("qr-reader", { verbose: false });
    scannerRef.current = scanner;
    const config = { fps: 10, qrbox: { width: 240, height: 150 }, aspectRatio: 1.3 };
    scanner
      .start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          if (cancelled || handledRef.current) return;
          handledRef.current = true;
          const s = scannerRef.current;
          const finish = () => onDetected(decodedText);
          if (s && startedRef.current) {
            s.stop().then(() => { try { s.clear(); } catch (e) {} finish(); }).catch(finish);
          } else finish();
        },
        () => {} // ignore per-frame decode misses
      )
      .then(() => { if (!cancelled) { startedRef.current = true; setStatus("scanning"); } })
      .catch(() => { if (!cancelled) { setStatus("error"); notify?.("error", "เปิดกล้องไม่สำเร็จ ตรวจสอบการอนุญาตใช้กล้อง"); } });

    return () => {
      cancelled = true;
      const s = scannerRef.current;
      if (s && startedRef.current) {
        s.stop().then(() => { try { s.clear(); } catch (e) {} }).catch(() => {});
      }
    };
    // eslint-disable-next-line
  }, []);

  const submitManual = () => {
    if (manual.trim()) onDetected(manual.trim());
  };

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-0 sm:p-4 z-[60]" onClick={onClose}>
      <div className="bg-white w-full h-full sm:h-auto sm:max-w-md sm:rounded-2xl overflow-hidden flex flex-col" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <h3 className="font-semibold text-slate-800 flex items-center gap-2"><ScanLine size={18} /> สแกนรหัสสินค้า</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-100" aria-label="ปิด">
            <X size={18} />
          </button>
        </div>

        <div className="flex-1 flex flex-col">
          {/* Camera viewport */}
          <div className="relative bg-black" style={{ minHeight: 260 }}>
            <div id="qr-reader" className="w-full" />
            {status === "starting" && (
              <div className="absolute inset-0 flex items-center justify-center text-white text-sm">กำลังเปิดกล้อง...</div>
            )}
            {status === "error" && (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-white text-sm px-6 text-center gap-1">
                <AlertTriangle size={22} className="text-amber-400" />
                <div>เปิดกล้องไม่สำเร็จ</div>
                <div className="text-slate-300 text-xs">ตรวจสอบสิทธิ์กล้อง หรือใช้บนลิงก์ https (เช่น GitHub Pages) — พิมพ์รหัสด้านล่างแทนได้</div>
              </div>
            )}
            {status === "scanning" && (
              <div className="absolute bottom-3 left-0 right-0 text-center text-white/90 text-xs">เล็งกล้องไปที่บาร์โค้ด / QR ของสินค้า</div>
            )}
          </div>

          {/* Manual fallback */}
          <div className="p-5 space-y-2">
            <span className="text-xs text-slate-500">หรือพิมพ์รหัสสินค้า (SKU) เอง</span>
            <div className="flex gap-2">
              <input
                value={manual}
                onChange={(e) => setManual(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && submitManual()}
                placeholder="เช่น ST-001"
                className="flex-1 px-3 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
              />
              <button
                onClick={submitManual}
                disabled={!manual.trim()}
                className="px-4 py-3 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40"
              >
                ค้นหา
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// Searchable combobox: type to filter a list of string options
function Combobox({ label, value, onChange, options, placeholder }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const wrapRef = React.useRef(null);

  useEffect(() => {
    const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, []);

  const filtered = options.filter((o) => o.toLowerCase().includes(query.toLowerCase()));

  return (
    <div className="block" ref={wrapRef}>
      <span className="text-xs text-slate-500 mb-1 block">{label}</span>
      <div className="relative">
        <input
          value={open ? query : value}
          onChange={(e) => { setQuery(e.target.value); if (!open) setOpen(true); }}
          onFocus={() => { setOpen(true); setQuery(""); }}
          placeholder={value || placeholder}
          className="w-full px-3 py-2.5 pr-8 rounded-lg border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
        />
        <ChevronRight size={14} className="absolute right-2.5 top-1/2 text-slate-400" style={{ transform: open ? "translateY(-50%) rotate(-90deg)" : "translateY(-50%) rotate(90deg)" }} />
        {open && (
          <div className="absolute z-20 mt-1 w-full max-h-52 overflow-y-auto bg-white rounded-lg border border-slate-200 shadow-lg">
            {filtered.length === 0 ? (
              <div className="px-3 py-2 text-xs text-slate-400">ไม่พบ "{query}"</div>
            ) : (
              filtered.map((o) => (
                <button
                  key={o}
                  type="button"
                  onClick={() => { onChange(o); setOpen(false); setQuery(""); }}
                  className={`w-full text-left px-3 py-2 text-sm hover:bg-slate-50 ${o === value ? "bg-[#EFF4FA] text-[#1E3A5F] font-medium" : "text-slate-700"}`}
                >
                  {o}
                </button>
              ))
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// Popup: item detail + qty + dept/line/machine + note; confirms an immediate withdrawal
function RequisitionDetail({ item, user, onSubmit, onClose, notify }) {
  const defaultDept = user.id === "admin" ? DEPARTMENTS[0].id : user.id;
  const [qty, setQty] = useState("1");
  const [deptId, setDeptId] = useState(defaultDept);
  const [line, setLine] = useState("");
  const [machine, setMachine] = useState("");
  const [note, setNote] = useState("");
  const qtyNum = toNum(qty, NaN);
  const overStock = Number.isFinite(qtyNum) && qtyNum > item.stock;
  const valid = Number.isFinite(qtyNum) && qtyNum > 0 && qtyNum <= item.stock && line && machine;
  const low = item.stock <= item.minStock;
  const deptName = (DEPARTMENTS.find((d) => d.id === deptId) || {}).name || deptId;

  const handleSubmit = () => {
    if (!Number.isFinite(qtyNum) || qtyNum <= 0) { notify?.("error", "กรุณากรอกจำนวนที่ต้องการเบิก"); return; }
    if (qtyNum > item.stock) { notify?.("error", `เบิกได้ไม่เกิน ${item.stock} ${item.unit} (คงเหลือในสต็อก)`); return; }
    if (!line || !machine) { notify?.("error", "กรุณาเลือก Line และเครื่องจักร"); return; }
    onSubmit({ item, qty: qtyNum, deptId, deptName, line, machine, note: note.trim() });
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="p-5 border-b border-slate-100">
          <div className="flex items-start justify-between gap-3">
            <div className="min-w-0">
              <h3 className="font-semibold text-slate-800 text-lg leading-tight">{item.name}</h3>
              <div className="text-xs text-slate-400 mt-1">{item.sku} · {item.category}{item.supplier ? ` · ${item.supplier}` : ""}</div>
            </div>
            <span className="px-2 py-1 rounded-full text-xs font-medium shrink-0" style={{ color: itemDeptColor(item.deptId), background: `${itemDeptColor(item.deptId)}15` }}>
              {itemDeptName(item.deptId)}
            </span>
          </div>
          <div className="grid grid-cols-2 gap-3 mt-4">
            <div className="bg-slate-50 rounded-xl px-3 py-2.5">
              <div className="text-[11px] text-slate-400">คงเหลือในสต็อก</div>
              <div className={`text-lg font-semibold ${low ? "text-amber-700" : "text-slate-800"}`}>{item.stock} <span className="text-sm font-normal text-slate-400">{item.unit}</span></div>
            </div>
            <div className="bg-slate-50 rounded-xl px-3 py-2.5">
              <div className="text-[11px] text-slate-400">ราคา/หน่วย</div>
              <div className="text-lg font-semibold text-slate-800">฿{fmtMoney(item.price)}</div>
            </div>
          </div>
          {low && <div className="mt-2 text-xs text-amber-600">⚠ สินค้าใกล้หมด (ขั้นต่ำ {item.minStock})</div>}
        </div>

        <div className="p-5 space-y-3">
          <div>
            <Field label={`จำนวนที่ต้องการเบิก (${item.unit}) — สูงสุด ${item.stock}`} type="number" value={qty} onChange={setQty} />
            {overStock && <div className="text-xs text-red-500 mt-1">เกินจำนวนคงเหลือในสต็อก</div>}
          </div>
          <DeptLineMachineFields user={user} deptId={deptId} setDeptId={setDeptId} line={line} setLine={setLine} machine={machine} setMachine={setMachine} />
          <label className="block">
            <span className="text-xs text-slate-500 mb-1 block">หมายเหตุ (ไม่บังคับ)</span>
            <textarea
              value={note}
              onChange={(e) => setNote(e.target.value)}

              className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"

    </div>
  );

        notify("success", "ปฏิเสธแล้ว");
