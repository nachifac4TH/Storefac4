  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ",") { out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map((c) => c.trim());
}

function b64urlToBuf(s) {
  s = s.replace(/-/g, "+").replace(/_/g, "/");
  const pad = s.length % 4 ? "=".repeat(4 - (s.length % 4)) : "";
  const bin = atob(s + pad);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}
function bufToB64url(buf) {
  const bytes = new Uint8Array(buf);
  let bin = "";
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

          user: { id: randomBytes(16), name: "admin@nachi", displayName: "Admin" },
          pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
          authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
          timeout: 60000,
        },
      });
      const id = bufToB64url(cred.rawId);
      localStorage.setItem(WEBAUTHN_KEY, id);
      setRegistered(true);
      setMsg("ตั้งค่าสำเร็จ — แตะปุ่มด้านล่างเพื่อเข้าสู่ระบบ");
    } catch (e) {

        publicKey: {
          challenge: randomBytes(32),
          allowCredentials: id ? [{ type: "public-key", id: b64urlToBuf(id) }] : [],
          userVerification: "required",
          timeout: 60000,
        },
      });
      onVerified();
    } catch (e) {
      setMsg("ยืนยันตัวตนไม่สำเร็จ หรือถูกยกเลิก");
    } finally { setBusy(false); }
  };

      <div className="flex flex-col items-center text-center gap-3 py-2">
        <div className="w-20 h-20 rounded-3xl flex items-center justify-center" style={{ background: "linear-gradient(145deg, rgba(16,185,129,0.25), rgba(255,255,255,0.05))", boxShadow: "inset 0 1px 1px rgba(255,255,255,0.25)" }}>
          <ScanLine size={40} className="text-emerald-400" />
        </div>
        {!supported ? (
          <p className="text-slate-300 text-sm">อุปกรณ์/เบราว์เซอร์นี้ไม่รองรับ Face ID บนเว็บ<br /><span className="text-slate-400 text-xs">กรุณาใช้รหัสผ่านแทน</span></p>

        ) : (

async function exportPDF(elementId, notify) {
  try {
    if (typeof window.html2canvas === "undefined" || typeof window.jspdf === "undefined") {
      notify?.("error", "โหลดตัวช่วย PDF ไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต");
      return;
    }
    const el = document.getElementById(elementId);
    if (!el) { notify?.("error", "ไม่พบเนื้อหาที่จะส่งออก"); return; }
    const canvas = await window.html2canvas(el, { scale: 2, backgroundColor: "#F7F9FC", useCORS: true });
    const img = canvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const w = pw - 16;
    const h = (canvas.height * w) / canvas.width;
    let y = 8, remaining = h;
    if (h <= ph - 16) {
      pdf.addImage(img, "PNG", 8, y, w, h);
    } else {
      let sy = 0;
      const pageContentH = ph - 16;
      const ratio = canvas.width / w;
      while (remaining > 0) {
        const sliceH = Math.min(pageContentH, remaining);
        const sCanvas = document.createElement("canvas");
        sCanvas.width = canvas.width;
        sCanvas.height = sliceH * ratio;
        const ctx = sCanvas.getContext("2d");
        ctx.drawImage(canvas, 0, sy * ratio, canvas.width, sliceH * ratio, 0, 0, canvas.width, sliceH * ratio);
        pdf.addImage(sCanvas.toDataURL("image/png"), "PNG", 8, 8, w, sliceH);
        remaining -= sliceH;
        sy += sliceH;
        if (remaining > 0) pdf.addPage();
      }
    }
    const stamp = new Date().toISOString().slice(0, 10);
    pdf.save(`Nachi-Store-${stamp}.pdf`);
    notify?.("success", "ส่งออก PDF แล้ว");
  } catch (e) {
    notify?.("error", "ส่งออก PDF ไม่สำเร็จ");
  }
}

        const bySku = {};
        items.forEach((i) => { bySku[(i.sku || "").toLowerCase().trim()] = i; });
        const changes = [];
        let matched = 0, missing = 0;
        lines.slice(1).forEach((line) => {
          const cols = parseCSVLine(line);
          const sku = (cols[iSku] || "").toLowerCase().trim();
          if (!sku) return;
          const item = bySku[sku];
          if (!item) { missing++; return; }
          matched++;
          const n = toNum(cols[iStock], NaN);
          if (Number.isFinite(n) && n >= 0 && n !== item.stock) changes.push({ id: item.id, stock: n });
        });
        if (changes.length === 0) {
          notify("error", `ไม่มีอะไรต้องอัปเดต (ตรงกัน ${matched} รายการ, ไม่พบ ${missing})`);
          return;
        }
        if (db.cloud) await db.updateStocks(changes);
        const map = {};
        changes.forEach((c) => { map[c.id] = c.stock; });
        setItems((prev) => prev.map((i) => (map[i.id] !== undefined ? { ...i, stock: map[i.id] } : i)));
        notify("success", `อัปเดตสต็อก ${changes.length} รายการ${missing ? ` · ไม่พบ SKU ${missing} รายการ` : ""}`);
      } catch (err) {

        } else {

      }

  return (

}
function ItemForm({ initial, onSave, onClose, notify }) {

    initial

  );

    if (!form.name.trim()) {
      notify?.("error", "กรุณากรอกชื่อสินค้า");
      return;
    }

      return;
    }
    onSave({
      sku: form.sku.trim(),
      name: form.name.trim(),
      unit: form.unit.trim() || "ชิ้น",
      category: form.category.trim() || "ทั่วไป",
      supplier: (form.supplier || "").trim(),
      deptId: form.deptId,
      stock,
      minStock,
      price,
    });
  };
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-white rounded-2xl p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
        <h3 className="font-semibold text-slate-800 mb-4">{initial ? "แก้ไขสินค้า" : "เพิ่มสินค้าใหม่"}</h3>
        <div className="space-y-3">
          <Field label="ชื่อสินค้า" value={form.name} onChange={(v) => setForm({ ...form, name: v })} />
          <label className="block">
            <span className="text-xs text-slate-500 mb-1 block">แผนก (ผู้ใช้สินค้า)</span>
            <select

              onChange={(e) => setForm({ ...form, deptId: e.target.value })}

                <option key={d.id} value={d.id}>{d.name}{d.id === "central" ? " (ทุกแผนกเห็น)" : ""}</option>

          </div>
          <Field label="ผู้ขาย / Supplier" value={form.supplier || ""} onChange={(v) => setForm({ ...form, supplier: v })} />
          <div className="grid grid-cols-3 gap-3">
            <Field label="หน่วย" value={form.unit} onChange={(v) => setForm({ ...form, unit: v })} />

}
function Field({ label, value, onChange, type = "text" }) {

}
function Requisitions({ requisitions, setRequisitions, items, setItems, user, purchaseOrders, setPurchaseOrders, notify, confirm, dark, pendingSku, onPendingSkuHandled }) {

  const [period, setPeriod] = useState("all"); // all | day | month | year
  const [deptFilter, setDeptFilter] = useState("all");

  const categories = React.useMemo(() => {
    const count = {};
    myItems.forEach((i) => { const c = (i.category || "ทั่วไป").trim(); count[c] = (count[c] || 0) + 1; });
    return Object.entries(count).sort((a, b) => b[1] - a[1]).map(([name, n]) => ({ name, n }));
  }, [myItems]);
  const frequentItems = React.useMemo(() => {

      .sort((a, b) => b[1] - a[1])
      .map(([id]) => myItems.find((i) => i.id === id))

      .slice(0, 6);
  }, [requisitions, myItems, user, isAdmin]);
  const catalog = myItems.filter((i) => {
    const q = search.toLowerCase();
    const matchText = i.name.toLowerCase().includes(q) || i.sku.toLowerCase().includes(q);
    const matchCat = category === "all" || (i.category || "ทั่วไป").trim() === category;
    return matchText && matchCat;
  });
  useEffect(() => {
    if (!pendingSku) return;
    if (!items || items.length === 0) return;   // wait for the catalog to load
    const code = String(pendingSku).trim().toLowerCase();
    const found = myItems.find((i) => (i.sku || "").toLowerCase() === code);
    if (found) {
      if (found.stock > 0) setPickedItem(found);
      else notify("error", `${found.name} หมดสต็อก`);
    } else {
      setSearch(pendingSku);
      notify("error", `ไม่พบสินค้ารหัส "${pendingSku}"`);
    }

    try {
      if (window.history && window.history.replaceState) {

    }
    const found = myItems.find(
      (i) => i.sku.toLowerCase() === code.toLowerCase() || i.name.toLowerCase() === code.toLowerCase()

      if (found.stock <= 0) { notify("error", `${found.name} หมดสต็อก`); return; }
      setPickedItem(found);
      notify("success", `พบสินค้า: ${found.name}`);
    } else {
      setSearch(code);
      notify("error", `ไม่พบสินค้ารหัส "${code}" — แสดงผลการค้นหาแทน`);
    }
  };
  const submitReturn = ({ req, qty, returnedBy }) => {
    const already = req.returnedQty || 0;
    if (qty > req.qty - already) { notify("error", "คืนเกินจำนวนที่เบิกไป"); return; }
    if (db.cloud) {
      db.requestReturn({ reqId: req.id, qty, requestedBy: returnedBy })
        .then(() => notify("success", `ส่งคำขอคืน ${req.itemName} × ${qty} แล้ว รอแอดมินอนุมัติ`))
        .catch((e) => {
          const msg = String((e && e.message) || "");
          if (msg.includes("RETURN_PENDING")) notify("error", "รายการนี้มีคำขอคืนรออนุมัติอยู่แล้ว");
          else if (msg.includes("RETURN_TOO_MANY")) notify("error", "คืนเกินจำนวนที่เบิกไป");
          else notify("error", "ส่งคำขอคืนไม่สำเร็จ");
        });
      setReturning(null);
      return;
    }
    setRequisitions((prev) => prev.map((r) =>
      r.id === req.id ? { ...r, returnStatus: "pending", returnQtyRequested: qty, returnRequestedBy: returnedBy } : r));
    setReturning(null);
    notify("success", `ส่งคำขอคืน ${req.itemName} × ${qty} แล้ว รอแอดมินอนุมัติ`);
  };
  const decideReturn = (req, approve) => {
    const qty = req.returnQtyRequested || 0;
    if (db.cloud) {
      const op = approve ? db.approveReturn(req.id) : db.rejectReturn(req.id);
      op.then(() => notify("success", approve ? `อนุมัติคืน ${req.itemName} × ${qty} เข้าคลังแล้ว` : "ไม่อนุมัติคำขอคืนแล้ว"))
        .catch(() => notify("error", approve ? "อนุมัติไม่สำเร็จ" : "ปฏิเสธไม่สำเร็จ"));
      return;
    }
    if (approve) {
      setItems((prev) => prev.map((i) => (i.id === req.itemId ? { ...i, stock: i.stock + qty } : i)));
      setRequisitions((prev) => prev.map((r) =>
        r.id === req.id ? { ...r, returnedQty: (r.returnedQty || 0) + qty, returnStatus: "approved", returnQtyRequested: 0 } : r));
      notify("success", `อนุมัติคืน ${req.itemName} × ${qty} เข้าคลังแล้ว`);
    } else {
      setRequisitions((prev) => prev.map((r) =>
        r.id === req.id ? { ...r, returnStatus: "rejected", returnQtyRequested: 0 } : r));
      notify("success", "ไม่อนุมัติคำขอคืนแล้ว");
    }
  };
  const submitWithdraw = ({ item, qty, deptId, deptName, line, machine, note, requestedBy }) => {
    const current = items.find((i) => i.id === item.id);
    if (!current || current.stock < qty) {
      notify("error", `สต็อกไม่พอ: คงเหลือ ${current ? current.stock : 0} ${item.unit}`);
      return;
    }
    if (db.cloud) {
      db.withdraw({ itemId: item.id, qty, deptId, deptName, line, machine, note, requestedBy })
        .then(() => notify("success", `เบิก ${item.name} × ${qty} — ตัดสต็อกแล้ว`))
        .catch((e) => {
          const msg = String(e && e.message || "");
          if (msg.includes("INSUFFICIENT_STOCK")) notify("error", "สต็อกไม่พอ (มีคนเบิกตัดไปพร้อมกัน) กรุณาลองใหม่");
          else notify("error", "บันทึกการเบิกไม่สำเร็จ");
        });
      setPickedItem(null);
      return;
    }
    setItems((prev) => prev.map((i) => (i.id === item.id ? { ...i, stock: Math.max(0, i.stock - qty) } : i)));
    setRequisitions((prev) => [
      { id: uid(), itemId: item.id, itemName: item.name, qty, note, status: "fulfilled", deptId, deptName, line, machine, requestedBy, createdAt: Date.now() },
      ...prev,
    ]);
    setPickedItem(null);
    notify("success", `เบิก ${item.name} × ${qty} — ตัดสต็อกแล้ว`);
  };
  const now = new Date();
  const inPeriod = (ts) => {
    if (period === "all") return true;
    const d = new Date(ts);
    if (period === "day") return d.toDateString() === now.toDateString();
    if (period === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === "year") return d.getFullYear() === now.getFullYear();
    return true;
  };
  const list = requisitions
    .filter((r) => (isAdmin ? true : r.deptId === user.id))
    .filter((r) => (isAdmin && deptFilter !== "all" ? r.deptId === deptFilter : true))
    .filter((r) => inPeriod(r.createdAt))
    .sort((a, b) => b.createdAt - a.createdAt);
  const returnStock = (r) => {
    if (r.status !== "fulfilled") return;
    const cur = items.find((i) => i.id === r.itemId);
    if (db.cloud && cur) { db.updateItem(r.itemId, { ...cur, stock: cur.stock + r.qty }).catch(() => {}); }
    setItems((prev) => prev.map((i) => (i.id === r.itemId ? { ...i, stock: i.stock + r.qty } : i)));
  };
  const deleteReq = (r) => {
    confirm({
      title: "ลบรายการเบิกนี้?",
      message: `ลบ "${r.itemName}" × ${r.qty} — ของ ${r.qty} จะถูกคืนเข้าคลัง`,
      confirmLabel: "ลบและคืนสต็อก",
      tone: "danger",
      onConfirm: () => {
        returnStock(r);
        if (db.cloud) db.deleteRequisition(r.id).catch((e) => notify("error", "ลบไม่สำเร็จ: " + (e && e.message ? e.message : "")));
        setRequisitions((prev) => prev.filter((x) => x.id !== r.id));
        notify("success", "ลบรายการและคืนสต็อกแล้ว");
      },
    });
  };
  const clearReqs = () => {
    if (list.length === 0) return;
    confirm({
      title: "ล้างประวัติการเบิกทั้งหมด?",
      message: `จะลบ ${list.length} รายการที่แสดงอยู่ และคืนสต็อกทั้งหมดกลับเข้าคลัง`,
      confirmLabel: "ล้างทั้งหมด",
      tone: "danger",
      onConfirm: () => {
        list.forEach(returnStock);
        const ids = list.map((r) => r.id);
        if (db.cloud) db.clearRequisitions(ids).catch((e) => notify("error", "ล้างไม่สำเร็จ: " + (e && e.message ? e.message : "")));
        setRequisitions((prev) => prev.filter((x) => !ids.includes(x.id)));
        notify("success", "ล้างประวัติและคืนสต็อกแล้ว");
      },
    });
  };
  const periods = [
    { id: "all", label: "ทั้งหมด" },
    { id: "day", label: "วันนี้" },
    { id: "month", label: "เดือนนี้" },
    { id: "year", label: "ปีนี้" },
  ];
  return (
    <div className="space-y-5">
      {/* Item catalog with search — departments withdraw by clicking an item */}
      {!isAdmin && (
        <div className={`rounded-2xl border overflow-hidden ${dark ? "bg-white/[0.03] border-white/10" : "bg-white border-slate-100"}`}>
          <div className={`px-4 sm:px-5 py-4 border-b ${dark ? "border-white/10" : "border-slate-100"}`}>
            <h3 className={`font-medium text-sm mb-3 ${dark ? "text-slate-100" : "text-slate-800"}`}>เลือกสินค้าเพื่อเบิก</h3>
            <div className="flex gap-2">
              <div className="relative flex-1">
                <Search size={16} className={`absolute left-3 top-1/2 -translate-y-1/2 ${dark ? "text-slate-500" : "text-slate-400"}`} />
                <input
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="ค้นหาชื่อสินค้า หรือ SKU"
                  className={`w-full pl-9 pr-3 py-3 rounded-xl border text-sm focus:outline-none focus:ring-2 ${dark ? "bg-white/5 border-white/10 text-white placeholder-slate-500 focus:ring-[#7FD4A8]/30" : "border-slate-200 focus:ring-[#1E3A5F]/20 focus:border-[#1E3A5F]"}`}
                />
              </div>
              <button
                onClick={() => setScanning(true)}
                title="สแกนบาร์โค้ด / QR"
                aria-label="สแกนบาร์โค้ดหรือ QR โค้ด"
                className="flex items-center gap-2 px-4 py-3 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] transition-colors shrink-0"
              >
                <ScanLine size={18} />
                <span className="hidden sm:inline">สแกน</span>
              </button>
            </div>
            {/* Frequently ordered — quick repeat for the production line */}
            {frequentItems.length > 0 && !search && category === "all" && (
              <div className="mt-3.5">
                <div className={`text-xs font-medium mb-2 flex items-center gap-1.5 ${dark ? "text-slate-300" : "text-slate-600"}`}>
                  <Clock size={13} /> สั่งบ่อย
                </div>
                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                  {frequentItems.map((i) => (
                    <button
                      key={i.id}
                      onClick={() => setPickedItem(i)}
                      className={`flex items-center gap-2 px-3 py-2 rounded-xl text-xs whitespace-nowrap shrink-0 border transition-colors ${
                        dark
                          ? "bg-white/[0.06] border-white/10 text-slate-100 hover:bg-white/[0.12]"
                          : "bg-slate-50 border-slate-200 text-slate-700 hover:bg-slate-100"
                      }`}
                    >
                      <span className="font-medium max-w-[140px] truncate">{i.name}</span>
                      <span className={dark ? "text-slate-400" : "text-slate-400"}>·</span>
                      <span className="text-emerald-500 font-semibold">{i.stock}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
            {/* Category filter */}
            {categories.length > 1 && (
              <div className="mt-3 flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button
                  onClick={() => setCategory("all")}
                  className={`px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap shrink-0 transition-colors ${
                    category === "all"
                      ? "bg-[#1E3A5F] text-white"
                      : dark
                        ? "bg-white/[0.06] text-slate-300 hover:bg-white/[0.12]"
                        : "bg-slate-100 text-slate-600 hover:bg-slate-200"
                  }`}
                >
                  ทั้งหมด ({myItems.length})
                </button>
                {categories.map((c) => (
                  <button
                    key={c.name}
                    onClick={() => setCategory(c.name)}
                    className={`px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap shrink-0 transition-colors ${
                      category === c.name
                        ? "bg-[#1E3A5F] text-white"
                        : dark
                          ? "bg-white/[0.06] text-slate-300 hover:bg-white/[0.12]"
                          : "bg-slate-100 text-slate-600 hover:bg-slate-200"
                    }`}
                  >
                    {c.name} ({c.n})
                  </button>
                ))}
              </div>
            )}
          </div>
          {catalog.length === 0 ? (
            <EmptyState icon={Package} title={search ? "ไม่พบสินค้า" : "ยังไม่มีสินค้าสำหรับแผนกนี้"} sub={search ? "ลองค้นหาด้วยคำอื่น" : "แอดมินสามารถเพิ่มสินค้าให้แผนกได้"} />
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 p-4">
              {catalog.map((i) => {
                const low = i.stock <= i.minStock;
                const out = i.stock <= 0;
                const pct = Math.max(4, Math.min(100, Math.round((i.stock / Math.max(i.minStock * 2, i.stock, 1)) * 100)));
                const barColor = out ? "#ef4444" : low ? "#f59e0b" : "#22c55e";
                return (
                  <button
                    key={i.id}
                    onClick={() => setPickedItem(i)}
                    disabled={out}
                    className={`text-left p-4 rounded-xl border transition-all disabled:opacity-50 disabled:cursor-not-allowed ${
                      dark
                        ? "bg-white/[0.04] border-white/10 hover:border-[#7FD4A8]/50 hover:bg-white/[0.07] disabled:hover:border-white/10"
                        : "border-slate-200 hover:border-[#1E3A5F] hover:shadow-sm disabled:hover:border-slate-200"
                    }`}
                  >
                    <div className="flex items-start gap-3">
                      <div className={`shrink-0 rounded-xl p-1.5 ${dark ? "bg-white/5" : "bg-slate-50"}`}>
                        <ProductIcon3D item={i} size={44} />
                      </div>
                      <div className="min-w-0 flex-1">
                        <div className="flex items-start justify-between gap-2">
                          <div className="min-w-0">
                            <div className={`font-medium text-sm truncate ${dark ? "text-white" : "text-slate-800"}`}>{i.name}</div>
                            <div className={`text-xs mt-0.5 ${dark ? "text-slate-400" : "text-slate-400"}`}>{i.sku} · {i.category}{i.supplier ? ` · ${i.supplier}` : ""}</div>
                          </div>
                          {out && <AlertTriangle size={15} className="text-red-500 shrink-0" />}
                          {!out && low && <AlertTriangle size={15} className="text-amber-500 shrink-0" />}
                        </div>
                        <div className="mt-2.5">
                          <div className="flex items-center justify-between gap-2 mb-1.5">
                            <span
                              className={`inline-flex items-center gap-1.5 px-2 py-1 rounded-full text-[11px] font-semibold ${
                                out
                                  ? dark ? "bg-red-500/15 text-red-300" : "bg-red-50 text-red-700"
                                  : low
                                    ? dark ? "bg-amber-500/15 text-amber-300" : "bg-amber-50 text-amber-700"
                                    : dark ? "bg-emerald-500/15 text-emerald-300" : "bg-emerald-50 text-emerald-700"
                              }`}
                            >
                              <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{ background: barColor }} />
                              {out ? "ของหมด" : low ? `ใกล้หมด · เหลือ ${i.stock}` : `มีของ · ${i.stock} ${i.unit}`}
                            </span>
                            {!out && <span className={`text-xs font-semibold shrink-0 ${dark ? "text-[#7FD4A8]" : "text-[#1E3A5F]"}`}>เบิก →</span>}
                          </div>
                          <div className={`h-1.5 rounded-full overflow-hidden ${dark ? "bg-white/10" : "bg-slate-100"}`}>
                            <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: barColor }} />
                          </div>
                        </div>
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      )}
      {/* History */}
      <div>
        <div className="flex items-center justify-between gap-2 mb-3">
          <h3 className={`font-medium text-sm ${dark ? "text-slate-100" : "text-slate-800"}`}>{isAdmin ? "ประวัติการเบิก (ทุกแผนก)" : "ประวัติการเบิกของแผนก"}</h3>
          {isAdmin && list.length > 0 && (
            <button onClick={clearReqs} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium text-red-600 bg-red-50 hover:bg-red-100 transition-colors">
              <Trash2 size={13} /> ล้างทั้งหมด
            </button>
          )}
        </div>
        <div className="flex flex-wrap gap-2 mb-3">
          {periods.map((p) => (
            <button
              key={p.id}
              onClick={() => setPeriod(p.id)}
              className={`px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap transition-colors ${
                period === p.id
                  ? "bg-[#1E3A5F] text-white"
                  : dark
                  ? "bg-white/5 text-slate-300 border border-white/10 hover:bg-white/10"
                  : "bg-white text-slate-500 border border-slate-200 hover:bg-slate-50"
              }`}
            >
              {p.label}
            </button>
          ))}
          {isAdmin && (
            <select
              value={deptFilter}
              onChange={(e) => setDeptFilter(e.target.value)}
              className="px-3 py-1.5 rounded-full text-xs font-medium border border-slate-200 bg-white text-slate-600 focus:outline-none"
            >
              <option value="all">ทุกแผนก</option>
              {DEPARTMENTS.map((d) => <option key={d.id} value={d.id}>{d.name}</option>)}
            </select>
          )}
        </div>
        <div className={`rounded-2xl border overflow-hidden ${dark ? "bg-white/[0.03] border-white/10" : "bg-white border-slate-100"}`}>
          {list.length === 0 ? (
            <EmptyState icon={ClipboardList} title="ไม่มีประวัติการเบิกในช่วงนี้" />
          ) : (
            <div className={`divide-y ${dark ? "divide-white/5" : "divide-slate-50"}`}>
              {list.map((r) => (
                <div key={r.id} className="px-5 py-4 flex items-center justify-between gap-4">
                  <div className="min-w-0">
                    <div className={`font-medium text-sm truncate ${dark ? "text-slate-100" : "text-slate-700"}`}>
                      {r.itemName} <span className={dark ? "text-slate-500 font-normal" : "text-slate-400 font-normal"}>× {r.qty}</span>
                    </div>
                    <div className={`text-xs mt-0.5 ${dark ? "text-slate-500" : "text-slate-400"}`}>
                      {r.requestedBy ? `${r.requestedBy} · ` : ""}{r.deptName}{r.line ? ` · Line ${r.line}` : ""}{r.machine ? ` · ${r.machine}` : ""}{" · "}{fmtDateTime(r.createdAt)}
                    </div>
                    {r.note && <div className={`text-xs mt-1 italic ${dark ? "text-slate-400" : "text-slate-500"}`}>"{r.note}"</div>}
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    {(r.returnedQty || 0) > 0 && (
                      <span className={`px-2 py-1 rounded-full text-[11px] font-semibold ${dark ? "bg-emerald-500/15 text-emerald-300" : "bg-emerald-50 text-emerald-700"}`}>
                        คืนแล้ว {r.returnedQty}
                      </span>
                    )}
                    {r.returnStatus === "rejected" && (
                      <span className={`px-2 py-1 rounded-full text-[11px] font-semibold ${dark ? "bg-red-500/15 text-red-300" : "bg-red-50 text-red-600"}`}>
                        คำขอคืนถูกปฏิเสธ
                      </span>
                    )}
                    <Badge status={r.status} />
                    {/* Pending return request */}
                    {r.returnStatus === "pending" && (
                      isAdmin ? (
                        <>
                          <span className="px-2 py-1 rounded-full text-[11px] font-semibold bg-amber-100 text-amber-700 whitespace-nowrap">
                            ขอคืน {r.returnQtyRequested}{r.returnRequestedBy ? ` · ${r.returnRequestedBy}` : ""}
                          </span>
                          <button
                            onClick={() => decideReturn(r, true)}
                            className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-semibold bg-emerald-600 text-white hover:bg-emerald-500 whitespace-nowrap"
                          >
                            <Check size={13} strokeWidth={3} /> อนุมัติคืน
                          </button>
                          <button
                            onClick={() => decideReturn(r, false)}
                            className="px-3 py-1.5 rounded-lg text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 whitespace-nowrap"
                          >
                            ไม่อนุมัติ
                          </button>
                        </>
                      ) : (
                        <span className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-[11px] font-semibold whitespace-nowrap ${dark ? "bg-amber-500/15 text-amber-300" : "bg-amber-50 text-amber-700"}`}>
                          <Clock size={11} /> รออนุมัติคืน {r.returnQtyRequested}
                        </span>
                      )
                    )}
                    {/* Departments ask; admins never request on their behalf */}
                    {!isAdmin && r.returnStatus !== "pending" && r.qty - (r.returnedQty || 0) > 0 && (
                      <button
                        onClick={() => setReturning(r)}
                        title="ส่งคำขอคืนของเข้าคลัง"
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors ${
                          dark
                            ? "bg-emerald-500/15 text-emerald-300 hover:bg-emerald-500/25"
                            : "bg-emerald-50 text-emerald-700 hover:bg-emerald-100"
                        }`}
                      >
                        ขอคืนของ
                      </button>
                    )}
                    {isAdmin && (
                      <button onClick={() => deleteReq(r)} className="p-2 rounded-lg text-red-500 hover:bg-red-50" title="ลบและคืนสต็อก" aria-label="ลบรายการ">
                        <Trash2 size={15} />
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      {returning && (
        <ReturnModal req={returning} notify={notify} onClose={() => setReturning(null)} onSubmit={submitReturn} />
      )}
      {pickedItem && (
        <RequisitionDetail item={pickedItem} user={user} notify={notify} onClose={() => setPickedItem(null)} onSubmit={submitWithdraw} />
      )}
      {scanning && (
        <ScannerModal onDetected={handleScan} onClose={() => setScanning(false)} notify={notify} />
      )}
    </div>
  );
}
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("App crash:", error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div className="min-h-screen flex items-center justify-center p-6" style={{ background: "#0a1628" }}>
        <div className="max-w-md w-full bg-white rounded-2xl p-6 text-center">
          <div className="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center mx-auto mb-3">
            <AlertTriangle size={24} className="text-red-500" />
          </div>

function ScannerModal({ onDetected, onClose, notify }) {
  const [status, setStatus] = useState("starting"); // starting | scanning | error
  const [manual, setManual] = useState("");
  const scannerRef = React.useRef(null);
  const startedRef = React.useRef(false);
  const handledRef = React.useRef(false);
  const stopRef = React.useRef(null);
  useEffect(() => {
    let cancelled = false;
    if (typeof window.Html5Qrcode === "undefined") {
      setStatus("error");
      notify?.("error", "โหลดตัวสแกนไม่สำเร็จ ตรวจสอบอินเทอร์เน็ต");
      return;
    }
    let scanner;
    try {
      scanner = new window.Html5Qrcode("qr-reader", { verbose: false });
    } catch (err) {
      setStatus("error");
      notify?.("error", "เริ่มกล้องไม่สำเร็จ: " + (err && err.message ? err.message : ""));
      return;
    }
    scannerRef.current = scanner;
    const config = { fps: 10, qrbox: { width: 260, height: 260 }, aspectRatio: 1 };
    const stopOnce = () => {
      const s = scannerRef.current;
      scannerRef.current = null;
      if (!s) return Promise.resolve();
      try {
        if (!startedRef.current) { try { s.clear(); } catch (e) {} return Promise.resolve(); }
        startedRef.current = false;
        const p = s.stop();
        return (p && typeof p.then === "function" ? p : Promise.resolve())
          .then(() => { try { s.clear(); } catch (e) {} })
          .catch(() => {});
      } catch (e) { return Promise.resolve(); }
    };
    stopRef.current = stopOnce;
    try {
    scanner
      .start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          if (cancelled || handledRef.current) return;
          handledRef.current = true;
          stopOnce().then(() => onDetected(decodedText));
        },
        () => {} // ignore per-frame decode misses
      )
      .then(() => { if (!cancelled) { startedRef.current = true; setStatus("scanning"); } })
      .catch(() => { if (!cancelled) { setStatus("error"); notify?.("error", "เปิดกล้องไม่สำเร็จ ตรวจสอบการอนุญาตใช้กล้อง"); } });
    } catch (err) {
      setStatus("error");
      notify?.("error", "เปิดกล้องไม่สำเร็จ: " + (err && err.message ? err.message : ""));
    }
    return () => {
      cancelled = true;
      try { stopRef.current && stopRef.current(); } catch (e) {}
    };
  }, []);
  const submitManual = () => {
    if (manual.trim()) onDetected(manual.trim());
  };
  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-0 sm:p-4 z-[60]" onClick={onClose}>
      <div className="bg-white w-full h-full sm:h-auto sm:max-w-md sm:rounded-2xl overflow-hidden flex flex-col" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <h3 className="font-semibold text-slate-800 flex items-center gap-2"><ScanLine size={18} /> สแกนรหัสสินค้า</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-100" aria-label="ปิด">
            <X size={18} />
          </button>
        </div>
        <div className="flex-1 flex flex-col">
          {/* Camera viewport */}
          <div className="relative bg-black" style={{ minHeight: 260 }}>
            <div id="qr-reader" className="w-full" />
            {status === "starting" && (
              <div className="absolute inset-0 flex items-center justify-center text-white text-sm">กำลังเปิดกล้อง...</div>
            )}
            {status === "error" && (
              <div className="absolute inset-0 flex flex-col items-center justify-center text-white text-sm px-6 text-center gap-1">
                <AlertTriangle size={22} className="text-amber-400" />
                <div>เปิดกล้องไม่สำเร็จ</div>
                <div className="text-slate-300 text-xs">ตรวจสอบสิทธิ์กล้อง หรือใช้บนลิงก์ https (เช่น GitHub Pages) — พิมพ์รหัสด้านล่างแทนได้</div>
              </div>
            )}
            {status === "scanning" && (
              <div className="absolute bottom-3 left-0 right-0 text-center text-white/90 text-xs">เล็งกล้องไปที่บาร์โค้ด / QR ของสินค้า</div>
            )}
          </div>
          {/* Manual fallback */}
          <div className="p-5 space-y-2">
            <span className="text-xs text-slate-500">หรือพิมพ์รหัสสินค้า (SKU) เอง</span>
            <div className="flex gap-2">
              <input
                value={manual}
                onChange={(e) => setManual(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && submitManual()}
                placeholder="เช่น ST-001"
                className="flex-1 px-3 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
              />
              <button
                onClick={submitManual}
                disabled={!manual.trim()}
                className="px-4 py-3 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40"
              >
                ค้นหา
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
function Combobox({ label, value, onChange, options, placeholder }) {

  const [query, setQuery] = useState("");

    const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };

              filtered.map((o) => (

                  className={`w-full text-left px-3 py-2 text-sm hover:bg-slate-50 ${o === value ? "bg-[#EFF4FA] text-[#1E3A5F] font-medium" : "text-slate-700"}`}

        )}
      </div>
    </div>
  );
}

            </div>
          )}
        </div>
      )}
    </div>
  );
}

              }`}
            >
              <span className="flex items-center gap-2">
                <AlertTriangle size={16} className={urgent ? "text-red-500" : "text-slate-400"} />
                <span className={`text-sm font-medium ${urgent ? "text-red-600" : "text-slate-600"}`}>สั่งซื้อด่วน (Urgent)</span>
              </span>
              <span className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${urgent ? "bg-red-500" : "bg-slate-300"}`}>
                <span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform ${urgent ? "translate-x-5" : "translate-x-0.5"}`} />
              </span>
            </button>
            {/* Image attach — up to 3 (preview only, will persist after Supabase) */}
            <div>
              <span className="text-xs text-slate-500 mb-1 block">แนบรูป (สูงสุด 3 ภาพ)</span>
              <div className="flex gap-2 flex-wrap">
                {images.map((img, idx) => (
                  <div key={idx} className="relative w-16 h-16 rounded-lg overflow-hidden border border-slate-200">
                    <img src={img.url} alt={img.name} className="w-full h-full object-cover" />
                    <button onClick={() => removeImage(idx)} className="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/60 text-white flex items-center justify-center" aria-label="ลบรูป">
                      <X size={11} />
                    </button>
                  </div>
                ))}
                {images.length < 3 && (
                  <label className="w-16 h-16 rounded-lg border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-400 cursor-pointer hover:border-[#1E3A5F] hover:text-[#1E3A5F]">
                    <Plus size={18} />
                    <input type="file" accept="image/*" multiple onChange={onPickImages} className="hidden" />
                  </label>
                )}
              </div>
              <div className="text-[11px] text-slate-400 mt-1">* รูปจะถูกอัปโหลดเก็บถาวร แอดมินเปิดดูได้ในรายการสั่งซื้อ</div>
            </div>
            <label className="block">
              <span className="text-xs text-slate-500 mb-1 block">หมายเหตุ (ไม่บังคับ)</span>
              <textarea
                value={note}
                onChange={(e) => setNote(e.target.value)}
                rows={2}
                className="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]/20"
                placeholder="รายละเอียดเพิ่มเติม..."
              />
            </label>
          </div>
        )}
        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">ยกเลิก</button>
          <button
            onClick={handleSave}
            disabled={!valid}
            className="flex-1 py-2.5 rounded-xl bg-[#1E3A5F] text-white text-sm font-medium hover:bg-[#16304F] disabled:opacity-40 disabled:cursor-not-allowed"
          >
            ส่งคำขอสั่งซื้อ
          </button>
        </div>
      </div>
    </div>
  );
}
function App() {
  const [pendingSku, setPendingSku] = useState(() => {
    try {
      const v = new URLSearchParams(window.location.search).get("sku");
      return v ? v.trim() : "";
    } catch (e) { return ""; }
  });
  const [user, setUser] = useState(() => {
    try {
      if (!new URLSearchParams(window.location.search).get("sku")) return null;
      const id = localStorage.getItem(LAST_DEPT_KEY);
      return DEPARTMENTS.find((d) => d.id === id) || null;
    } catch (e) { return null; }
  });
  const [session, setSession] = useState(null);
  const [authReady, setAuthReady] = useState(!CLOUD); // localStorage mode = ready immediately
  const [tab, setTab] = useState(() => {
    try { return new URLSearchParams(window.location.search).get("sku") ? "requisitions" : "dashboard"; }
    catch (e) { return "dashboard"; }
  });
  const [items, setItems] = useState(SEED_ITEMS);
  const [requisitions, setRequisitions] = useState([]);
  const [purchaseOrders, setPurchaseOrders] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [confirmState, setConfirmState] = useState(null);
  const notify = useCallback((type, msg) => {
    const id = uid();
    setToasts((prev) => [...prev, { id, type, msg }]);
    setTimeout(() => setToasts((prev) => prev.filter((t) => t.id !== id)), 3000);
  }, []);
  const confirm = useCallback((opts) => setConfirmState(opts), []);
  useEffect(() => {
    if (!CLOUD) return;
    let sub;
    db.getSession()
      .then((s) => { setSession(s); })
      .catch((e) => { console.warn("getSession failed:", e); })
      .finally(() => setAuthReady(true));
    try {
      const r = sb.auth.onAuthStateChange((_e, s) => setSession(s));
      sub = r && r.data ? r.data.subscription : null;
    } catch (e) {}
    return () => { try { sub && sub.unsubscribe(); } catch (e) {} };
  }, []);
  const reload = useCallback(async () => {
    try {
      const data = await db.loadAll();
      setItems(data.items);
      setRequisitions(data.requisitions);
      setPurchaseOrders(data.purchaseOrders);
    } catch (e) {
      console.warn("loadAll failed:", e);
    } finally {
      setLoaded(true);
    }
  }, []);
  useEffect(() => {
    reload();
    let t;
    const unsub = db.subscribe(() => { clearTimeout(t); t = setTimeout(() => reload(), 250); });
    return () => { clearTimeout(t); unsub(); };
  }, [reload, session]);
  useEffect(() => {
    if (!db.cloud) return;
    const REFRESH_MS = 20000;
    const tick = setInterval(() => {
      if (typeof document === "undefined" || document.visibilityState !== "hidden") reload();
    }, REFRESH_MS);
    const onVisible = () => { if (document.visibilityState === "visible") reload(); };
    const onOnline = () => reload();
    try {
      document.addEventListener("visibilitychange", onVisible);
      window.addEventListener("focus", onVisible);
      window.addEventListener("online", onOnline);
    } catch (e) {}
    return () => {
      clearInterval(tick);
      try {
        document.removeEventListener("visibilitychange", onVisible);
        window.removeEventListener("focus", onVisible);
        window.removeEventListener("online", onOnline);
      } catch (e) {}
    };
  }, [reload]);
  useEffect(() => {
    if (!loaded || db.cloud) return;
    const t = setTimeout(() => {
      save("items", items);
      save("requisitions", requisitions);
      save("purchaseOrders", purchaseOrders);
    }, 400);
    return () => clearTimeout(t);
  }, [items, requisitions, purchaseOrders, loaded]);
  const logout = useCallback(() => {
    setUser(null);
    if (CLOUD) db.signOut().then(() => setSession(null));
  }, []);
  if (!user) {
    const chooseUser = (u) => {
      try { if (u && u.id !== "admin") localStorage.setItem(LAST_DEPT_KEY, u.id); } catch (e) {}
      setUser(u);
    };
    return <Login onLogin={chooseUser} session={session} onSignedIn={setSession} notify={notify} />;
  }
  const isAdmin = user.id === "admin";
  const nav = isAdmin
    ? [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "inventory", label: "คลังสินค้า", icon: Package },
        { id: "requisitions", label: "คำขอเบิก", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ]
    : [
        { id: "dashboard", label: "ภาพรวม", icon: LayoutDashboard },
        { id: "requisitions", label: "เบิกของ", icon: ClipboardList },
        { id: "po", label: "สั่งซื้อ", icon: ShoppingCart },
      ];
  const activeTab = nav.some((n) => n.id === tab) ? tab : "dashboard";
  const dark = !isAdmin; // department users get the dark theme; admin stays light
  return (
    <div
      className="min-h-screen flex flex-col"
      style={{
        fontFamily: "'Inter', system-ui, sans-serif",
        background: dark ? "linear-gradient(180deg,#0a1628 0%,#0d1f38 100%)" : "#F7F9FC",
        color: dark ? "#e2e8f0" : "#1e293b",
      }}
    >
      {/* Top navigation bar */}
      <header className="bg-[#0F1E33] text-white sticky top-0 z-40">
        <div className="max-w-6xl mx-auto px-4 md:px-6">
          {/* Row 1: logo + department + logout */}
          <div className="flex items-center justify-between h-16">
            <button
              onClick={() => setUser(null)}
              title="กลับหน้าเลือกแผนก"
              className="flex items-center gap-2.5 hover:opacity-90 transition-opacity"
            >
              <div className="h-9 flex items-center gap-2.5 px-2.5 rounded-xl bg-white shrink-0 shadow-sm">
                <img src={NACHI_LOGO} alt="NACHI" className="h-4 w-auto" />
                <span className="h-4 w-px bg-slate-200 shrink-0" />
                <span className="text-[#0F1E33] text-[9px] sm:text-[10px] font-extrabold tracking-[0.2em] uppercase leading-none">
                  Factory 4
                </span>
              </div>
              <div className="text-left leading-none hidden md:block">
                <div className="font-bold text-[15px] tracking-tight text-white">Store Engineering</div>
              </div>
            </button>
            <div className="flex items-center gap-2 md:gap-3 min-w-0">
              <div className="flex items-center gap-2 px-2.5 py-1.5 rounded-xl bg-white/10 border border-white/10 min-w-0">
                {(() => {
                  const Icon = DEPT_ICON[user.icon] || Package;
                  return (
                    <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0" style={{ background: user.color }}>
                      <Icon size={14} />
                    </div>
                  );
                })()}
                <div className="leading-none min-w-0">
                  <div className="text-[13px] font-semibold text-white truncate max-w-[120px] sm:max-w-none">{user.name}</div>
                  <div className="text-[10px] text-slate-300 mt-0.5 hidden sm:block">{user.id === "admin" ? "ผู้ดูแลระบบ" : "แผนกผลิต"}</div>
                </div>
              </div>
              <button
                onClick={logout}
                title="ออกจากระบบ"
                aria-label="ออกจากระบบ"
                className="flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-medium text-slate-200 border border-white/10 hover:bg-white/10 hover:text-white transition-colors shrink-0"
              >
                <LogOut size={15} /> <span className="hidden sm:inline">ออกจากระบบ</span>
              </button>
            </div>
          </div>
          {/* Row 2: nav tabs — pill style, larger touch targets, scrollable on mobile */}
          <nav className="flex gap-2 overflow-x-auto no-scrollbar pb-3 pt-1">
            {nav.map((n) => {
              const active = activeTab === n.id;
              return (
                <button
                  key={n.id}
                  onClick={() => setTab(n.id)}
                  aria-current={active ? "page" : undefined}
                  className={`flex items-center gap-2 px-4 sm:px-5 py-2.5 rounded-full text-[15px] whitespace-nowrap shrink-0 transition-all duration-150 ${
                    active
                      ? "bg-[#7FD4A8] text-[#0F1E33] font-bold shadow-lg shadow-[#7FD4A8]/20"
                      : "bg-white/[0.07] text-slate-200 font-medium hover:bg-white/[0.14] hover:text-white active:scale-95"
                  }`}
                >
                  <n.icon size={19} strokeWidth={active ? 2.5 : 2} />
                  {n.label}
                </button>
              );
            })}
          </nav>
        </div>
      </header>
      {/* Main */}
      <main className="flex-1 w-full max-w-6xl mx-auto p-5 md:p-8">
        <div className="mb-6">
          <h1 className={`text-xl font-semibold ${dark ? "text-white" : "text-slate-800"}`}>
            {nav.find((n) => n.id === activeTab)?.label}
          </h1>
          <p className={`text-sm mt-0.5 ${dark ? "text-slate-400" : "text-slate-400"}`}>
            {activeTab === "dashboard" && "ภาพรวมคลังสินค้าและคำขอ"}
            {activeTab === "inventory" && "รายการสินค้าคงคลังทั้งหมด"}
            {activeTab === "requisitions" && (isAdmin ? "คำขอเบิกของและการอนุมัติ" : "เบิกของและติดตามสถานะ")}
            {activeTab === "po" && "สั่งซื้อและสถานะการจัดส่ง"}
          </p>
        </div>
        {activeTab === "dashboard" && (
          <Dashboard items={items} requisitions={requisitions} purchaseOrders={purchaseOrders} user={user} notify={notify} dark={dark} />
        )}
        {activeTab === "inventory" && (
          <Inventory items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} />
        )}
        {activeTab === "requisitions" && (
          <Requisitions
            requisitions={requisitions}
            setRequisitions={setRequisitions}
            items={items}
            setItems={setItems}
            user={user}
            purchaseOrders={purchaseOrders}
            setPurchaseOrders={setPurchaseOrders}
            notify={notify}
            confirm={confirm}
            dark={dark}
            pendingSku={pendingSku}
            onPendingSkuHandled={() => setPendingSku("")}
          />
        )}
        {activeTab === "po" && (
          <PurchaseOrders purchaseOrders={purchaseOrders} setPurchaseOrders={setPurchaseOrders} items={items} setItems={setItems} user={user} notify={notify} confirm={confirm} dark={dark} />
        )}
      </main>
      <ConfirmModal
        open={!!confirmState}
        title={confirmState?.title}
        message={confirmState?.message}
        confirmLabel={confirmState?.confirmLabel}
        tone={confirmState?.tone}
        onConfirm={confirmState?.onConfirm || (() => {})}
        onClose={() => setConfirmState(null)}
      />
      <Toast toasts={toasts} />
    </div>
  );
}
    window.addEventListener("error", function (e) { console.error("window error:", e.message); });
    window.addEventListener("unhandledrejection", function (e) { console.error("unhandled promise:", e.reason); });

    try {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
    } catch (err) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">' +
        '<b>เกิดข้อผิดพลาดในการโหลดแอป</b><br/><br/>' +
        String(err && err.message ? err.message : err) + '</div>';
      console.error(err);
    }
  </script>
</body>
</html>
